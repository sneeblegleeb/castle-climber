<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CASTLE CLIMBER</title>
<style>

html,body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; font-family:monospace; display:flex; justify-content:center; align-items:center; }
#game-wrap { position:relative; background:#0a0a1a; overflow:hidden; }
canvas { display:block; image-rendering:pixelated; touch-action:none; position:absolute; top:0; left:0; }
#ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:#fff; text-align:center; pointer-events:none; letter-spacing:2px; z-index:5; }
#score { font-size:20px; color:#ffdd00; text-shadow:2px 2px #000; }
#best { font-size:12px; color:#aaffaa; }
#coindisp { font-size:13px; color:#ffcc00; margin-top:2px; }
#hearts { font-size:18px; margin-top:3px; letter-spacing:3px; }
#verdisp { font-size:9px; color:#887755; letter-spacing:1px; margin-top:2px; }
#pausebtn, #fsbtn {
  position:absolute; top:10px;
  background:rgba(0,0,0,0.6); border:2px solid #888;
  color:#fff; font-family:monospace; font-size:16px;

}
#pausebtn { right:10px; }
#fsbtn { right:54px; font-size:14px; }

#cpupbtn, #cpdownbtn{
  position:absolute; left:8px;
  background:rgba(0,0,0,0.6); border:2px solid #888;

  display:none; align-items:center; justify-content:center; z-index:12;

}
#cpupbtn{ top:42%; }
#cpdownbtn{ top:52%; }
#cpupbtn:hover, #cpdownbtn:hover{ border-color:#ffdd00; }

.checkpoint-upg{ background:rgba(34,26,14,0.35); border-bottom:1px solid rgba(170,136,51,0.25); padding:6px 6px 8px; }

.panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,8,5,0.96); border:4px solid #aa8833;

}
.panel h2 { font-size:22px; color:#ff6644; margin-bottom:6px; letter-spacing:3px; }

/* Sell button style */

<body>
<div id="game-wrap">
<canvas id="c"></canvas>
<canvas id="floatcanvas"></canvas>

  <div id="score">FLOOR: 0</div>

<div id="hint">DRAG ANYWHERE TO AIM · RELEASE TO LAUNCH</div>

<script>
// ── Crash guard (helps catch “freezes” that are actually exceptions) ─────────
window.addEventListener('error', (e) => {
  try{
    console.error('GAME ERROR:', e.message, e.filename, e.lineno, e.colno, e.error);
  }catch(_){/* noop */}
});

const C=document.getElementById('c'),ctx=C.getContext('2d');
const FC=document.getElementById('floatcanvas'),fctx=FC.getContext('2d');
const BW=360,BH=640;
const W=BW,H=BH,WALL=16;
let SC=1;
function resize(){
  SC=Math.min(window.innerWidth/BW,window.innerHeight/BH);
  const pw=Math.round(BW*SC)+'px',ph=Math.round(BH*SC)+'px';
  const wrap=document.getElementById('game-wrap');
  if(wrap){wrap.style.width=pw;wrap.style.height=ph;}
  [C,FC].forEach(cv=>{cv.width=BW;cv.height=BH;cv.style.width=pw;cv.style.height=ph;});
}
resize();
window.addEventListener('resize',resize);
function toggleFS(){
  const wrap=document.getElementById('game-wrap');
  const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
  if(!fsEl){
    const req=wrap.requestFullscreen||wrap.webkitRequestFullscreen||wrap.mozRequestFullScreen;
    if(req) req.call(wrap).catch(()=>{});
  } else {
    const ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen;
    if(ex) ex.call(document);
  }
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(ev=>
  document.addEventListener(ev,()=>setTimeout(resize,50))
);
const SAVE_KEY='castle_climber_save_v2';

// ── Upgrades ─────────────────────────────────────────────────────────────────
const UPGRADES=[
  {id:'power',    name:'TREBUCHET ARM',    desc:'Mightier launch force',                    icon:'⚔', base:15,  inc:0.9,   baseCost:24,  costMult:1.65},
  {id:'preview',  name:'WIZARD SIGHT',     desc:'Longer trajectory preview arc',            icon:'🔮',base:2,   inc:1.5,   baseCost:16,  costMult:1.3},
  {id:'friction', name:'IRON SABATONS',    desc:'Better grip upon the stonework',           icon:'🛡', base:0.82,inc:-0.04, baseCost:20,  costMult:1.35},
  {id:'gravity',  name:'FEATHERFALL RUNE', desc:'Enchantment lightens thy burden',          icon:'✨',base:0.40,inc:-0.02, baseCost:32,  costMult:1.5,  maxLvl:15},
  {id:'bounce',   name:'RUNED GAUNTLETS',  desc:'Rebound harder off castle walls',          icon:'💎',base:0.6, inc:0.08,  baseCost:16,  costMult:1.45},
  {id:'coinmag',  name:'GILDED AURA',      desc:'Gold is drawn to thee from afar',          icon:'⚜', base:14,  inc:6,     baseCost:12,  costMult:1.4},
  {id:'coinrate', name:'FORTUNE BLESSING', desc:'More gold coins float through the castle', icon:'🪙',base:1.0, inc:0.4,   baseCost:20,  costMult:1.55},
  // ── NEW: replaced SQUIRE'S GRACE (coyote) with HOURGLASS RUNE (time slow) ──
  // Coyote time is now a fixed built-in mechanic (3 frames) rather than an upgrade.
  // Each rank of HOURGLASS RUNE adds 5% speed reduction and 0.5s of slow duration
  // when the player begins dragging to aim a jump. Time snaps back the instant
  // the finger/mouse is released and the launch fires.
  {id:'timeslow', name:'HOURGLASS RUNE',   desc:'Time slows while aiming — more ranks = slower & longer',
                                                                                             icon:'⏳',base:0,   inc:1,     baseCost:28,  costMult:1.45, maxLvl:10},
  {id:'airbrake', name:'CAPE OF CONTROL',  desc:'Thy cloak steadies thine arc',             icon:'🧣',base:1.0, inc:-0.03, baseCost:16,  costMult:1.4},
  {id:'coinval',  name:'ROYAL TITHE',      desc:"Each coin bears the king's bounty",        icon:'👑',base:1,   inc:1,     baseCost:40,  costMult:1.75},
  {id:'maxhp',    name:'VITALITY OATH',    desc:'Gain an extra heart of health',            icon:'❤️',base:4,   inc:1,     baseCost:32,  costMult:1.55},
  {id:'fallres',  name:'IRONFLESH WARD',   desc:'Reduces fall damage taken',                icon:'🪨',base:0,   inc:0.15,  baseCost:22,  costMult:1.35},
  {id:'airjumps', name:'WINGED BOOTS',     desc:'Extra mid-air launches per flight',        icon:'🦅',base:0,   inc:1,     baseCost:48,  costMult:1.9,  maxLvl:5},
  {id:'batradius',name:'WARDING SIGIL',    desc:'Bats cannot agro within a wider radius',   icon:'🔯',base:80,  inc:25,    baseCost:18,  costMult:1.3},
  {id:'heartrate',name:'BLESSED GROUNDS',  desc:'Hearts of healing appear more often',      icon:'💖',base:0.04,inc:0.025, baseCost:24,  costMult:1.4},
  {id:'sporeres', name:'SPORE WARD',       desc:'Thy armor filters the toxic miasma longer',icon:'🍄',base:70,  inc:25,    baseCost:20,  costMult:1.4},

  // ── Checkpoints ──────────────────────────────────────────────────────────
  // Each rank unlocks one checkpoint tier (1000 floors per tier) in that direction.
  {id:'cp_up',   name:'CHECKPOINT BANNER (UP)',   desc:'Unlock upward checkpoints (every 1000 floors)',   icon:'▶', base:0, inc:1, baseCost:1000, costMult:1.0},
  {id:'cp_down', name:'CHECKPOINT BANNER (DOWN)', desc:'Unlock downward checkpoints (every 1000 floors)', icon:'◀', base:0, inc:1, baseCost:1000, costMult:1.0},
];

let upgLevels={};
UPGRADES.forEach(u=>upgLevels[u.id]=0);
let totalCoins=0,best=0,lowest=0;

function upgVal(id){const u=UPGRADES.find(x=>x.id===id);return u.base+upgLevels[id]*u.inc;}
function upgCost(id){
  const u=UPGRADES.find(x=>x.id===id);
  // Checkpoints have linear pricing: 1000, 2000, 3000... per tier
  if(id==='cp_up'||id==='cp_down') return 1000*(upgLevels[id]+1);
  return Math.ceil(u.baseCost*Math.pow(u.costMult,upgLevels[id]));
}

// Sell price = half of what was paid for the most recent rank.
// Cost paid for rank N was upgCost at level N-1, i.e. baseCost * mult^(N-1).
function upgSellPrice(id){
  const lvl=upgLevels[id];
  if(lvl<=0) return 0;
  const u=UPGRADES.find(x=>x.id===id);
  return Math.floor(Math.ceil(u.baseCost*Math.pow(u.costMult,lvl-1))/2);
}


// ── Checkpoint gating ───────────────────────────────────────────────────────
// To buy checkpoint tier N (rank N), the player must have already reached it.
// Up direction uses `best` (highest positive floor). Down uses `lowest` (most negative floor).
function checkpointTierReq(id, tier){
  const floors = tier*1000;
  if(id==='cp_up')   return {ok: best   >= floors, need: floors, dir: 'up'};
  if(id==='cp_down') return {ok: lowest <= -floors, need: floors, dir: 'down'};
  return {ok:true, need:0, dir:''};
}
function maxHP(){return upgVal('maxhp')|0;}
function maxAirJumps(){return upgVal('airjumps')|0;}
function frictionVal(){return Math.max(0.05, upgVal('friction'));}
function airbrakeVal(){return Math.max(0.05, upgVal('airbrake'));}
function bounceVal(){return Math.min(0.92, upgVal('bounce'));}
function gravVal(){return Math.max(0.04, upgVal('gravity'));}
function batDifficultyScale(score){return 1 + Math.min(2.5, Math.abs(score) / 4000);}
function batAgroRadius(){return Math.min(upgVal('batradius'), H*0.45);}
function heartSpawnRate(){return upgVal('heartrate');}
function sporeToleranceVal(){return upgVal('sporeres');}

// ── Time Slow helpers ─────────────────────────────────────────────────────────
// Level L gives: slow% = 25 + (L-1)*5,  duration = 60 + (L-1)*30 real frames
// timeScale 1.0 = normal, 0.75 = 25% slow, etc.
function timeSlowScale(){
  const lvl=upgLevels['timeslow'];
  if(lvl<=0) return 1.0;
  const slowPct=0.25+(lvl-1)*0.05;        // 0.25 → 0.70 across 10 levels
  return Math.max(0.30, 1.0-slowPct);
}
function timeSlowDuration(){
  const lvl=upgLevels['timeslow'];
  if(lvl<=0) return 0;
  return 60+(lvl-1)*30;                   // frames: 60, 90, 120 … 330
}

// Mushroom spawn density scales with depth, starting mild and peaking around floor 4500.
const MUSH_START = 150;
const MUSH_FULL  = 4500;
const MUSH_MAX_DENSITY = 0.38;

// ── Time-slow state ───────────────────────────────────────────────────────────
// timeScale < 1.0 = bullet-time. Applied inside update() to physics deltas so
// update() still runs EVERY frame — animations never freeze. The accumulator
// approach (skipping update() some frames) caused visible stuttering because
// S.tick only advanced when update() ran, locking all animations in place.
let timeScale=1.0;       // current game speed multiplier (1=normal, <1=slowed)
let timeSlowTimer=0;     // real frames remaining before slow expires

// ── Persistence ───────────────────────────────────────────────────────────────
function saveGame(s){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      upgLevels,totalCoins,best,lowest,
      pos:s?{x:s.pl.x,y:s.pl.y,hp:s.pl.hp}:null
    }));
  }catch(e){}
}
function loadSave(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function wipeSave(){
  localStorage.removeItem(SAVE_KEY);
  upgLevels={};UPGRADES.forEach(u=>upgLevels[u.id]=0);
  totalCoins=0;best=0;lowest=0;
}
function confirmWipe(){if(confirm('Wipe all progress? This cannot be undone.')){wipeSave();restart();}}

// ── State ─────────────────────────────────────────────────────────────────────
let S,drag=null,floats=[],paused=false,saveTimer=0;

// ── Checkpoints (run-start selection) ──────────────────────────────────────
let checkpointPhase=true;
let cpSelUp=1, cpSelDown=1;
function ownedCPTiers(dir){return dir>0?(upgLevels['cp_up']|0):(upgLevels['cp_down']|0);}
function updateCheckpointUI(){
  const upBtn=document.getElementById('cpupbtn');
  const dnBtn=document.getElementById('cpdownbtn');
  const upOwned=ownedCPTiers(1);
  const dnOwned=ownedCPTiers(-1);
  const show=checkpointPhase && S && S.alive;

  // Show actual floor for clarity: tier N = N*1000 floors
  if(upBtn){
    upBtn.style.display = (show && upOwned>0)?'flex':'none';
        upBtn.textContent = '▲';
  }
  if(dnBtn){
    dnBtn.style.display = (show && dnOwned>0)?'flex':'none';
        dnBtn.textContent = '▼';
  }
}
function cycleCheckpoint(dir){
  if(!checkpointPhase||!S||!S.alive) return;
  const max=ownedCPTiers(dir);
  if(max<=0) return;
  if(dir>0){ cpSelUp = (cpSelUp%max)+1; teleportToCheckpoint(dir, cpSelUp); }
  else { cpSelDown = (cpSelDown%max)+1; teleportToCheckpoint(dir, cpSelDown); }
  updateCheckpointUI();
}
function teleportToCheckpoint(dir, tier){
  // tier is in 1000-floor increments.
  const targetScore = dir * tier * 1000; // floors
  const targetY = -targetScore * 10;     // world y (score = floor(-y/10))
  const px = W/2;
  const platY = targetY + 12;
  const id = platId(platY);
  // Ensure a checkpoint platform exists
  let p = S.plats.find(pp=>pp.id===id);
  if(!p){
    p={x:px-55,y:platY,w:110,h:14,icy:false,torch:false,id};
    S.plats.push(p);
  }
  p.checkpoint=true;
  // Move player
  S.pl.x=px; S.pl.y=targetY-20; S.pl.vx=0; S.pl.vy=0;
  S.pl.onG=false; S.pl.coyote=0; S.pl.fallVy=0;
  // Recenter camera and (re)generate nearby content
  S.cam = S.pl.y - H*0.38;
  gen(S); cull(S); gen(S); cull(S);
  floats=[]; drag=null;
}


function hashY(y){let h=Math.sin(y*127.1+311.7)*43758.5453;return h-Math.floor(h);}
function hash2(a,b){let h=Math.sin(a*127.1+b*311.7+92.3)*43758.5453;return h-Math.floor(h);}

// ── Spike helpers ─────────────────────────────────────────────────────────────
const SPIKE_START = 300;
const SPIKE_FULL  = 8000;
const SPIKE_SLOT  = 13;
const SPIKE_MAX_FILL = 0.88;


// Returns deterministic mushroom X on a given platform if a mushroom *would* spawn there, else null.
// This mirrors tryPlaceMushroom() logic so spikes can avoid overlapping hidden hazards.
function mushroomXForPlat(p){
  const absScore = Math.abs(p.y) / 10;
  if(absScore < MUSH_START) return null;
  const density = Math.min(1, (absScore - MUSH_START) / (MUSH_FULL - MUSH_START));
  if(hash2(p.id*53+7, 99) > density * MUSH_MAX_DENSITY) return null;
  return p.x + 10 + hash2(p.id, 88) * (p.w - 20);
}

function getPlatSpikes(p) {
  const absScore = Math.abs(p.y) / 10;
  if (absScore < SPIKE_START) return [];
  const density = Math.min(1, (absScore - SPIKE_START) / (SPIKE_FULL - SPIKE_START));
  const fillChance = density * SPIKE_MAX_FILL;
  const slots = Math.floor((p.w - 4) / SPIKE_SLOT);
  if (slots === 0) return [];
  const spikes = [];
  for (let i = 0; i < slots; i++) {
    if (hash2(p.id * 97 + i, 77) < fillChance) {
      const sx = p.x + 2 + SPIKE_SLOT * 0.5 + i * SPIKE_SLOT;

      // Avoid spawning spikes directly in front of torches or mushrooms (hidden/unfair hazards).
      const torchX = p.torch ? (p.x + p.w/2) : null;
      const mushX  = mushroomXForPlat(p);

      const nearTorch = (torchX !== null) && Math.abs(sx - torchX) < 10;
      const nearMush  = (mushX  !== null) && Math.abs(sx - mushX)  < 10;

      if(!nearTorch && !nearMush) spikes.push(sx);
    }
  }
  return spikes;
}

function checkSpikeCollision(s) {
  const pl = s.pl;
  if (pl.hurtTimer > 0) return;
  const plB  = pl.y + pl.h / 2;
  const plL  = pl.x - pl.w / 2 + 3;
  const plR  = pl.x + pl.w / 2 - 3;
  const SPIKE_H = 9;
  for (const p of s.plats) {
    if (plB < p.y - SPIKE_H - 1 || plB > p.y + 3) continue;
    if (plR < p.x || plL > p.x + p.w) continue;
    const spikes = getPlatSpikes(p);
    for (const sx of spikes) {
      if (plR > sx - 4 && plL < sx + 4) {
        takeDamage(s, 1, '🩸 SPIKED!');
        // Stronger knockback so the player doesn't sit on the spike and get re-hit.
        pl.vy = Math.min(pl.vy, -2.6);
        const dir = (pl.x < sx) ? -1 : 1;
        pl.spikeDir = dir;
        pl.spikeKnock = 6;
        pl.vx = dir * Math.max(Math.abs(pl.vx), 1.4);
        pl.x += dir * 2;
        return;
      }
    }
  }
}

function mkS(savedPos){
  const hp=maxHP();
  const sx=savedPos?savedPos.x:W/2,sy=savedPos?savedPos.y:0;
  const shp=savedPos?Math.min(savedPos.hp,hp):hp;
  const s={
    pl:{x:sx,y:sy,vx:0,vy:0,w:18,h:24,onG:false,coyote:0,
        hp:shp,maxHp:hp,hurtTimer:0,fallVy:0,damageFlash:0,
        airJumpsLeft:maxAirJumps(),sporeExposure:0,spikeKnock:0,spikeDir:0},
    cam:sy-H*.38,
    plats:[],coins:[],mushrooms:[],
    collectedCoins:new Set(),
    collectedHearts:new Set(),
    score:Math.floor(-sy/10),session_coins:0,
    alive:true,tick:0,
    bats:[],
    hearts:[],
  };
  s.plats.push({x:sx-55,y:sy+12,w:110,h:14,icy:false,torch:false,id:0});
  for(let i=0;i<8;i++) s.bats.push(mkBat(sy+(Math.random()-.5)*H*3, sy));
  gen(s);
  return s;
}

function mkBat(wy,plY){
  const minDist=batAgroRadius()+50;
  if(plY!==undefined&&Math.abs(wy-plY)<minDist){
    wy = wy<plY ? plY-minDist : plY+minDist;
  }
  return{x:WALL+10+Math.random()*(W-WALL*2-20),wy,vx:(Math.random()-.5)*1.0,
    flap:Math.random()*Math.PI*2,state:'idle',agroTimer:0,retreatTimer:0,
    tx:0,ty:0,dvx:0,dvy:0,hurtTimer:0};
}

function platId(wy){return Math.round(wy/10);}

function gen(s){
  const margin=H*0.75;
  const top=s.cam-margin, bot=s.cam+H+margin;
  let mn=Infinity,mx=-Infinity;
  for(const p of s.plats){if(p.y<mn)mn=p.y;if(p.y>mx)mx=p.y;}
  if(!s.plats.length){mn=s.pl.y;mx=s.pl.y;}
  let y=mx; while(y<bot){y+=65+Math.random()*85;if(y<bot)addP(s,y);}
  y=mn;     while(y>top){y-=65+Math.random()*85;if(y>top)addP(s,y);}
  const coinMargin=H*0.55;
  const ctop=s.cam-coinMargin, cbot=s.cam+H+coinMargin;
  const COIN_BAND=80, HEART_BAND=320;
  const cb0=Math.floor(ctop/COIN_BAND), cb1=Math.ceil(cbot/COIN_BAND);
  for(let b=cb0;b<=cb1;b++) tryPlaceCoin(s,b*COIN_BAND,b);
  const hb0=Math.floor(ctop/HEART_BAND), hb1=Math.ceil(cbot/HEART_BAND);
  for(let b=hb0;b<=hb1;b++) tryPlaceHeart(s,b*HEART_BAND,b);
  const idle=s.bats.filter(bt=>bt.state==='idle').length;
  let add=8-idle; while(add-->0) s.bats.push(mkBat(s.cam+(Math.random()-.5)*H*2,s.pl.y));
}

function platOverlap(s,wx,wy,r){
  for(const p of s.plats)
    if(wx+r>p.x&&wx-r<p.x+p.w&&wy+r>p.y-2&&wy-r<p.y+p.h+2) return true;
  return false;
}

function tryPlaceCoin(s,wy,band){
  const spawnChance=Math.min(0.9,0.42+upgVal('coinrate')*0.18);
  if(hash2(band,42)>spawnChance) return;
  if(s.collectedCoins.has(band)) return;
  if(s.coins.some(c=>c.id===band)) return;
  const wx=WALL+14+hash2(band,40)*(W-WALL*2-28);
  let cy=wy+hash2(band,43)*30-15;
  for(let i=0;i<8;i++){if(!platOverlap(s,wx,cy,9))break;cy-=12;}
  s.coins.push({x:wx,y:cy,collected:false,bob:hash2(band,41)*Math.PI*2,id:band});
}

function tryPlaceHeart(s,wy,band){
  const hid='ht'+band;
  if(s.collectedHearts.has(hid)) return;
  if(s.hearts.some(h=>h.id===hid)) return;
  if(hash2(band,50)>heartSpawnRate()) return;
  const wx=WALL+18+hash2(band,51)*(W-WALL*2-36);
  let cy=wy+hash2(band,53)*40-20;
  for(let i=0;i<8;i++){if(!platOverlap(s,wx,cy,11))break;cy-=14;}
  s.hearts.push({x:wx,y:cy,collected:false,bob:hash2(band,52)*Math.PI*2,id:hid});
}

function tryPlaceMushroom(s, p){
  const absScore = Math.abs(p.y) / 10;
  if(absScore < MUSH_START) return;
  if(s.mushrooms.some(m=>m.platId===p.id)) return;
  const density = Math.min(1, (absScore - MUSH_START) / (MUSH_FULL - MUSH_START));
  if(hash2(p.id*53+7, 99) > density * MUSH_MAX_DENSITY) return;
  const mx = p.x + 10 + hash2(p.id, 88) * (p.w - 20);
  const initDelay = 80 + hash2(p.id, 91) * 220;
  s.mushrooms.push({
    x:mx, y:p.y,
    platId:p.id,
    puffTimer:initDelay,
    cloud:null,
    bob:hash2(p.id,92)*Math.PI*2,
  });
}

function addP(s,wy){
  const id=platId(wy);
  if(s.plats.some(p=>p.id===id)) return;
  const avail=W-WALL*2;
  const rng1=hash2(id,1),rng2=hash2(id,2),rng3=hash2(id,3),rng4=hash2(id,4);
  const w=52+rng1*84, x=WALL+6+rng2*(avail-w-12);
  const icy=rng3<0.18, torch=!icy&&rng4<0.3;
  const p={x,y:wy,w,h:14,icy,torch,id};
  s.plats.push(p);
  tryPlaceMushroom(s, p);
}

function cull(s){
  const margin=H*0.75;
  const t=s.cam-margin, b=s.cam+H+margin;
  s.plats=s.plats.filter(p=>p.y>t&&p.y<b);
  s.coins=s.coins.filter(c=>!c.collected&&c.y>t&&c.y<b);
  s.hearts=s.hearts.filter(h=>!h.collected&&h.y>t&&h.y<b);
  s.bats=s.bats.filter(bt=>bt.wy>t-H*1.5&&bt.wy<b+H*1.5);
  s.mushrooms=s.mushrooms.filter(m=>m.y>t&&m.y<b);
}

function addFloat(x,sy,text,color){floats.push({x,y:sy,vy:-1.4,life:55,text,color:color||'#ffdd00'});}

const FALL_THRESH=22;
const FALL_SEVERE=34;

// ── Mushrooms ─────────────────────────────────────────────────────────────────
const CLOUD_RADIUS   = 30;
const CLOUD_DURATION = 160;
const PUFF_MIN       = 200;
const PUFF_RANGE     = 220;

function updateMushrooms(s){
  const pl = s.pl;
  const tolerance = sporeToleranceVal();
  let inCloud = false;
  for(const m of s.mushrooms){
    m.bob += 0.03;
    if(m.cloud){
      m.cloud.timer--;
      if(m.cloud.timer <= 0) m.cloud = null;
    } else {
      m.puffTimer--;
      if(m.puffTimer <= 0){
        m.cloud = {timer:CLOUD_DURATION, maxTimer:CLOUD_DURATION};
        m.puffTimer = PUFF_MIN + Math.random()*PUFF_RANGE;
      }
    }
    if(m.cloud){
      const dx = pl.x - m.x, dy = pl.y - m.y;
      if(Math.sqrt(dx*dx + dy*dy) < CLOUD_RADIUS + 8) inCloud = true;
    }
  }
  if(inCloud){
    pl.sporeExposure++;
    if(pl.sporeExposure >= tolerance){
      takeDamage(s, 1, '☠ SPORES!');
      pl.sporeExposure = 0;
    }
  } else {
    pl.sporeExposure = Math.max(0, pl.sporeExposure - 3);
  }
}

// ── Bats ──────────────────────────────────────────────────────────────────────
const BAT_AGRO_RATE=0.025,BAT_AGRO_PERIOD=360,BAT_DIVE_SPEED=3.5,BAT_IDLE_SPEED=0.8;

function updateBats(s){
  const pl=s.pl;
  const scale=batDifficultyScale(s.score);
  const diveSpeed=BAT_DIVE_SPEED*scale;
  const agroRate=Math.min(0.18, BAT_AGRO_RATE*scale);
  const ts=timeScale;
  for(const bt of s.bats){
    bt.flap+=0.14;  // flap stays real-time so wing animation is always smooth
    if(bt.hurtTimer>0) bt.hurtTimer--;
    if(bt.state==='idle'){
      bt.x+=bt.vx*ts;
      bt.wy+=Math.sin(bt.flap*0.25)*0.3*ts;
      if(bt.x<WALL+8||bt.x>W-WALL-8) bt.vx*=-1;
      bt.vx=Math.max(-BAT_IDLE_SPEED,Math.min(BAT_IDLE_SPEED,bt.vx));
      const bsy=bt.wy-s.cam;
      const distToPlayer=Math.sqrt((bt.x-pl.x)**2+(bt.wy-pl.y)**2);
      if(bsy>-50&&bsy<H+50&&!paused&&distToPlayer>batAgroRadius()&&s.tick%BAT_AGRO_PERIOD===0&&Math.random()<agroRate){
        bt.state='agro';bt.agroTimer=90+Math.random()*60;
      }
    } else if(bt.state==='agro'){
      bt.flap+=0.06;bt.x+=bt.vx*1.2*ts;
      bt.wy+=(pl.y-bt.wy)*0.008*ts;
      if(bt.x<WALL+8||bt.x>W-WALL-8) bt.vx*=-1;
      if(--bt.agroTimer<=0){
        bt.state='diving';
        const dx=pl.x-bt.x,dy=pl.y-bt.wy,d=Math.sqrt(dx*dx+dy*dy)||1;
        bt.dvx=dx/d*diveSpeed;bt.dvy=dy/d*diveSpeed;
      }
    } else if(bt.state==='diving'){
      bt.x+=bt.dvx*ts;bt.wy+=bt.dvy*ts;
      const dx=pl.x-bt.x,dy=pl.y-bt.wy;
      if(Math.sqrt(dx*dx+dy*dy)<20){
        takeDamage(s,1,'🦇 HIT!');
        bt.state='retreating';bt.retreatTimer=100;bt.dvx*=-0.7;bt.dvy=-3;bt.hurtTimer=45;
      }
      const bsy=bt.wy-s.cam;
      if(bsy<-H||bsy>H*2||bt.x<WALL||bt.x>W-WALL){
        bt.state='retreating';bt.retreatTimer=80;bt.dvx*=-0.5;bt.dvy=-2;
      }
    } else if(bt.state==='retreating'){
      bt.x+=bt.dvx*0.88*ts;bt.wy+=bt.dvy*ts;bt.dvx*=0.9;bt.dvy*=0.88;
      if(--bt.retreatTimer<=0){bt.state='idle';bt.vx=(Math.random()-.5)*BAT_IDLE_SPEED*2;}
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(s){
  s.tick++;
  const pl=s.pl,prevY=pl.y,prevX=pl.x;
  const grav=gravVal(),ab=airbrakeVal();
  // timeScale is applied to all positional deltas and gravity accumulation so
  // the game literally runs in slow motion while still calling update() every
  // frame. This keeps S.tick advancing smoothly so animations never stutter.
  // Friction/airbrake are per-frame multipliers; we interpolate them toward 1.0
  // by timeScale so they don't over-damp at low speeds.
  const ts=timeScale;
  const abT = 1-(1-ab)*ts;   // airbrake scaled: ts=1 → ab, ts=0 → 1 (no drag)

  if(pl.vy>0) pl.fallVy=Math.max(pl.fallVy,pl.vy);
  pl.vy+=grav*ts;
  if(!pl.onG) pl.vx*=abT;
  pl.x+=pl.vx*ts;pl.y+=pl.vy*ts;
  if(pl.hurtTimer>0) pl.hurtTimer--;
  if(pl.damageFlash>0) pl.damageFlash--;

  // If recently spiked, keep nudging the player sideways so they clear the hitbox.
  if(pl.spikeKnock>0){
    pl.spikeKnock--;
    const d=pl.spikeDir||1;
    // Ensure some lateral motion even if airbrake is damping
    pl.vx = d * Math.max(Math.abs(pl.vx), 1.4);
    pl.x += d * 0.7;
  }

  const bounce=bounceVal();
  if(pl.x-pl.w/2<WALL){pl.x=WALL+pl.w/2;pl.vx=Math.abs(pl.vx)*bounce;}
  if(pl.x+pl.w/2>W-WALL){pl.x=W-WALL-pl.w/2;pl.vx=-Math.abs(pl.vx)*bounce;}

  // Coyote time is now a fixed 3-frame built-in grace period; no longer an upgrade.
  // The HOURGLASS RUNE fills the strategic slot vacated by SQUIRE'S GRACE.
  if(pl.onG){pl.coyote=3;pl.airJumpsLeft=maxAirJumps();}
  else if(pl.coyote>0) pl.coyote--;
  pl.onG=false;

  for(const p of s.plats){
    const plL=pl.x-pl.w/2,plR=pl.x+pl.w/2,plT=pl.y-pl.h/2,plF=pl.y+pl.h/2;
    const prL=prevX-pl.w/2,prR=prevX+pl.w/2,prT=prevY-pl.h/2,prF=prevY+pl.h/2;
    const pR=p.x+p.w,pB=p.y+p.h;
    if(plR<=p.x||plL>=pR||plF<=p.y||plT>=pB) continue;
    const fromTop=prF<=p.y,fromBot=prT>=pB,fromL=prR<=p.x,fromR=prL>=pR;
    const lf=p.icy?0.99:frictionVal();
    if(fromTop){
      if(pl.fallVy>=FALL_THRESH){
        const resist=upgVal('fallres');
        let dmg=pl.fallVy>=FALL_SEVERE?2:1;
        const reducedDmg=Math.max(0,dmg-Math.floor(resist));
        const extraResist=resist-Math.floor(resist);
        const finalDmg=(reducedDmg>0&&Math.random()<extraResist)?reducedDmg-1:reducedDmg;
        if(finalDmg>0) takeDamage(s,finalDmg,'FALL!');
      }
      pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;
    } else if(fromBot){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
    else if(fromL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
    else if(fromR){pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    else{
      const dT=Math.abs(plF-p.y),dB=Math.abs(plT-pB),dL=Math.abs(plR-p.x),dR=Math.abs(plL-pR);
      const m=Math.min(dT,dB,dL,dR);
      if(m===dT){pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;}
      else if(m===dB){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
      else if(m===dL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
      else{pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    }
  }
  if(pl.vy<0) pl.fallVy=0;

  checkSpikeCollision(s);

  const mag=upgVal('coinmag'),val=upgVal('coinval')|0;
  for(const coin of s.coins){
    if(coin.collected) continue;
    coin.bob+=0.05*ts;
    const dx=pl.x-coin.x,dy=pl.y-coin.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<mag*2.5&&dist>mag){coin.x+=dx/dist*3*ts;coin.y+=dy/dist*3*ts;}
    if(dist<mag){
      coin.collected=true;
      s.collectedCoins.add(coin.id);
      s.session_coins+=val;totalCoins+=val;
      addFloat(coin.x,coin.y-s.cam,val>1?'+'+val+' ⚜':'+⚜','#ffcc44');
    }
  }

  for(const heart of s.hearts){
    if(heart.collected) continue;
    heart.bob+=0.04*ts;
    const dx=pl.x-heart.x,dy=pl.y-heart.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<18){
      heart.collected=true;
      s.collectedHearts.add(heart.id);
      if(pl.hp<pl.maxHp){
        pl.hp=Math.min(pl.maxHp,pl.hp+1);
        addFloat(heart.x,heart.y-s.cam,'❤️ +1','#ff88aa');
        updateHeartsUI(pl);
      } else {
        addFloat(heart.x,heart.y-s.cam,'FULL','#ff88aa');
      }
    }
  }

  updateMushrooms(s);
  updateBats(s);
  s.cam+=(pl.y-H*.4-s.cam)*.07*ts;
  s.score=Math.floor(-pl.y/10);
  if(s.score>best) best=s.score;
  if(s.score<lowest) lowest=s.score;
  floats=floats.filter(f=>{f.y+=f.vy;f.life--;return f.life>0;});
  gen(s);cull(s);

  if(++saveTimer>300){saveTimer=0;saveGame(s);}

  document.getElementById('score').textContent='FLOOR: '+s.score;
  document.getElementById('best').textContent='BEST: '+best+' / '+lowest;
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  updateHeartsUI(pl);
  if(pl.y-s.cam>H+220){pl.hp=0;killPlayer(s);}
}

function takeDamage(s,dmg,label){
  const pl=s.pl;
  if(pl.hurtTimer>0) return;
  pl.hp=Math.max(0,pl.hp-dmg);pl.hurtTimer=90;pl.damageFlash=20;
  addFloat(pl.x,pl.y-s.cam-20,label||'-'+dmg+'❤️','#ff4444');
  updateHeartsUI(pl);
  if(pl.hp<=0) killPlayer(s);
}
function killPlayer(s){s.alive=false;saveGame(null);showGO(s);}
function updateHeartsUI(pl){
  const mhp=pl.maxHp||maxHP();
  let h='';for(let i=0;i<mhp;i++) h+=i<pl.hp?'❤️':'🖤';
  document.getElementById('hearts').textContent=h;
}

// ── Input ─────────────────────────────────────────────────────────────────────
function xy(e){const r=C.getBoundingClientRect(),t=e.touches?(e.touches[0]||e.changedTouches[0]):e;return{x:(t.clientX-r.left)/SC,y:(t.clientY-r.top)/SC};}
C.addEventListener('touchstart',e=>{e.preventDefault();if(!paused)dn(xy(e));},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(!paused)mv(xy(e));},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(!paused)up();},{passive:false});
C.addEventListener('mousedown',e=>{if(!paused)dn(xy(e));});
window.addEventListener('mousemove',e=>{if(!paused)mv(xy(e));});
window.addEventListener('mouseup',()=>{if(!paused)up();});

function canLaunch(){const pl=S.pl;return pl.onG||pl.coyote>0||pl.airJumpsLeft>0;}

function dn(p){
  if(!S.alive)return;
  drag={sx:p.x,sy:p.y,cx:p.x,cy:p.y};
  document.getElementById('hint').style.display='none';
  // ── Activate time slow on drag start ────────────────────────────────────────
  // Only engage if the player has the upgrade and can actually fire a shot.
  // This prevents the effect triggering on accidental taps the player can't use.
  const lvl=upgLevels['timeslow'];
  if(lvl>0){
    timeScale=timeSlowScale();
    timeSlowTimer=timeSlowDuration();
  }
}

function mv(p){if(drag)drag={...drag,cx:p.x,cy:p.y};}

function up(){
  // ── Restore normal speed the instant the player releases / fires ─────────
  // This makes time-slow feel responsive: snaps back immediately, not gradually.
  timeScale=1.0;
  timeSlowTimer=0;

  if(!drag||!S.alive){drag=null;return;}
  const dx=drag.cx-drag.sx,dy=drag.cy-drag.sy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<8){drag=null;return;}
  if(!canLaunch()){drag=null;return;}
  const d=Math.min(dist,130),a=Math.atan2(dy,dx),pw=d/130;
  S.pl.vx=-Math.cos(a)*pw*upgVal('power');
  S.pl.vy=-Math.sin(a)*pw*upgVal('power');
  if(checkpointPhase){ checkpointPhase=false; updateCheckpointUI(); }
  if(!S.pl.onG&&S.pl.coyote<=0) S.pl.airJumpsLeft=Math.max(0,S.pl.airJumpsLeft-1);
  S.pl.onG=false;drag=null;
}

// ── Trajectory simulation ─────────────────────────────────────────────────────
const BOUNCE_COLORS=[[255,200,80],[80,200,255],[180,80,255],[80,255,120],[255,140,40]];

function simTrajectory(sx,sy,vx0,vy0,totalSteps){
  // Preview must mirror *actual* collision rules, especially on top-of-platform
  // landings where IRON SABATONS (friction) applies. The live physics does NOT
  // bounce upward on a clean top landing — it zeroes vy and applies friction.
  const grav=gravVal(),ab=airbrakeVal(),bc=bounceVal();
  const hw=9,hh=12;

  let tx=sx,ty=sy,tvx=vx0,tvy=vy0;
  let onG=false, gPlat=null;

  const segs=[{dots:[],bounced:false,bi:0}];

  for(let i=0;i<totalSteps;i++){
    const ptx=tx,pty=ty;

    // Integrate
    if(onG && gPlat){
      const lf=gPlat.icy?0.99:frictionVal();
      tvx*=lf;
      tx+=tvx;
      ty=gPlat.y-hh;
      tvy=0;

      // If we've slid off the platform, go back to airborne integration next step.
      if(tx+hw<=gPlat.x || tx-hw>=gPlat.x+gPlat.w){
        onG=false; gPlat=null;
      }
    } else {
      tvy+=grav;
      tvx*=ab;
      tx+=tvx;
      ty+=tvy;
    }

    let hit=false;

    // Walls always apply (even if sliding)
    if(tx-hw<=WALL){tx=WALL+hw;tvx=Math.abs(tvx)*bc;hit=true;onG=false;gPlat=null;}
    else if(tx+hw>=W-WALL){tx=W-WALL-hw;tvx=-Math.abs(tvx)*bc;hit=true;onG=false;gPlat=null;}

    // Platforms (only when airborne; when onG we already constrain to gPlat)
    if(!onG && !hit){
      for(const p of S.plats){
        const pR=p.x+p.w,pB=p.y+p.h;
        if(tx+hw<=p.x||tx-hw>=pR||ty+hh<=p.y||ty-hh>=pB) continue;

        const fromTop=(pty+hh)<=p.y,fromBot=(pty-hh)>=pB;
        const fromLeft=(ptx+hw)<=p.x,fromRight=(ptx-hw)>=pR;

        if(fromTop){
          // Match update(): land, zero vy, apply platform friction (incl. icy).
          ty=p.y-hh;
          tvy=0;
          const lf=p.icy?0.99:frictionVal();
          tvx*=lf;

          onG=true; gPlat=p;
          // If we're basically at rest, the trajectory ends here.
          if(Math.abs(tvx)<0.15){
            segs[segs.length-1].dots.push({x:tx,y:ty});
            if(segs[segs.length-1].dots.length===0) segs.pop();
            return segs;
          }
          // Not a "bounce" segment split; keep drawing the sliding path.
          hit=false;
        }
        else if(fromBot){ty=pB+hh;tvy=Math.abs(tvy)*0.3;hit=true;}
        else if(fromLeft){tx=p.x-hw;tvx=-Math.abs(tvx)*bc;hit=true;}
        else if(fromRight){tx=pR+hw;tvx=Math.abs(tvx)*bc;hit=true;}
        else{
          // Fallback: treat as top landing to stay conservative and match gameplay feel.
          ty=p.y-hh;
          tvy=0;
          const lf=p.icy?0.99:frictionVal();
          tvx*=lf;
          onG=true; gPlat=p;
          hit=false;
        }
        break;
      }
    }

    segs[segs.length-1].dots.push({x:tx,y:ty});

    // Only split trajectory segments on *true bounces* (walls / side / bottom hits),
    // not on top landings that become ground-slides.
    if(hit){
      segs[segs.length-1].bounced=true;
      segs.push({dots:[],bounced:false,bi:segs.length});
    }
  }

  if(segs[segs.length-1].dots.length===0) segs.pop();
  return segs;
}


// ── Draw ──────────────────────────────────────────────────────────────────────

function drawCastleWall(){
  const bH=16,bW=32;
  const topWorldRow=Math.floor(S.cam/bH);
  for(let row=topWorldRow-1;row<=topWorldRow+Math.ceil(H/bH)+1;row++){
    const off=(row%2===0)?0:bW/2;
    const wy=Math.round((row*bH)-S.cam);
    const shade=row%3===0?'#2a2520':row%3===1?'#252018':'#221e15';
    for(let col=-1;col<=Math.ceil(W/bW)+1;col++){
      const bx=Math.round(col*bW+off);
      if(bx+bW<0||bx>W||wy+bH<0||wy>H) continue;
      ctx.fillStyle=shade;

      const t = m.cloud.timer / m.cloud.maxTimer;
      const pulse = 0.7 + 0.3*Math.sin(S.tick*0.18);
      const outerR = CLOUD_RADIUS + 6*Math.sin(S.tick*0.09);
      const g1 = ctx.createRadialGradient(mx, sy-8, 0, mx, sy-8, outerR);
      g1.addColorStop(0, `rgba(140,200,60,${0.38*t*pulse})`);

      ctx.beginPath(); ctx.arc(mx, sy-8, outerR, 0, Math.PI*2); ctx.fill();

// ── Time-slow visual overlay ───────────────────────────────────────────────────
// Draws a subtle cyan border + tint when time is actively slowed.
// Intensity scales with how much the speed is reduced so shallow upgrades
// feel lighter than deep ones. Drawn after walls, before vignette.
function drawTimeSlowOverlay(){
  if(timeScale >= 1.0) return;
  const intensity = 1.0 - timeScale; // 0 = no slow, 0.70 = max slow (rank 10)
  const pulse = 0.75 + 0.25*Math.sin(S.tick * 0.22);

  // Subtle blue-cyan screen tint
  ctx.fillStyle = `rgba(20,60,160,${intensity * 0.10 * pulse})`;
  ctx.fillRect(0,0,W,H);

  // Animated glowing border
  const borderAlpha = intensity * 0.55 * pulse;
  ctx.strokeStyle = `rgba(80,160,255,${borderAlpha})`;
  ctx.lineWidth = 3;
  ctx.strokeRect(2,2,W-4,H-4);

  // Inner halo corners for extra polish
  const cSize = 14;
  ctx.strokeStyle = `rgba(140,210,255,${intensity * 0.7})`;
  ctx.lineWidth = 1.5;
  const corners = [[2,2],[W-2,2],[2,H-2],[W-2,H-2]];
  const dirs     = [[1,1],[-1,1],[1,-1],[-1,-1]];
  corners.forEach(([cx, cy], i) => {
    const [dx, dy] = dirs[i];
    ctx.beginPath();
    ctx.moveTo(cx, cy + dy * cSize);
    ctx.lineTo(cx, cy);
    ctx.lineTo(cx + dx * cSize, cy);
    ctx.stroke();
  });

  // Small indicator label in top-left
  const lvl = upgLevels['timeslow'];
  const slowPctLabel = Math.round((1-timeScale)*100);
  ctx.fillStyle = `rgba(140,210,255,${intensity*0.85})`;
  ctx.font = 'bold 8px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(`⏳ -${slowPctLabel}% TIME`, WALL+6, 28);
}

function drawSling(){
  if(!drag) return;
  const pl=S.pl;
  const ps={x:pl.x,y:pl.y};
  const camY=S.cam;
  const dx=drag.sx-drag.cx,dy=drag.sy-drag.cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<4) return;
  const canFire=canLaunch();
  const pw=Math.min(dist,130)/130;
  const vx0=Math.cos(Math.atan2(dy,dx))*pw*upgVal('power');
  const vy0=Math.sin(Math.atan2(dy,dx))*pw*upgVal('power');

  ctx.save();ctx.globalAlpha=canFire?0.3:0.15;
  ctx.strokeStyle='#aa9955';ctx.lineWidth=1;ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(drag.sx,drag.sy);ctx.lineTo(drag.cx,drag.cy);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  const totalSteps=Math.floor(upgVal('preview')*3/Math.max(pw,0.15));
  const segs=simTrajectory(ps.x,ps.y,vx0,vy0,totalSteps);
  const maxSegs=upgLevels['preview']+1;
  const drawSegs=segs.slice(0,maxSegs);

  ctx.globalAlpha=canFire?1:0.3;
  drawSegs.forEach((seg,si)=>{
    const col=BOUNCE_COLORS[0];
    const n=seg.dots.length;
    seg.dots.forEach((d,di)=>{
      const t=di/Math.max(n-1,1);
      const fade=1-t*t;
      const r=Math.max(0.8,3*(1-t*0.5));
      const segAlpha=Math.pow(0.82,si);
      const alpha=fade*segAlpha;
      if(alpha<0.02) return;
      ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
      ctx.beginPath();ctx.arc(d.x,d.y-camY,r,0,Math.PI*2);ctx.fill();
    });
    if(seg.bounced&&si<drawSegs.length-1&&seg.dots.length>0){
      const last=seg.dots[seg.dots.length-1];
      const lsy=last.y-camY;
      ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},0.9)`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(last.x-4,lsy-4);ctx.lineTo(last.x+4,lsy+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(last.x+4,lsy-4);ctx.lineTo(last.x-4,lsy+4);ctx.stroke();
    }
  });
  ctx.globalAlpha=1;

  const bars=Math.ceil(pw*5);
  for(let i=0;i<5;i++){ctx.fillStyle=i<bars?(pw>.7?'#ff6633':'#ffcc44'):'rgba(255,255,255,.1)';ctx.fillRect(W-WALL-16,H-32-i*8,10,6);}
  ctx.fillStyle='#886633';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText('FORCE',W-WALL-2,H-10);ctx.textAlign='left';
  if(!canFire){ctx.fillStyle='rgba(255,80,80,0.8)';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('NO JUMPS LEFT',W/2,H-12);ctx.textAlign='left';}
  const aj=pl.airJumpsLeft;
  if(!pl.onG&&pl.coyote<=0&&maxAirJumps()>0){ctx.fillStyle='rgba(100,200,255,0.6)';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('AIR: '+aj+'/'+maxAirJumps(),W/2,H-24);ctx.textAlign='left';}
}

function drawFloats(){
  fctx.clearRect(0,0,W,H);fctx.textAlign='center';
  for(const f of floats){fctx.globalAlpha=f.life/55;fctx.fillStyle=f.color;fctx.font='bold 13px monospace';fctx.fillText(f.text,f.x,f.y);}
  fctx.globalAlpha=1;fctx.textAlign='left';
}

function drawSky(){
  const t=Math.max(0,Math.min(1,S.score/500));
  ctx.fillStyle=`rgb(${8+t*4|0},${8+t*3|0},${22+t*10|0})`;ctx.fillRect(0,0,W,H);
  const moonY=(((-2000-S.cam)%(H*8)+H*8)%(H*8))-H;
  if(moonY>-60&&moonY<H+60){
    ctx.fillStyle='rgba(255,240,180,0.12)';ctx.beginPath();ctx.arc(W/2,moonY,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(W/2,moonY,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#eeeac0';ctx.beginPath();ctx.arc(W/2+8,moonY-4,18,0,Math.PI*2);ctx.fill();
  }
  for(let i=0;i<120;i++){
    const sx=hashY(i*17.3)*W,wy=hashY(i*31.7)*H*10-H*5;
    const sy=((wy-S.cam)%(H*8)+H*8)%(H*8)-H;
    if(sy<0||sy>H) continue;
    const twink=0.4+0.6*Math.abs(Math.sin(S.tick*0.02+i));
    ctx.fillStyle=`rgba(255,245,200,${twink*0.9})`;
    const sr=hashY(i*7.1)<0.2?1.5:1;
    ctx.fillRect(sx|0,sy|0,sr,sr);
  }
}

function frame(){
  try{
    if(S.alive&&!paused){
        // timeSlowTimer counts in real frames (wall-clock), not game ticks.
        if(timeSlowTimer>0){
          timeSlowTimer--;
          if(timeSlowTimer<=0) timeScale=1.0;
        }
        // Always call update() once per frame — physics deltas are scaled by
        // timeScale inside update() so the game slows smoothly without ever
        // skipping update() calls (which was the freeze bug).
        update(S);
      }
      drawSky();
      drawCastleWall();
      drawWalls();
      for(const bt of S.bats) drawBat(bt);
      // Desired draw order: platforms, pickups, player, hazards, torches (player behind hazards)
      for(const p of S.plats) drawPlatform(p);
      for(const c of S.coins) drawGold(c);
      for(const h of S.hearts) drawHeart(h);
      drawKnight();
      drawMushrooms();
      for(const p of S.plats) drawSpikesOnPlat(p);
      drawTorches();
      // Time-slow overlay sits above world geometry
      drawTimeSlowOverlay();
      drawSling();
if(paused){ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,W,H);}
      const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
      vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.45)');
      ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
      ctx.fillStyle='rgba(0,0,0,0.04)';for(let i=0;i<H;i+=2)ctx.fillRect(0,i,W,1);
      if(S.pl.onG&&!drag&&!paused&&S.tick%60<38){
        const py=S.pl.y-S.cam+S.pl.h/2+22;
        ctx.fillStyle='rgba(255,220,120,.7)';ctx.font='bold 9px monospace';ctx.textAlign='center';
        ctx.fillText('DRAG ANYWHERE TO LAUNCH!',W/2,py);ctx.textAlign='left';
      }
      drawFloats();

  } catch (err){
    console.error('FRAME CRASH:', err);
    timeScale = 1.0;
    timeSlowTimer = 0;
    try{ drawFloats(); }catch(_){/* noop */}
  }
  requestAnimationFrame(frame);
}

// ── Shop / Pause ──────────────────────────────────────────────────────────────
function togglePause(){
  if(!S.alive) return;
  paused=!paused;
  const btn=document.getElementById('pausebtn');
  if(paused){
    // Reset time slow when pausing so the game never resumes at slowed speed
    timeScale=1.0;timeSlowTimer=0;
    btn.textContent='▶';saveGame(S);
    document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
    renderShop('pause');
    document.getElementById('pausemenu').style.display='block';
  } else {
    btn.textContent='⏸';
    document.getElementById('pausemenu').style.display='none';
    drag=null;
  }
}
function dieAndShowGO(){
  paused=false;document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').textContent='⏸';
  S.alive=false;saveGame(null);showGO(S);
}
function showGO(s){
  document.getElementById('pausebtn').style.display='none';
  document.getElementById('go-title').textContent=s.pl.hp<=0?'💀 FALLEN 💀':'⚔ SLAIN ⚔';
  document.getElementById('go-stats').textContent='FLOOR: '+s.score+'   ⚜ '+s.session_coins+'   BEST: '+best+' / '+lowest;
  renderShop('go');document.getElementById('go').style.display='block';
}

// ── renderShop ────────────────────────────────────────────────────────────────
// Each upgrade row now shows two stacked buttons:
//   [BUY ⚜ N]  — buy next rank (existing behaviour)
//   [SELL ⚜ N] — sell current rank for half what was paid (new)
// The sell button is greyed out if the upgrade is at rank 0.
function renderShop(which){
  const el=document.getElementById(which==='pause'?'upg-list-pause':'upg-list-go');
  el.innerHTML='';
  UPGRADES.forEach(u=>{
    const cost=upgCost(u.id),lvl=upgLevels[u.id];
    const capped=u.maxLvl!=null&&lvl>=u.maxLvl;
    const req=checkpointTierReq(u.id, lvl+1);
    const canBuy=!capped&&totalCoins>=cost&&req.ok;
    const sellPrice=upgSellPrice(u.id);
    const canSell=lvl>0;

    const div=document.createElement('div');div.className='upg'+((u.id==='cp_up'||u.id==='cp_down')?' checkpoint-upg':'');
    const buyLabel=capped?'MAX':(req&&req.ok? (totalCoins>=cost?'⚜ '+cost:'🔒 '+cost) : '⛔ '+(req.need||cost));
    const rankLabel=capped
      ?`RANK ${lvl} <span style="color:#ffaa44">(MAX)</span>`
      :`RANK ${lvl}${u.maxLvl!=null?' / '+u.maxLvl:''}`;
    const sellLabel=canSell?`SELL +${sellPrice}`:'SELL';

    div.innerHTML=`
      <div class="upg-info">
        <div class="upg-name">${u.icon} ${u.name}</div>
        <div class="upg-desc">${u.desc}</div>
        <div class="upg-lvl">${rankLabel}</div>
      </div>
      <div class="upg-btn-group">
        <button class="upg-btn${canBuy?'':' cant'}" onclick="buyUpg('${u.id}','${which}')">${buyLabel}</button>
        <button class="upg-btn sell-btn${canSell?'':' cant'}" onclick="sellUpg('${u.id}','${which}')">${sellLabel}</button>
      </div>`;
    el.appendChild(div);
  });
}

// ── buyUpg ────────────────────────────────────────────────────────────────────
function buyUpg(id,which){
  const u=UPGRADES.find(x=>x.id===id);
  if(u.maxLvl!=null&&upgLevels[id]>=u.maxLvl) return;
  const cost=upgCost(id);
  const req=checkpointTierReq(id, upgLevels[id]+1);
  if(!req.ok) return;
  if(totalCoins<cost) return;
  totalCoins-=cost;upgLevels[id]++;
  if(id==='maxhp'&&S&&S.alive){S.pl.maxHp=maxHP();S.pl.hp=Math.min(S.pl.hp+1,S.pl.maxHp);updateHeartsUI(S.pl);}
  if(id==='airjumps'&&S&&S.alive) S.pl.airJumpsLeft=Math.min(S.pl.airJumpsLeft+1,maxAirJumps());
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  if(which==='pause') document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
  renderShop(which);saveGame(S&&S.alive?S:null);
}

// ── sellUpg ───────────────────────────────────────────────────────────────────
// Refunds half of what the player paid for the most recently purchased rank.
// For example: if rank 3 cost 54⚜, selling rank 3 gives back 27⚜.
// Live state (HP, air jumps) is clamped down immediately if needed.
function sellUpg(id,which){
  if(upgLevels[id]<=0) return;
  const refund=upgSellPrice(id);
  upgLevels[id]--;
  totalCoins+=refund;

  // ── Live-state adjustments ──────────────────────────────────────────────────
  if(id==='maxhp'&&S&&S.alive){
    S.pl.maxHp=maxHP();
    S.pl.hp=Math.min(S.pl.hp,S.pl.maxHp);
    updateHeartsUI(S.pl);
  }
  if(id==='airjumps'&&S&&S.alive){
    S.pl.airJumpsLeft=Math.min(S.pl.airJumpsLeft,maxAirJumps());
  }
  // If the player sold the last rank of timeslow while a slow is active, cancel it
  if(id==='timeslow'&&upgLevels['timeslow']<=0){
    timeScale=1.0;timeSlowTimer=0;
  }

  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  if(which==='pause') document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
  renderShop(which);
  saveGame(S&&S.alive?S:null);
}

function restart(){
  floats=[];drag=null;paused=false;saveTimer=0;
  timeScale=1.0;timeSlowTimer=0;
  S=mkS(null);
  checkpointPhase=true; cpSelUp=1; cpSelDown=1; updateCheckpointUI();
  document.getElementById('go').style.display='none';
  document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').style.display='flex';
  document.getElementById('pausebtn').textContent='⏸';
  document.getElementById('hint').style.display='block';
  updateHeartsUI(S.pl);
}

(function boot(){
  console.log('Castle Climber build: v0.22-checkpoints');
  const save=loadSave();
  if(save){
    if(save.upgLevels){
      upgLevels=save.upgLevels;
      UPGRADES.forEach(u=>{if(upgLevels[u.id]==null)upgLevels[u.id]=0;});
    }
    if(save.totalCoins!=null) totalCoins=save.totalCoins;
    if(save.best!=null) best=save.best;
    if(save.lowest!=null) lowest=save.lowest;
  }
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  document.getElementById('best').textContent='BEST: '+best+' / '+lowest;
  S=mkS(save&&save.pos?save.pos:null);
  updateCheckpointUI();
  updateHeartsUI(S.pl);
  frame();
})();
</script>
