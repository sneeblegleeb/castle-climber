<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CASTLE CLIMBER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; font-family:monospace; display:flex; justify-content:center; align-items:center; }
#game-wrap { position:relative; background:#0a0a1a; overflow:hidden; }
canvas { display:block; image-rendering:pixelated; touch-action:none; position:absolute; top:0; left:0; }
#ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:#fff; text-align:center; pointer-events:none; letter-spacing:2px; z-index:5; }
#score { font-size:20px; color:#ffdd00; text-shadow:2px 2px #000; }
#best { font-size:12px; color:#aaffaa; }
#coindisp { font-size:13px; color:#ffcc00; margin-top:2px; }
#hearts { font-size:18px; margin-top:3px; letter-spacing:3px; }
#pausebtn, #fsbtn {
  position:absolute; top:10px;
  background:rgba(0,0,0,0.6); border:2px solid #888;
  color:#fff; font-family:monospace; font-size:16px;
  width:36px; height:36px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; z-index:10;
}
#pausebtn { right:10px; }
#fsbtn { right:54px; font-size:14px; }
#pausebtn:hover, #fsbtn:hover { border-color:#ffdd00; }
.panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,8,5,0.96); border:4px solid #aa8833;
  padding:24px 28px; text-align:center; color:#f0dfa0;
  min-width:260px; max-width:320px; max-height:88vh; overflow-y:auto;
  display:none; z-index:20;
  box-shadow: 0 0 30px rgba(180,120,0,0.3);
}
.panel h2 { font-size:22px; color:#ff6644; margin-bottom:6px; letter-spacing:3px; }
.panel .stats { font-size:11px; margin:4px 0 12px; color:#aa9966; }
.shop-title { color:#ffdd00; font-size:13px; letter-spacing:2px; margin-bottom:8px; text-align:center; }
.upg { display:flex; align-items:center; justify-content:space-between; margin:5px 0; gap:8px; border-bottom:1px solid #333; padding-bottom:5px; }
.upg-info { flex:1; text-align:left; }
.upg-name { font-size:11px; color:#f0dfa0; letter-spacing:1px; }
.upg-desc { font-size:9px; color:#886644; margin-top:1px; }
.upg-lvl { font-size:9px; color:#88cc88; margin-top:1px; }
.upg-btn { background:#2a1f0a; border:2px solid #886633; color:#ffdd00; font-family:monospace; font-size:10px; padding:4px 8px; cursor:pointer; white-space:nowrap; min-width:64px; text-align:center; }
.upg-btn:hover { background:#443311; border-color:#ffdd00; }
.upg-btn.cant { border-color:#333; color:#555; cursor:default; }
.panel-btns { display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
.panel-btns button { padding:8px 14px; background:#aa8833; border:2px solid #ffdd00; color:#000; font-size:11px; font-family:monospace; cursor:pointer; letter-spacing:1px; font-weight:bold; }
.panel-btns button.danger { background:#882222; border-color:#ff6644; color:#fff; }
.panel-btns button.wipe { background:#440000; border-color:#cc0000; color:#ff8888; font-size:10px; }
#hint { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); color:#887755; font-size:11px; text-align:center; width:280px; line-height:1.7; pointer-events:none; z-index:5; }
#floatcanvas { pointer-events:none; }
</style>
</head>
<body>
<div id="game-wrap">
<canvas id="c"></canvas>
<canvas id="floatcanvas"></canvas>
<div id="ui">
  <div id="score">FLOOR: 0</div>
  <div id="best">BEST: 0</div>
  <div id="coindisp">⚜ 0</div>
  <div id="hearts">❤️❤️❤️</div>
</div>
<button id="fsbtn" onclick="toggleFS()" title="Fullscreen">⛶</button>
<button id="pausebtn" onclick="togglePause()">⏸</button>

<div class="panel" id="go">
  <h2 id="go-title">⚔ SLAIN ⚔</h2>
  <div class="stats" id="go-stats"></div>
  <div><p class="shop-title">⚜ ROYAL UPGRADES ⚜</p><div id="upg-list-go"></div></div>
  <div class="panel-btns">
    <button onclick="restart()">⚔ CHARGE AGAIN</button>
    <button class="wipe" onclick="confirmWipe()">🗑 WIPE SAVE</button>
  </div>
</div>

<div class="panel" id="pausemenu">
  <h2>⚜ REST ⚜</h2>
  <div class="stats" id="pause-coins"></div>
  <div><p class="shop-title">⚜ ROYAL UPGRADES ⚜</p><div id="upg-list-pause"></div></div>
  <div class="panel-btns">
    <button onclick="togglePause()">▶ ONWARD</button>
    <button class="danger" onclick="dieAndShowGO()">✖ RETREAT</button>
  </div>
</div>

<div id="hint">DRAG ANYWHERE TO AIM · RELEASE TO LAUNCH</div>
</div>

<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const FC=document.getElementById('floatcanvas'),fctx=FC.getContext('2d');
const BW=360,BH=640;
const W=BW,H=BH,WALL=16;
let SC=1;
function resize(){
  SC=Math.min(window.innerWidth/BW,window.innerHeight/BH);
  const pw=Math.round(BW*SC)+'px',ph=Math.round(BH*SC)+'px';
  const wrap=document.getElementById('game-wrap');
  if(wrap){wrap.style.width=pw;wrap.style.height=ph;}
  [C,FC].forEach(cv=>{cv.width=BW;cv.height=BH;cv.style.width=pw;cv.style.height=ph;});
}
resize();
window.addEventListener('resize',resize);
function toggleFS(){
  const wrap=document.getElementById('game-wrap');
  const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
  if(!fsEl){const req=wrap.requestFullscreen||wrap.webkitRequestFullscreen||wrap.mozRequestFullScreen;if(req)req.call(wrap).catch(()=>{});}
  else{const ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen;if(ex)ex.call(document);}
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>setTimeout(resize,50)));
const SAVE_KEY='castle_climber_save_v2';

const UPGRADES=[
  {id:'power',    name:'TREBUCHET ARM',    desc:'Mightier launch force',                  icon:'⚔', base:15,  inc:0.9,   baseCost:60,  costMult:1.55},
  {id:'preview',  name:'WIZARD SIGHT',     desc:'Longer trajectory preview arc',          icon:'🔮',base:4,   inc:3,     baseCost:40,  costMult:1.4},
  {id:'friction', name:'IRON SABATONS',    desc:'Better grip upon the stonework',         icon:'🛡', base:0.82,inc:-0.04, baseCost:50,  costMult:1.5},
  {id:'gravity',  name:'FEATHERFALL RUNE', desc:'Enchantment lightens thy burden',        icon:'✨',base:0.42,inc:-0.02, baseCost:80,  costMult:1.6},
  {id:'bounce',   name:'RUNED GAUNTLETS',  desc:'Rebound harder off castle walls',        icon:'💎',base:0.6, inc:0.08,  baseCost:40,  costMult:1.4},
  {id:'coinmag',  name:'GILDED AURA',      desc:'Gold is drawn to thee from afar',        icon:'⚜', base:14,  inc:6,     baseCost:30,  costMult:1.35},
  {id:'coinrate', name:'FORTUNE BLESSING', desc:'More gold coins float through the castle',icon:'🪙',base:1.0, inc:0.4,   baseCost:50,  costMult:1.45},
  {id:'coyote',   name:"SQUIRE'S GRACE",   desc:'Extra moments to leap from ledges',      icon:'🐾',base:0,   inc:4,     baseCost:60,  costMult:1.5},
  {id:'airbrake', name:'CAPE OF CONTROL',  desc:'Thy cloak steadies thine arc',           icon:'🧣',base:1.0, inc:-0.03, baseCost:40,  costMult:1.4},
  {id:'coinval',  name:'ROYAL TITHE',      desc:"Each coin bears the king's bounty",      icon:'👑',base:1,   inc:1,     baseCost:100, costMult:1.7},
  {id:'maxhp',    name:'VITALITY OATH',    desc:'Gain an extra heart of health',          icon:'❤️',base:3,   inc:1,     baseCost:80,  costMult:1.8},
  {id:'fallres',  name:'IRONFLESH WARD',   desc:'Reduces fall damage taken',              icon:'🪨',base:0,   inc:0.15,  baseCost:55,  costMult:1.5},
  {id:'airjumps', name:'WINGED BOOTS',     desc:'Extra mid-air launches per flight',      icon:'🦅',base:0,   inc:1,     baseCost:120, costMult:1.9},
  {id:'batradius',name:'WARDING SIGIL',    desc:'Bats cannot agro within a wider radius', icon:'🔯',base:80,  inc:25,    baseCost:45,  costMult:1.45},
  {id:'heartrate',name:'BLESSED GROUNDS',  desc:'Hearts of healing appear more often',    icon:'💖',base:0.04,inc:0.025, baseCost:60,  costMult:1.55},
];

let upgLevels={};
UPGRADES.forEach(u=>upgLevels[u.id]=0);
let totalCoins=0,best=0,lowest=0;

function upgVal(id){const u=UPGRADES.find(x=>x.id===id);return u.base+upgLevels[id]*u.inc;}
function upgCost(id){const u=UPGRADES.find(x=>x.id===id);return Math.ceil(u.baseCost*Math.pow(u.costMult,upgLevels[id]));}
function maxHP(){return upgVal('maxhp')|0;}
function maxAirJumps(){return upgVal('airjumps')|0;}
function frictionVal(){return Math.max(0.05,upgVal('friction'));}
function airbrakeVal(){return Math.max(0.05,upgVal('airbrake'));}
function batAgroRadius(){return Math.min(upgVal('batradius'),H*0.45);}
function heartSpawnRate(){return upgVal('heartrate');}

// ── Difficulty scaling ────────────────────────────────────────────────────────
// Returns 0 at start, ramps smoothly to 1 at |worldY|=5000+
function diffFactor(worldY){
  const d=Math.max(0,Math.abs(worldY)-800); // safe zone: first 800 units
  return Math.min(1, d/4200);
}

// ── Persistence ───────────────────────────────────────────────────────────────
function saveGame(s){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({upgLevels,totalCoins,best,lowest,pos:s?{x:s.pl.x,y:s.pl.y,hp:s.pl.hp}:null}));}catch(e){}
}
function loadSave(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function wipeSave(){localStorage.removeItem(SAVE_KEY);upgLevels={};UPGRADES.forEach(u=>upgLevels[u.id]=0);totalCoins=0;best=0;lowest=0;}
function confirmWipe(){if(confirm('Wipe all progress? This cannot be undone.')){wipeSave();restart();}}

let S,drag=null,floats=[],paused=false,saveTimer=0;

function hashY(y){let h=Math.sin(y*127.1+311.7)*43758.5453;return h-Math.floor(h);}
function hash2(a,b){let h=Math.sin(a*127.1+b*311.7+92.3)*43758.5453;return h-Math.floor(h);}

function mkS(savedPos){
  const hp=maxHP();
  const sx=savedPos?savedPos.x:W/2,sy=savedPos?savedPos.y:0;
  const shp=savedPos?Math.min(savedPos.hp,hp):hp;
  const s={
    pl:{x:sx,y:sy,vx:0,vy:0,w:18,h:24,onG:false,coyote:0,
        hp:shp,maxHp:hp,hurtTimer:0,fallVy:0,damageFlash:0,airJumpsLeft:maxAirJumps()},
    cam:sy-H*.38,plats:[],coins:[],
    collectedCoins:new Set(),collectedHearts:new Set(),
    score:Math.floor(-sy/10),session_coins:0,alive:true,tick:0,
    bats:[],hearts:[],archers:[],arrows:[],
  };
  s.plats.push({x:sx-55,y:sy+55,w:110,h:14,icy:false,torch:false,id:0,spikes:[]});
  for(let i=0;i<8;i++) s.bats.push(mkBat(sy+(Math.random()-.5)*H*3,sy));
  gen(s);
  return s;
}

function mkBat(wy,plY){
  const minDist=batAgroRadius()+50;
  if(plY!==undefined&&Math.abs(wy-plY)<minDist) wy=wy<plY?plY-minDist:plY+minDist;
  return{x:WALL+10+Math.random()*(W-WALL*2-20),wy,vx:(Math.random()-.5)*1.0,
    flap:Math.random()*Math.PI*2,state:'idle',agroTimer:0,retreatTimer:0,dvx:0,dvy:0,hurtTimer:0};
}

function platId(wy){return Math.round(wy/10)||0;}

function gen(s){
  const margin=H*0.75,top=s.cam-margin,bot=s.cam+H+margin;
  let mn=Infinity,mx=-Infinity;
  for(const p of s.plats){if(p.y<mn)mn=p.y;if(p.y>mx)mx=p.y;}
  if(!s.plats.length){mn=s.pl.y;mx=s.pl.y;}
  let y=mx; while(y<bot){y+=65+Math.random()*85;if(y<bot)addP(s,y);}
  y=mn;     while(y>top){y-=65+Math.random()*85;if(y>top)addP(s,y);}

  const COIN_BAND=80,HEART_BAND=320;
  const cb0=Math.floor(top/COIN_BAND),cb1=Math.ceil(bot/COIN_BAND);
  for(let b=cb0;b<=cb1;b++) tryPlaceCoin(s,b*COIN_BAND,b);
  const hb0=Math.floor(top/HEART_BAND),hb1=Math.ceil(bot/HEART_BAND);
  for(let b=hb0;b<=hb1;b++) tryPlaceHeart(s,b*HEART_BAND,b);

  const idle=s.bats.filter(bt=>bt.state==='idle').length;
  let add=8-idle; while(add-->0) s.bats.push(mkBat(s.cam+(Math.random()-.5)*H*2,s.pl.y));

  // Archers scale with difficulty — max 6, only spawn once diff > ~0.1
  const df=diffFactor(s.pl.y);
  const maxArchers=Math.floor(df*6); // 0 at start → 6 at max depth
  if(s.archers.length<maxArchers){
    const need=maxArchers-s.archers.length;
    for(let i=0;i<need;i++) s.archers.push(mkArcher(s.cam,s.pl.y));
  }
}

function platOverlap(s,wx,wy,r){
  for(const p of s.plats)
    if(wx+r>p.x&&wx-r<p.x+p.w&&wy+r>p.y-2&&wy-r<p.y+p.h+2) return true;
  return false;
}

function tryPlaceCoin(s,wy,band){
  const spawnChance=Math.min(0.9,0.3+upgVal('coinrate')*0.18);
  if(hash2(band,42)>spawnChance) return;
  if(s.collectedCoins.has(band)) return;
  if(s.coins.some(c=>c.id===band)) return;
  const wx=WALL+14+hash2(band,40)*(W-WALL*2-28);
  let cy=wy+hash2(band,43)*30-15;
  for(let i=0;i<8;i++){if(!platOverlap(s,wx,cy,9))break;cy-=12;}
  s.coins.push({x:wx,y:cy,collected:false,bob:hash2(band,41)*Math.PI*2,id:band});
}

function tryPlaceHeart(s,wy,band){
  const hid='ht'+band;
  if(s.collectedHearts.has(hid)) return;
  if(s.hearts.some(h=>h.id===hid)) return;
  if(hash2(band,50)>heartSpawnRate()) return;
  const wx=WALL+18+hash2(band,51)*(W-WALL*2-36);
  let cy=wy+hash2(band,53)*40-20;
  for(let i=0;i<8;i++){if(!platOverlap(s,wx,cy,11))break;cy-=14;}
  s.hearts.push({x:wx,y:cy,collected:false,bob:hash2(band,52)*Math.PI*2,id:hid});
}

function addP(s,wy){
  const id=platId(wy);
  if(s.plats.some(p=>p.id===id)) return;
  const avail=W-WALL*2;
  const rng1=hash2(id,1),rng2=hash2(id,2),rng3=hash2(id,3),rng4=hash2(id,4);
  const w=52+rng1*84,x=WALL+6+rng2*(avail-w-12);
  const icy=rng3<0.18,torch=!icy&&rng4<0.3;
  // Spikes: difficulty-gated — none in safe zone, ramping up to ~35% of platforms at max depth
  const df=diffFactor(wy);
  const spikeRoll=hash2(id,88);
  const spikeThresh=df*0.35; // 0% → 35%
  const spikeData=spikeRoll<spikeThresh?genSpikes(x,w,id,df):[];
  s.plats.push({x,y:wy,w,h:14,icy,torch,id,spikes:spikeData});
}

function cull(s){
  const margin=H*0.75,t=s.cam-margin,b=s.cam+H+margin;
  s.plats=s.plats.filter(p=>p.y>t&&p.y<b);
  s.coins=s.coins.filter(c=>!c.collected&&c.y>t&&c.y<b);
  s.hearts=s.hearts.filter(h=>!h.collected&&h.y>t&&h.y<b);
  s.bats=s.bats.filter(bt=>bt.state!=='idle'||(bt.wy>t-H&&bt.wy<b+H));
  s.archers=s.archers.filter(a=>a.wy>t-H*1.5&&a.wy<b+H*1.5);
  s.arrows=s.arrows.filter(ar=>!ar.dead&&ar.wy>t-H&&ar.wy<b+H);
}

function addFloat(x,sy,text,color){floats.push({x,y:sy,vy:-1.4,life:55,text,color:color||'#ffdd00'});}

const FALL_THRESH=16,FALL_SEVERE=25;

// ── Bats ──────────────────────────────────────────────────────────────────────
const BAT_AGRO_RATE=0.04,BAT_AGRO_PERIOD=240,BAT_DIVE_SPEED=5,BAT_IDLE_SPEED=0.8;
function updateBats(s){
  const pl=s.pl;
  for(const bt of s.bats){
    bt.flap+=0.14;
    if(bt.hurtTimer>0) bt.hurtTimer--;
    if(bt.state==='idle'){
      bt.x+=bt.vx;bt.wy+=Math.sin(bt.flap*0.25)*0.3;
      if(bt.x<WALL+8||bt.x>W-WALL-8) bt.vx*=-1;
      bt.vx=Math.max(-BAT_IDLE_SPEED,Math.min(BAT_IDLE_SPEED,bt.vx));
      const bsy=bt.wy-s.cam,dist=Math.sqrt((bt.x-pl.x)**2+(bt.wy-pl.y)**2);
      if(bsy>-50&&bsy<H+50&&!paused&&dist>batAgroRadius()&&s.tick%BAT_AGRO_PERIOD===0&&Math.random()<BAT_AGRO_RATE){
        bt.state='agro';bt.agroTimer=90+Math.random()*60;
      }
    } else if(bt.state==='agro'){
      bt.flap+=0.06;bt.x+=bt.vx*1.2;bt.wy+=(pl.y-bt.wy)*0.008;
      if(bt.x<WALL+8||bt.x>W-WALL-8) bt.vx*=-1;
      if(--bt.agroTimer<=0){
        bt.state='diving';
        const dx=pl.x-bt.x,dy=pl.y-bt.wy,d=Math.sqrt(dx*dx+dy*dy)||1;
        bt.dvx=dx/d*BAT_DIVE_SPEED;bt.dvy=dy/d*BAT_DIVE_SPEED;
      }
    } else if(bt.state==='diving'){
      bt.x+=bt.dvx;bt.wy+=bt.dvy;
      const dx=pl.x-bt.x,dy=pl.y-bt.wy;
      if(Math.sqrt(dx*dx+dy*dy)<20){takeDamage(s,1,'🦇 HIT!');bt.state='retreating';bt.retreatTimer=100;bt.dvx*=-0.7;bt.dvy=-3;bt.hurtTimer=20;}
      const bsy=bt.wy-s.cam;
      if(bsy<-H||bsy>H*2||bt.x<WALL||bt.x>W-WALL){bt.state='retreating';bt.retreatTimer=80;bt.dvx*=-0.5;bt.dvy=-2;}
    } else if(bt.state==='retreating'){
      bt.x+=bt.dvx*0.88;bt.wy+=bt.dvy;bt.dvx*=0.9;bt.dvy*=0.88;
      if(--bt.retreatTimer<=0){bt.state='idle';bt.vx=(Math.random()-.5)*BAT_IDLE_SPEED*2;}
    }
  }
}

// ── Spikes ────────────────────────────────────────────────────────────────────
function genSpikes(px,pw,id,df){
  const spikes=[];
  // At low difficulty: 1 small cluster. At high: up to 3 clusters.
  const maxClusters=1+Math.floor(df*2.5);
  const count=1+Math.floor(hash2(id,77)*(maxClusters-0.01));
  for(let c=0;c<count;c++){
    const cx=px+10+hash2(id,c+100)*(pw-20);
    const n=2+Math.floor(hash2(id,c+200)*(df>0.5?2:1)); // more spikes per cluster deeper in
    for(let i=0;i<n;i++) spikes.push({x:cx+(i-(n-1)/2)*7});
  }
  return spikes;
}

function checkSpikes(s){
  if(s.pl.hurtTimer>0) return;
  const pl=s.pl,plL=pl.x-pl.w/2,plR=pl.x+pl.w/2,plB=pl.y+pl.h/2;
  for(const p of s.plats){
    if(!p.spikes||!p.spikes.length) continue;
    const sy=p.y;
    if(plB<sy-8||plB>sy+4) continue;
    for(const sp of p.spikes){
      if(plR>sp.x-3&&plL<sp.x+3){
        takeDamage(s,1,'🩸 SPIKE!');pl.vx=(pl.x<sp.x?-1:1)*4;pl.vy=-3;return;
      }
    }
  }
}

// ── Skeleton Archers ──────────────────────────────────────────────────────────
const ARCHER_SHOOT_INTERVAL=300;
const ARROW_SPEED=4.5;

function mkArcher(cam,plY){
  const side=Math.random()<0.5?'left':'right';
  // Perch: a small stone ledge jutting from the wall
  const x=side==='left'?WALL+2:W-WALL-2;
  const wy=cam+(Math.random()-0.3)*H*1.5;
  return{x,wy,side,shootTimer:Math.floor(Math.random()*ARCHER_SHOOT_INTERVAL),frame:0,alive:true};
}

function hasLOS(s,ax,awy,px,py,side){
  // 180-degree FOV: archer faces inward (left archer faces right, right faces left).
  // Player must be on the correct side horizontally (or directly above/below).
  // "directly above/below" = within a generous horizontal band so vertical shots work.
  const facingRight=side==='left';
  const dx=px-ax;
  // Allow shots if player is in the forward hemisphere OR within ±20px horizontally
  // (so the archer can shoot straight up/down when player is almost directly above).
  if(facingRight&&dx<-20) return false;   // player is behind left-wall archer
  if(!facingRight&&dx>20) return false;   // player is behind right-wall archer

  // Ray cast — check platform occlusion
  const dy=py-awy,steps=40;
  for(let i=1;i<steps;i++){
    const rx=ax+dx*(i/steps),ry=awy+dy*(i/steps);
    for(const p of s.plats) if(rx>p.x&&rx<p.x+p.w&&ry>p.y&&ry<p.y+p.h) return false;
  }
  return true;
}

function updateArchers(s){
  const pl=s.pl;
  for(const ar of s.archers){
    ar.frame++;ar.shootTimer--;
    if(ar.shootTimer<=0){
      ar.shootTimer=ARCHER_SHOOT_INTERVAL;
      const asy=ar.wy-s.cam;
      if(asy>-80&&asy<H+80&&hasLOS(s,ar.x,ar.wy,pl.x,pl.y,ar.side)){
        // Arrow spawns from bow position (inset from wall, at torso height)
        const bowOffX = ar.side==='left' ? 26 : -26;
        const bowWy   = ar.wy - 30; // bow is ~30px above feet (torso/arm height)
        const dx=pl.x-(ar.x+bowOffX), dy=pl.y-bowWy;
        const dist=Math.sqrt(dx*dx+dy*dy)||1;
        // Gravity-compensated aim: solve for launch angle that hits target
        // using ballistic formula  vy0 = dy/t - 0.5*g*t,  vx0 = dx/t
        // pick travel time t = dist / ARROW_SPEED, then correct vy for gravity drop
        const g=0.18;
        const t=dist/ARROW_SPEED;
        const vx=(dx/dist)*ARROW_SPEED;
        const vy=dy/t - 0.5*g*t;  // compensate for gravity over travel time
        // Clamp so arrows don't go absurdly fast on very close shots
        const spd=Math.sqrt(vx*vx+vy*vy);
        const maxSpd=ARROW_SPEED*2.2;
        const scale=spd>maxSpd?maxSpd/spd:1;
        s.arrows.push({x:ar.x+bowOffX, wy:bowWy, vx:vx*scale, vy:vy*scale, dead:false});
      }
    }
  }
}

function updateArrows(s){
  const pl=s.pl;
  for(const ar of s.arrows){
    if(ar.dead) continue;
    ar.wy+=ar.vy;ar.x+=ar.vx;ar.vy+=0.18;
    let hit=false;
    for(const p of s.plats) if(ar.x>p.x&&ar.x<p.x+p.w&&ar.wy>p.y&&ar.wy<p.y+p.h){hit=true;break;}
    if(hit||ar.x<WALL||ar.x>W-WALL){ar.dead=true;continue;}
    const dx=ar.x-pl.x,dy=ar.wy-pl.y;
    if(Math.sqrt(dx*dx+dy*dy)<12){ar.dead=true;takeDamage(s,1,'🏹 ARROW!');}
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(s){
  s.tick++;
  const pl=s.pl,prevY=pl.y,prevX=pl.x;
  const grav=upgVal('gravity'),ab=airbrakeVal();
  if(pl.vy>0) pl.fallVy=Math.max(pl.fallVy,pl.vy);
  pl.vy+=grav;if(!pl.onG)pl.vx*=ab;pl.x+=pl.vx;pl.y+=pl.vy;
  if(pl.hurtTimer>0)pl.hurtTimer--;if(pl.damageFlash>0)pl.damageFlash--;
  const bounce=upgVal('bounce');
  if(pl.x-pl.w/2<WALL){pl.x=WALL+pl.w/2;pl.vx=Math.abs(pl.vx)*bounce;}
  if(pl.x+pl.w/2>W-WALL){pl.x=W-WALL-pl.w/2;pl.vx=-Math.abs(pl.vx)*bounce;}
  if(pl.onG){pl.coyote=upgVal('coyote')|0;pl.airJumpsLeft=maxAirJumps();}
  else if(pl.coyote>0) pl.coyote--;
  pl.onG=false;
  for(const p of s.plats){
    const plL=pl.x-pl.w/2,plR=pl.x+pl.w/2,plT=pl.y-pl.h/2,plF=pl.y+pl.h/2;
    const prF=prevY+pl.h/2,prT=prevY-pl.h/2,prR=prevX+pl.w/2,prL=prevX-pl.w/2;
    const pR=p.x+p.w,pB=p.y+p.h;
    if(plR<=p.x||plL>=pR||plF<=p.y||plT>=pB) continue;
    const fromTop=prF<=p.y,fromBot=prT>=pB,fromL=prR<=p.x,fromR=prL>=pR;
    const lf=p.icy?0.99:frictionVal();
    if(fromTop){
      if(pl.fallVy>=FALL_THRESH){const resist=upgVal('fallres');let dmg=pl.fallVy>=FALL_SEVERE?2:1;dmg=Math.max(0,dmg-Math.floor(resist));if(dmg>0&&Math.random()>resist-Math.floor(resist))takeDamage(s,dmg,'FALL!');}
      pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;
    } else if(fromBot){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
    else if(fromL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
    else if(fromR){pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    else{
      const dT=Math.abs(plF-p.y),dB=Math.abs(plT-pB),dL=Math.abs(plR-p.x),dR=Math.abs(plL-pR);
      const m=Math.min(dT,dB,dL,dR);
      if(m===dT){pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;}
      else if(m===dB){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
      else if(m===dL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
      else{pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    }
  }
  if(pl.vy<0) pl.fallVy=0;

  const mag=upgVal('coinmag'),val=upgVal('coinval')|0;
  for(const coin of s.coins){
    if(coin.collected) continue;
    coin.bob+=0.05;
    const dx=pl.x-coin.x,dy=pl.y-coin.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<mag*2.5&&dist>mag){coin.x+=dx/dist*3;coin.y+=dy/dist*3;}
    if(dist<mag){coin.collected=true;s.collectedCoins.add(coin.id);s.session_coins+=val;totalCoins+=val;addFloat(coin.x,coin.y-s.cam,val>1?'+'+val+' ⚜':'+⚜','#ffcc44');}
  }
  for(const heart of s.hearts){
    if(heart.collected) continue;
    heart.bob+=0.04;
    const dx=pl.x-heart.x,dy=pl.y-heart.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<18){
      heart.collected=true;s.collectedHearts.add(heart.id);
      if(pl.hp<pl.maxHp){pl.hp=Math.min(pl.maxHp,pl.hp+1);addFloat(heart.x,heart.y-s.cam,'❤️ +1','#ff88aa');updateHeartsUI(pl);}
      else addFloat(heart.x,heart.y-s.cam,'FULL','#ff88aa');
    }
  }
  updateBats(s);checkSpikes(s);updateArchers(s);updateArrows(s);
  s.cam+=(pl.y-H*.4-s.cam)*.07;
  s.score=Math.floor(-pl.y/10);
  if(s.score>best)best=s.score;if(s.score<lowest)lowest=s.score;
  floats=floats.filter(f=>{f.y+=f.vy;f.life--;return f.life>0;});
  gen(s);cull(s);
  if(++saveTimer>300){saveTimer=0;saveGame(s);}
  document.getElementById('score').textContent='FLOOR: '+s.score;
  document.getElementById('best').textContent='BEST: '+best+' / '+lowest;
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  updateHeartsUI(pl);
  if(pl.y-s.cam>H+220){pl.hp=0;killPlayer(s);}
}

function takeDamage(s,dmg,label){
  const pl=s.pl;if(pl.hurtTimer>0)return;
  pl.hp=Math.max(0,pl.hp-dmg);pl.hurtTimer=60;pl.damageFlash=20;
  addFloat(pl.x,pl.y-s.cam-20,label||'-'+dmg+'❤️','#ff4444');
  updateHeartsUI(pl);if(pl.hp<=0)killPlayer(s);
}
function killPlayer(s){s.alive=false;saveGame(null);showGO(s);}
function updateHeartsUI(pl){
  const mhp=pl.maxHp||maxHP();let h='';
  for(let i=0;i<mhp;i++)h+=i<pl.hp?'❤️':'🖤';
  document.getElementById('hearts').textContent=h;
}

function xy(e){const r=C.getBoundingClientRect(),t=e.touches?(e.touches[0]||e.changedTouches[0]):e;return{x:(t.clientX-r.left)/SC,y:(t.clientY-r.top)/SC};}
C.addEventListener('touchstart',e=>{e.preventDefault();if(!paused)dn(xy(e));},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(!paused)mv(xy(e));},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(!paused)up();},{passive:false});
C.addEventListener('mousedown',e=>{if(!paused)dn(xy(e));});
window.addEventListener('mousemove',e=>{if(!paused)mv(xy(e));});
window.addEventListener('mouseup',()=>{if(!paused)up();});

function canLaunch(){const pl=S.pl;return pl.onG||pl.coyote>0||pl.airJumpsLeft>0;}
function dn(p){if(!S.alive)return;drag={sx:p.x,sy:p.y,cx:p.x,cy:p.y};document.getElementById('hint').style.display='none';}
function mv(p){if(drag)drag={...drag,cx:p.x,cy:p.y};}
function up(){
  if(!drag||!S.alive){drag=null;return;}
  const dx=drag.cx-drag.sx,dy=drag.cy-drag.sy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<8){drag=null;return;}
  if(!canLaunch()){drag=null;return;}
  const d=Math.min(dist,130),a=Math.atan2(dy,dx),pw=d/130;
  S.pl.vx=-Math.cos(a)*pw*upgVal('power');S.pl.vy=-Math.sin(a)*pw*upgVal('power');
  if(!S.pl.onG&&S.pl.coyote<=0) S.pl.airJumpsLeft=Math.max(0,S.pl.airJumpsLeft-1);
  S.pl.onG=false;drag=null;
}

// ── Trajectory ────────────────────────────────────────────────────────────────
const BOUNCE_COLORS=[[255,200,80],[80,200,255],[180,80,255],[80,255,120],[255,140,40]];
function simTrajectory(sx,sy,vx0,vy0,totalSteps){
  const grav=upgVal('gravity'),ab=airbrakeVal(),bc=upgVal('bounce'),pf=frictionVal();
  const hw=9,hh=12;let tx=sx,ty=sy,tvx=vx0,tvy=vy0;
  const segs=[{dots:[],bounced:false,bi:0}];
  for(let i=0;i<totalSteps;i++){
    const ptx=tx,pty=ty;tvy+=grav;tvx*=ab;tx+=tvx;ty+=tvy;
    let hit=false;
    if(tx-hw<=WALL){tx=WALL+hw;tvx=Math.abs(tvx)*bc;hit=true;}
    else if(tx+hw>=W-WALL){tx=W-WALL-hw;tvx=-Math.abs(tvx)*bc;hit=true;}
    if(!hit){
      for(const p of S.plats){
        const pR=p.x+p.w,pB=p.y+p.h;
        if(tx+hw<=p.x||tx-hw>=pR||ty+hh<=p.y||ty-hh>=pB) continue;
        const fromTop=(pty+hh)<=p.y,fromBot=(pty-hh)>=pB,fromLeft=(ptx+hw)<=p.x,fromRight=(ptx-hw)>=pR;
        if(fromTop){ty=p.y-hh;tvy=-Math.abs(tvy)*0.5;tvx*=pf;hit=true;}
        else if(fromBot){ty=pB+hh;tvy=Math.abs(tvy)*0.3;hit=true;}
        else if(fromLeft){tx=p.x-hw;tvx=-Math.abs(tvx)*bc;hit=true;}
        else if(fromRight){tx=pR+hw;tvx=Math.abs(tvx)*bc;hit=true;}
        else{ty=p.y-hh;tvy=-Math.abs(tvy)*0.5;tvx*=pf;hit=true;}
        break;
      }
    }
    segs[segs.length-1].dots.push({x:tx,y:ty});
    if(hit){segs[segs.length-1].bounced=true;segs.push({dots:[],bounced:false,bi:segs.length});}
  }
  if(segs[segs.length-1].dots.length===0) segs.pop();
  return segs;
}

function drawCastleWall(){
  const bH=16,bW=32,topWorldRow=Math.floor(S.cam/bH);
  for(let row=topWorldRow-1;row<=topWorldRow+Math.ceil(H/bH)+1;row++){
    const off=(row%2===0)?0:bW/2,wy=Math.round((row*bH)-S.cam);
    const shade=row%3===0?'#2a2520':row%3===1?'#252018':'#221e15';
    for(let col=-1;col<=Math.ceil(W/bW)+1;col++){
      const bx=Math.round(col*bW+off);
      if(bx+bW<0||bx>W||wy+bH<0||wy>H) continue;
      ctx.fillStyle=shade;ctx.fillRect(bx,wy,bW-2,bH-2);
      ctx.fillStyle='#141210';ctx.fillRect(bx,wy+bH-2,bW,2);ctx.fillRect(bx+bW-2,wy,2,bH);
      if(hash2(row,col)<0.12){ctx.fillStyle='#0e0c0a';ctx.fillRect(bx+8,wy+4,1,6);}
    }

}

  const bowX=ox+18;
  ctx.strokeStyle='#8b6020';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(bowX,sy-40);ctx.quadraticCurveTo(bowX+8,sy-30,bowX,sy-20);ctx.stroke();
  ctx.strokeStyle='#6a4810';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(bowX+1,sy-40);ctx.quadraticCurveTo(bowX+7,sy-30,bowX+1,sy-20);ctx.stroke();
  ctx.fillStyle='#5a3818';ctx.fillRect(bowX-1,sy-33,3,7);
  ctx.fillStyle='#7a5030';ctx.fillRect(bowX-1,sy-33,1,7);
  const pull=charging?chargeT*5:0;
  ctx.strokeStyle='#d4c88e';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(bowX,sy-40);ctx.lineTo(bowX-pull,sy-30);ctx.lineTo(bowX,sy-20);ctx.stroke();

  // ── Nocked arrow ──
  if(charging){
    ctx.globalAlpha=0.6+chargeT*0.4;
    ctx.fillStyle='#aa7722';ctx.fillRect(ox+4,sy-31,bowX-pull-ox-5,2);
    ctx.fillStyle='#999';ctx.fillRect(bowX,sy-32,5,4);
    ctx.fillStyle='#ccc';ctx.fillRect(bowX+1,sy-32,2,1);
    ctx.fillStyle='#884422';ctx.fillRect(ox+4,sy-33,3,4);ctx.fillRect(ox+5,sy-33,1,5);
    if(chargeT>0.5){ctx.fillStyle=`rgba(255,200,50,${(chargeT-0.5)*0.6})`;ctx.fillRect(bowX-pull-1,sy-32,3,4);}
    ctx.globalAlpha=1;
  }

  // ── Quiver ──
  ctx.fillStyle='#3a2810';ctx.fillRect(ox-8,sy-38,5,16);
  ctx.fillStyle='#2a1e0c';ctx.fillRect(ox-8,sy-38,5,3);
  ctx.fillStyle='#aa8833';ctx.fillRect(ox-7,sy-42,1,6);ctx.fillRect(ox-5,sy-43,1,7);ctx.fillRect(ox-3,sy-41,1,5);
  ctx.fillStyle='#888';ctx.fillRect(ox-7,sy-43,1,2);ctx.fillRect(ox-5,sy-44,1,2);ctx.fillRect(ox-3,sy-42,1,2);

  ctx.restore();
}

function drawArrows(){
  for(const ar of S.arrows){
    if(ar.dead) continue;
    const sy=(ar.wy-S.cam)|0,angle=Math.atan2(ar.vy,ar.vx);
    ctx.save();ctx.translate(ar.x|0,sy);ctx.rotate(angle);
    ctx.fillStyle='#cc8833';ctx.fillRect(-9,-1,18,2);
    ctx.fillStyle='#aaa';ctx.fillRect(7,-2,4,4);
    ctx.fillStyle='#995500';ctx.fillRect(-9,-2,4,4);
    // Arrow shaft wood grain
    ctx.fillStyle='rgba(0,0,0,0.2)';ctx.fillRect(-8,0,16,1);
    ctx.restore();
  }
}

function drawGold(coin){
  if(coin.collected) return;
  const sy=(coin.y-S.cam+Math.sin(coin.bob)*3)|0;
  const g=ctx.createRadialGradient(coin.x,sy,0,coin.x,sy,12);
  g.addColorStop(0,'rgba(255,220,80,0.3)');g.addColorStop(1,'rgba(255,180,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(coin.x,sy,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc9900';ctx.fillRect((coin.x-6)|0,(sy-6)|0,12,12);
  ctx.fillStyle='#ffcc00';ctx.fillRect((coin.x-5)|0,(sy-6)|0,10,12);
  ctx.fillStyle='#ffe066';ctx.fillRect((coin.x-4)|0,(sy-5)|0,8,10);
  ctx.fillStyle='#fff8aa';ctx.fillRect((coin.x-3)|0,(sy-4)|0,3,3);
  ctx.fillStyle='#aa7700';
  ctx.fillRect((coin.x-1)|0,(sy-3)|0,2,6);ctx.fillRect((coin.x-3)|0,(sy-1)|0,6,2);ctx.fillRect((coin.x-1)|0,(sy-5)|0,2,2);
}

function drawHeart(heart){
  if(heart.collected) return;
  const sy=(heart.y-S.cam+Math.sin(heart.bob)*3)|0,hx=heart.x|0;
  const grd=ctx.createRadialGradient(hx,sy,0,hx,sy,16);
  grd.addColorStop(0,'rgba(255,100,140,0.35)');grd.addColorStop(1,'rgba(255,50,80,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(hx,sy,16,0,Math.PI*2);ctx.fill();
  const px=(x,y,w,h)=>ctx.fillRect(hx-6+x,sy-5+y,w,h);
  ctx.fillStyle='#cc2244';
  px(1,0,3,2);px(5,0,3,2);px(0,1,4,2);px(4,1,4,2);px(0,2,9,3);px(1,5,7,2);px(2,7,5,2);px(3,9,3,1);px(4,10,1,1);
  ctx.fillStyle='#ff6688';px(1,1,2,1);px(5,1,2,1);ctx.fillStyle='#ff99aa';px(1,2,1,1);
}

function drawKnight(){
  const pl=S.pl;
  const flash=pl.damageFlash>0&&Math.floor(pl.damageFlash/4)%2===0;
  if(flash) ctx.globalAlpha=0.35;
  const x=(pl.x-pl.w/2)|0,y=(pl.y-pl.h/2-S.cam)|0,w=pl.w,h=pl.h;
  const moving=Math.abs(pl.vx)>0.5,legOff=pl.onG&&moving?Math.sin(S.tick*0.3)*3:0;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x+w/2,y+h+3,w/2-2,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555566';ctx.fillRect(x+2,y+h-8,6,8+legOff);ctx.fillRect(x+w-8,y+h-8,6,8-legOff);
  ctx.fillStyle='#8888aa';ctx.fillRect(x+3,y+h-7,4,2);ctx.fillRect(x+w-7,y+h-7,4,2);
  ctx.fillStyle='#446688';ctx.fillRect(x+1,y+8,w-2,h-14);
  ctx.fillStyle='#6699bb';ctx.fillRect(x+2,y+8,w-4,h-16);
  ctx.fillStyle='#4477aa';ctx.fillRect(x+4,y+10,w-8,4);
  ctx.fillStyle='#88aacc';ctx.fillRect(x+5,y+11,w-10,2);
  ctx.fillStyle='#8a6a30';ctx.fillRect(x+2,y+h-10,w-4,3);
  ctx.fillStyle='#ffcc44';ctx.fillRect(x+w/2-2,y+h-10,4,3);
  ctx.fillStyle='#557799';ctx.fillRect(x-2,y+8,6,6);ctx.fillRect(x+w-4,y+8,6,6);
  ctx.fillStyle='#88aacc';ctx.fillRect(x-1,y+9,4,2);ctx.fillRect(x+w-3,y+9,4,2);
  ctx.fillStyle='#445566';ctx.fillRect(x+2,y,w-4,10);
  ctx.fillStyle='#6688aa';ctx.fillRect(x+3,y+1,w-6,8);
  ctx.fillStyle='#111';ctx.fillRect(x+4,y+4,w-8,2);
  ctx.fillStyle='rgba(255,100,0,0.4)';ctx.fillRect(x+5,y+4,w-10,1);
  ctx.fillStyle='#cc2222';
  for(let i=0;i<5;i++){const pw2=Math.sin(S.tick*0.15+i)*1.5;ctx.fillRect(x+w/2-1,y-4-i+pw2,2,3);}
  ctx.fillStyle='#ff4444';ctx.fillRect(x+w/2-1,y-2,2,4);
  ctx.fillStyle='#8b0000';ctx.fillRect(x-5,y+10,7,12);
  ctx.fillStyle='#cc2222';ctx.fillRect(x-4,y+11,5,10);
  ctx.fillStyle='#ffcc00';ctx.fillRect(x-2,y+14,1,4);ctx.fillRect(x-4,y+16,5,1);
  ctx.save();ctx.translate(x+w+2,y+12);ctx.rotate(pl.onG?0.2:-0.6);
  ctx.fillStyle='#aabbcc';ctx.fillRect(-1,-14,2,14);
  ctx.fillStyle='#888';ctx.fillRect(-1,0,2,4);
  ctx.fillStyle='#cc9900';ctx.fillRect(-4,-1,8,2);
  ctx.fillStyle='#eee';ctx.fillRect(0,-14,1,10);
  ctx.restore();
  if(flash) ctx.globalAlpha=1;
  const aj=pl.airJumpsLeft;
  if(aj>0&&!pl.onG){
    for(let i=0;i<aj;i++){
      ctx.fillStyle='rgba(100,200,255,0.8)';ctx.beginPath();ctx.arc(x+w/2-4+i*8,y-10,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(200,240,255,0.9)';ctx.beginPath();ctx.arc(x+w/2-4+i*8,y-10,1.5,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawBat(bt){
  const sy=(bt.wy-S.cam)|0;
  if(sy<-30||sy>H+30) return;
  const agro=bt.state==='agro'||bt.state==='diving',flash=bt.hurtTimer>0&&Math.floor(bt.hurtTimer/3)%2===0;
  const wing=Math.sin(bt.flap)*(agro?10:6);
  if(flash) ctx.globalAlpha=0.4;
  if(agro&&bt.state==='agro'){ctx.fillStyle='rgba(255,140,0,0.12)';ctx.beginPath();ctx.arc(bt.x,sy,10,0,Math.PI*2);ctx.fill();}
  if(agro&&bt.state==='diving'){ctx.fillStyle='rgba(255,100,0,0.18)';ctx.beginPath();ctx.arc(bt.x,sy,12,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=agro?'#3d1010':'#2a2040';
  ctx.fillRect((bt.x-3)|0,(sy-2)|0,6,5);
  ctx.fillRect((bt.x-12)|0,(sy-2+wing)|0,9,4);ctx.fillRect((bt.x+3)|0,(sy-2+wing)|0,9,4);
  ctx.fillRect((bt.x-14)|0,(sy+1+wing)|0,3,2);ctx.fillRect((bt.x+11)|0,(sy+1+wing)|0,3,2);
  ctx.fillStyle=agro?'#5a1818':'#3d3060';
  ctx.fillRect((bt.x-11)|0,(sy-1+wing)|0,7,2);ctx.fillRect((bt.x+4)|0,(sy-1+wing)|0,7,2);
  ctx.fillStyle=bt.state==='diving'?'#ff6600':agro?'#cc6600':'#441111';
  ctx.fillRect((bt.x-2)|0,(sy-1)|0,1,1);ctx.fillRect((bt.x+1)|0,(sy-1)|0,1,1);
  if(flash) ctx.globalAlpha=1;
}

function drawSling(){
  if(!drag) return;
  const pl=S.pl,camY=S.cam;
  const dx=drag.sx-drag.cx,dy=drag.sy-drag.cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<4) return;
  const canFire=canLaunch(),pw=Math.min(dist,130)/130;
  const vx0=Math.cos(Math.atan2(dy,dx))*pw*upgVal('power');
  const vy0=Math.sin(Math.atan2(dy,dx))*pw*upgVal('power');
  ctx.save();ctx.globalAlpha=canFire?0.3:0.15;ctx.strokeStyle='#aa9955';ctx.lineWidth=1;ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(drag.sx,drag.sy);ctx.lineTo(drag.cx,drag.cy);ctx.stroke();ctx.setLineDash([]);ctx.restore();
  const totalSteps=Math.floor(upgVal('preview')*2.6);
  const segs=simTrajectory(pl.x,pl.y,vx0,vy0,totalSteps);
  const drawSegs=segs.slice(0,2);
  ctx.globalAlpha=canFire?1:0.3;
  drawSegs.forEach((seg,si)=>{
    const col=BOUNCE_COLORS[0],n=seg.dots.length;
    seg.dots.forEach((d,di)=>{
      const t=di/Math.max(n-1,1),fade=1-t*t,r=Math.max(0.8,3*(1-t*0.5)),alpha=fade*(si===0?1:0.85);
      if(alpha<0.02) return;
      ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
      ctx.beginPath();ctx.arc(d.x,d.y-camY,r,0,Math.PI*2);ctx.fill();
    });
    if(seg.bounced&&si<drawSegs.length-1&&seg.dots.length>0){
      const last=seg.dots[seg.dots.length-1],lsy=last.y-camY,nc=BOUNCE_COLORS[0];
      ctx.strokeStyle=`rgba(${nc[0]},${nc[1]},${nc[2]},0.9)`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(last.x-4,lsy-4);ctx.lineTo(last.x+4,lsy+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(last.x+4,lsy-4);ctx.lineTo(last.x-4,lsy+4);ctx.stroke();
    }
  });
  ctx.globalAlpha=1;
  const bars=Math.ceil(pw*5);
  for(let i=0;i<5;i++){ctx.fillStyle=i<bars?(pw>.7?'#ff6633':'#ffcc44'):'rgba(255,255,255,.1)';ctx.fillRect(W-WALL-16,H-32-i*8,10,6);}
  ctx.fillStyle='#886633';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText('FORCE',W-WALL-2,H-10);ctx.textAlign='left';
  if(!canFire){ctx.fillStyle='rgba(255,80,80,0.8)';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('NO JUMPS LEFT',W/2,H-12);ctx.textAlign='left';}
  const aj=pl.airJumpsLeft;
  if(!pl.onG&&pl.coyote<=0&&maxAirJumps()>0){ctx.fillStyle='rgba(100,200,255,0.6)';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('AIR: '+aj+'/'+maxAirJumps(),W/2,H-24);ctx.textAlign='left';}
}

function drawFloats(){
  fctx.clearRect(0,0,W,H);fctx.textAlign='center';
  for(const f of floats){fctx.globalAlpha=f.life/55;fctx.fillStyle=f.color;fctx.font='bold 13px monospace';fctx.fillText(f.text,f.x,f.y);}
  fctx.globalAlpha=1;fctx.textAlign='left';
}

function drawSky(){
  const t=Math.max(0,Math.min(1,S.score/500));
  ctx.fillStyle=`rgb(${8+t*4|0},${8+t*3|0},${22+t*10|0})`;ctx.fillRect(0,0,W,H);
  const moonY=(((-2000-S.cam)%(H*8)+H*8)%(H*8))-H;
  if(moonY>-60&&moonY<H+60){
    ctx.fillStyle='rgba(255,240,180,0.12)';ctx.beginPath();ctx.arc(W/2,moonY,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(W/2,moonY,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#eeeac0';ctx.beginPath();ctx.arc(W/2+8,moonY-4,18,0,Math.PI*2);ctx.fill();
  }
  for(let i=0;i<120;i++){
    const sx=hashY(i*17.3)*W,wy=hashY(i*31.7)*H*10-H*5;
    const sy=((wy-S.cam)%(H*8)+H*8)%(H*8)-H;
    if(sy<0||sy>H) continue;
    const twink=0.4+0.6*Math.abs(Math.sin(S.tick*0.02+i));
    ctx.fillStyle=`rgba(255,245,200,${twink*0.9})`;
    const sr=hashY(i*7.1)<0.2?1.5:1;
    ctx.fillRect(sx|0,sy|0,sr,sr);
  }
}

function frame(){
  if(S.alive&&!paused) update(S);
  drawSky();drawCastleWall();
  for(const bt of S.bats) drawBat(bt);
  for(const p of S.plats){drawPlatform(p);drawSpikes(p);}
  for(const ar of S.archers) drawArcher(ar);
  drawArrows();
  for(const c of S.coins) drawGold(c);
  for(const h of S.hearts) drawHeart(h);
  drawKnight();drawWalls();drawSling();
  if(paused){ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,W,H);}
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.04)';for(let i=0;i<H;i+=2)ctx.fillRect(0,i,W,1);
  if(S.pl.onG&&!drag&&!paused&&S.tick%60<38){
    const py=S.pl.y-S.cam+S.pl.h/2+22;
    ctx.fillStyle='rgba(255,220,120,.7)';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText('DRAG ANYWHERE TO LAUNCH!',W/2,py);ctx.textAlign='left';
  }
  drawFloats();
  requestAnimationFrame(frame);
}

// ── Shop / Pause ──────────────────────────────────────────────────────────────
function togglePause(){
  if(!S.alive) return;
  paused=!paused;
  const btn=document.getElementById('pausebtn');
  if(paused){
    btn.textContent='▶';saveGame(S);
    document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
    renderShop('pause');document.getElementById('pausemenu').style.display='block';
  } else {
    btn.textContent='⏸';document.getElementById('pausemenu').style.display='none';drag=null;
  }
}
function dieAndShowGO(){
  paused=false;document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').textContent='⏸';
  S.alive=false;saveGame(null);showGO(S);
}
function showGO(s){
  document.getElementById('pausebtn').style.display='none';
  document.getElementById('go-title').textContent=s.pl.hp<=0?'💀 FALLEN 💀':'⚔ SLAIN ⚔';
  document.getElementById('go-stats').textContent='FLOOR: '+s.score+'   ⚜ '+s.session_coins+'   BEST: '+best+' / '+lowest;
  renderShop('go');document.getElementById('go').style.display='block';
}
function renderShop(which){
  const el=document.getElementById(which==='pause'?'upg-list-pause':'upg-list-go');
  el.innerHTML='';
  UPGRADES.forEach(u=>{
    const cost=upgCost(u.id),lvl=upgLevels[u.id],can=totalCoins>=cost;
    const div=document.createElement('div');div.className='upg';
    div.innerHTML=`<div class="upg-info"><div class="upg-name">${u.icon} ${u.name}</div><div class="upg-desc">${u.desc}</div><div class="upg-lvl">RANK ${lvl}</div></div><button class="upg-btn${can?'':' cant'}" onclick="buyUpg('${u.id}','${which}')">${can?'⚜ '+cost:'🔒 '+cost}</button>`;
    el.appendChild(div);
  });
}
function buyUpg(id,which){
  const cost=upgCost(id);if(totalCoins<cost)return;
  totalCoins-=cost;upgLevels[id]++;
  if(id==='maxhp'&&S&&S.alive){S.pl.maxHp=maxHP();S.pl.hp=Math.min(S.pl.hp+1,S.pl.maxHp);updateHeartsUI(S.pl);}
  if(id==='airjumps'&&S&&S.alive) S.pl.airJumpsLeft=Math.min(S.pl.airJumpsLeft+1,maxAirJumps());
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  if(which==='pause') document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
  renderShop(which);saveGame(S&&S.alive?S:null);
}

function restart(){
  floats=[];drag=null;paused=false;saveTimer=0;
  S=mkS(null);
  document.getElementById('go').style.display='none';
  document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').style.display='flex';
  document.getElementById('pausebtn').textContent='⏸';
  document.getElementById('hint').style.display='block';
  updateHeartsUI(S.pl);
}

(function boot(){
  const save=loadSave();
  if(save){
    if(save.upgLevels){upgLevels=save.upgLevels;UPGRADES.forEach(u=>{if(upgLevels[u.id]==null)upgLevels[u.id]=0;});}
    if(save.totalCoins!=null) totalCoins=save.totalCoins;
    if(save.best!=null) best=save.best;
    if(save.lowest!=null) lowest=save.lowest;
  }
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  document.getElementById('best').textContent='BEST: '+best+' / '+lowest;
  S=mkS(save&&save.pos?save.pos:null);
  updateHeartsUI(S.pl);frame();
})();
</script>
