<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CASTLE CLIMBER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; height:100%; background:#0a0a1a; overflow:hidden; font-family:monospace; display:flex; justify-content:center; align-items:center; }
#game-wrap { position:relative; background:#0a0a1a; overflow:hidden; }
canvas { display:block; image-rendering:pixelated; touch-action:none; position:absolute; top:0; left:0; }
#ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:#fff; text-align:center; pointer-events:none; letter-spacing:2px; z-index:5; }
#score { font-size:20px; color:#ffdd00; text-shadow:2px 2px #000; }
#best { font-size:12px; color:#aaffaa; }
#coindisp { font-size:13px; color:#ffcc00; margin-top:2px; }
#hearts { font-size:18px; margin-top:3px; letter-spacing:3px; }
#pausebtn, #fsbtn {
  position:absolute; top:10px;
  background:rgba(0,0,0,0.6); border:2px solid #888;
  color:#fff; font-family:monospace; font-size:16px;
  width:36px; height:36px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; z-index:10;
}
#pausebtn { right:10px; }
#fsbtn { right:54px; font-size:14px; }
#pausebtn:hover, #fsbtn:hover { border-color:#ffdd00; }
.panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,8,5,0.96); border:4px solid #aa8833;
  padding:24px 28px; text-align:center; color:#f0dfa0;
  min-width:260px; max-width:320px; max-height:88vh; overflow-y:auto;
  display:none; z-index:20;
  box-shadow: 0 0 30px rgba(180,120,0,0.3);
}
.panel h2 { font-size:22px; color:#ff6644; margin-bottom:6px; letter-spacing:3px; }
.panel .stats { font-size:11px; margin:4px 0 12px; color:#aa9966; }
.shop-title { color:#ffdd00; font-size:13px; letter-spacing:2px; margin-bottom:8px; text-align:center; }
.upg { display:flex; align-items:center; justify-content:space-between; margin:5px 0; gap:8px; border-bottom:1px solid #333; padding-bottom:5px; }
.upg-info { flex:1; text-align:left; }
.upg-name { font-size:11px; color:#f0dfa0; letter-spacing:1px; }
.upg-desc { font-size:9px; color:#886644; margin-top:1px; }
.upg-lvl { font-size:9px; color:#88cc88; margin-top:1px; }
.upg-btn { background:#2a1f0a; border:2px solid #886633; color:#ffdd00; font-family:monospace; font-size:10px; padding:4px 8px; cursor:pointer; white-space:nowrap; min-width:64px; text-align:center; }
.upg-btn:hover { background:#443311; border-color:#ffdd00; }
.upg-btn.cant { border-color:#333; color:#555; cursor:default; }
.panel-btns { display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
.panel-btns button { padding:8px 14px; background:#aa8833; border:2px solid #ffdd00; color:#000; font-size:11px; font-family:monospace; cursor:pointer; letter-spacing:1px; font-weight:bold; }
.panel-btns button.danger { background:#882222; border-color:#ff6644; color:#fff; }
.panel-btns button.wipe { background:#440000; border-color:#cc0000; color:#ff8888; font-size:10px; }
#hint { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); color:#887755; font-size:11px; text-align:center; width:280px; line-height:1.7; pointer-events:none; z-index:5; }
#floatcanvas { pointer-events:none; }
</style>
</head>
<body>
<div id="game-wrap">
<canvas id="c"></canvas>
<canvas id="floatcanvas"></canvas>
<div id="ui">
  <div id="score">FLOOR: 0</div>
  <div id="best">BEST: 0</div>
  <div id="coindisp">⚜ 0</div>
  <div id="hearts">❤️❤️❤️</div>
</div>
<button id="fsbtn" onclick="toggleFS()" title="Fullscreen">⛶</button>
<button id="pausebtn" onclick="togglePause()">⏸</button>

<div class="panel" id="go">
  <h2 id="go-title">⚔ SLAIN ⚔</h2>
  <div class="stats" id="go-stats"></div>
  <div><p class="shop-title">⚜ ROYAL UPGRADES ⚜</p><div id="upg-list-go"></div></div>
  <div class="panel-btns">
    <button onclick="restart()">⚔ CHARGE AGAIN</button>
    <button class="wipe" onclick="confirmWipe()">🗑 WIPE SAVE</button>
  </div>
</div>

<div class="panel" id="pausemenu">
  <h2>⚜ REST ⚜</h2>
  <div class="stats" id="pause-coins"></div>
  <div><p class="shop-title">⚜ ROYAL UPGRADES ⚜</p><div id="upg-list-pause"></div></div>
  <div class="panel-btns">
    <button onclick="togglePause()">▶ ONWARD</button>
    <button class="danger" onclick="dieAndShowGO()">✖ RETREAT</button>
  </div>
</div>

<div id="hint">DRAG ANYWHERE TO AIM · RELEASE TO LAUNCH</div>
</div><!-- #game-wrap -->

<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const FC=document.getElementById('floatcanvas'),fctx=FC.getContext('2d');
const BW=360,BH=640;
const W=BW,H=BH,WALL=16;
let SC=1;
function resize(){
  SC=Math.min(window.innerWidth/BW,window.innerHeight/BH);
  const pw=Math.round(BW*SC)+'px',ph=Math.round(BH*SC)+'px';
  const wrap=document.getElementById('game-wrap');
  if(wrap){wrap.style.width=pw;wrap.style.height=ph;}
  [C,FC].forEach(cv=>{cv.width=BW;cv.height=BH;cv.style.width=pw;cv.style.height=ph;});
}
resize();
window.addEventListener('resize',resize);
function toggleFS(){
  const wrap=document.getElementById('game-wrap');
  const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
  if(!fsEl){
    const req=wrap.requestFullscreen||wrap.webkitRequestFullscreen||wrap.mozRequestFullScreen;
    if(req) req.call(wrap).catch(()=>{});
  } else {
    const ex=document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen;
    if(ex) ex.call(document);
  }
}
['fullscreenchange','webkitfullscreenchange','mozfullscreenchange'].forEach(ev=>
  document.addEventListener(ev,()=>setTimeout(resize,50))
);
const SAVE_KEY='castle_climber_save_v2';

// ── Upgrades ─────────────────────────────────────────────────────────────────
const UPGRADES=[
  {id:'power',    name:'TREBUCHET ARM',    desc:'Mightier launch force',                 icon:'⚔', base:15,  inc:0.9,   baseCost:24,  costMult:1.65},
  {id:'preview',  name:'WIZARD SIGHT',     desc:'Longer trajectory preview arc',         icon:'🔮',base:2,   inc:1.5,   baseCost:16,  costMult:1.3},
  {id:'friction', name:'IRON SABATONS',    desc:'Better grip upon the stonework',        icon:'🛡', base:0.82,inc:-0.04, baseCost:20,  costMult:1.35},
  {id:'gravity',  name:'FEATHERFALL RUNE', desc:'Enchantment lightens thy burden',       icon:'✨',base:0.40,inc:-0.02, baseCost:32,  costMult:1.5,  maxLvl:15},
  {id:'bounce',   name:'RUNED GAUNTLETS',  desc:'Rebound harder off castle walls',       icon:'💎',base:0.6, inc:0.08,  baseCost:16,  costMult:1.45},
  {id:'coinmag',  name:'GILDED AURA',      desc:'Gold is drawn to thee from afar',       icon:'⚜', base:14,  inc:6,     baseCost:12,  costMult:1.4},
  {id:'coinrate', name:'FORTUNE BLESSING', desc:'More gold coins float through the castle',icon:'🪙',base:1.0, inc:0.4,   baseCost:20,  costMult:1.55},
  {id:'coyote',   name:"SQUIRE'S GRACE",   desc:'Extra moments to leap from ledges',     icon:'🐾',base:3,   inc:4,     baseCost:24,  costMult:1.35},
  {id:'airbrake', name:'CAPE OF CONTROL',  desc:'Thy cloak steadies thine arc',          icon:'🧣',base:1.0, inc:-0.03, baseCost:16,  costMult:1.4},
  {id:'coinval',  name:'ROYAL TITHE',      desc:"Each coin bears the king's bounty",     icon:'👑',base:1,   inc:1,     baseCost:40,  costMult:1.75},
  {id:'maxhp',    name:'VITALITY OATH',    desc:'Gain an extra heart of health',         icon:'❤️',base:4,   inc:1,     baseCost:32,  costMult:1.55},
  {id:'fallres',  name:'IRONFLESH WARD',   desc:'Reduces fall damage taken',             icon:'🪨',base:0,   inc:0.15,  baseCost:22,  costMult:1.35},
  {id:'airjumps', name:'WINGED BOOTS',     desc:'Extra mid-air launches per flight',     icon:'🦅',base:0,   inc:1,     baseCost:48,  costMult:1.9,  maxLvl:5},
  {id:'batradius',name:'WARDING SIGIL',    desc:'Bats cannot agro within a wider radius', icon:'🔯',base:80,  inc:25,    baseCost:18,  costMult:1.3},
  {id:'heartrate',name:'BLESSED GROUNDS',  desc:'Hearts of healing appear more often',   icon:'💖',base:0.04,inc:0.025, baseCost:24,  costMult:1.4},
  {id:'sporeres', name:'SPORE WARD',       desc:'Thy armor filters the toxic miasma longer', icon:'🍄',base:70,  inc:25,    baseCost:20,  costMult:1.4},
];

let upgLevels={};
UPGRADES.forEach(u=>upgLevels[u.id]=0);
let totalCoins=0,best=0,lowest=0;

function upgVal(id){const u=UPGRADES.find(x=>x.id===id);return u.base+upgLevels[id]*u.inc;}
function upgCost(id){const u=UPGRADES.find(x=>x.id===id);return Math.ceil(u.baseCost*Math.pow(u.costMult,upgLevels[id]));}
function maxHP(){return upgVal('maxhp')|0;}
function maxAirJumps(){return upgVal('airjumps')|0;}
function frictionVal(){return Math.max(0.05, upgVal('friction'));}
function airbrakeVal(){return Math.max(0.05, upgVal('airbrake'));}
function bounceVal(){return Math.min(0.92, upgVal('bounce'));}
function gravVal(){return Math.max(0.04, upgVal('gravity'));}
function batDifficultyScale(score){return 1 + Math.min(2.5, Math.abs(score) / 4000);}
function batAgroRadius(){return Math.min(upgVal('batradius'), H*0.45);}
function heartSpawnRate(){return upgVal('heartrate');}
function sporeToleranceVal(){return upgVal('sporeres');}

const MUSH_START = 150;
const MUSH_FULL  = 4500;
const MUSH_MAX_DENSITY = 0.38;

// ── Persistence ───────────────────────────────────────────────────────────────
function saveGame(s){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      upgLevels,totalCoins,best,lowest,
      pos:s?{x:s.pl.x,y:s.pl.y,hp:s.pl.hp}:null
    }));
  }catch(e){}
}
function loadSave(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function wipeSave(){
  localStorage.removeItem(SAVE_KEY);
  upgLevels={};UPGRADES.forEach(u=>upgLevels[u.id]=0);
  totalCoins=0;best=0;lowest=0;
}
function confirmWipe(){if(confirm('Wipe all progress? This cannot be undone.')){wipeSave();restart();}}

// ── State ─────────────────────────────────────────────────────────────────────
let S,drag=null,floats=[],paused=false,saveTimer=0;

function hashY(y){let h=Math.sin(y*127.1+311.7)*43758.5453;return h-Math.floor(h);}
function hash2(a,b){let h=Math.sin(a*127.1+b*311.7+92.3)*43758.5453;return h-Math.floor(h);}

// ── PHASE 2: Tower as a world object ─────────────────────────────────────────
// Creates a tower data object. worldX is its left edge in world coords,
// width is its total width, entryY is the world-Y where it was entered,
// id is used for deterministic generation.
function mkTower(worldX, width, entryY, id) {
  const t = {
    id,
    worldX,
    width,
    wallThickness: WALL,
    entryY,
    breaks: [],
  };
  genTowerBreaks(t);
  return t;
}

// Deterministically generate wall breaks for a tower.
// The player moves upward (y decreases), so breaks are placed at
// yTop/yBottom < entryY (higher up the tower).
function genTowerBreaks(tower) {
  const breakCount = 1 + Math.floor(hash2(tower.id * 13 + 7, 200) * 3); // 1–3 breaks
  for (let i = 0; i < breakCount; i++) {
    const side  = hash2(tower.id * 17 + i, 201) < 0.5 ? 'left' : 'right';
    const yOff  = 300 + hash2(tower.id * 17 + i, 202) * 2000; // 300–2300 units above entry
    const gapH  = 80  + hash2(tower.id * 17 + i, 203) * 60;   // 80–140 px gap
    tower.breaks.push({
      side,
      yTop:    tower.entryY - yOff - gapH,  // more negative = higher up
      yBottom: tower.entryY - yOff,
    });
  }
}

// Returns true if worldY (player centre) is inside a break on the given side.
// Gap is large enough (≥80px) that checking centre is fine.
function isInBreak(tower, side, worldY) {
  for (const brk of tower.breaks) {
    if (brk.side === side && worldY > brk.yTop && worldY < brk.yBottom) return true;
  }
  return false;
}

// ── Spike helpers ─────────────────────────────────────────────────────────────
const SPIKE_START = 300;
const SPIKE_FULL  = 8000;
const SPIKE_SLOT  = 13;
const SPIKE_MAX_FILL = 0.88;

function getPlatSpikes(p) {
  const absScore = Math.abs(p.y) / 10;
  if (absScore < SPIKE_START) return [];
  const density = Math.min(1, (absScore - SPIKE_START) / (SPIKE_FULL - SPIKE_START));
  const fillChance = density * SPIKE_MAX_FILL;

  const slots = Math.floor((p.w - 4) / SPIKE_SLOT);
  if (slots === 0) return [];

  const spikes = [];
  for (let i = 0; i < slots; i++) {
    if (hash2(p.id * 97 + i, 77) < fillChance) {
      spikes.push(p.x + 2 + SPIKE_SLOT * 0.5 + i * SPIKE_SLOT);
    }
  }
  return spikes;
}

function checkSpikeCollision(s) {
  const pl = s.pl;
  if (pl.hurtTimer > 0) return;

  const plB  = pl.y + pl.h / 2;
  const plL  = pl.x - pl.w / 2 + 3;
  const plR  = pl.x + pl.w / 2 - 3;
  const SPIKE_H = 9;

  for (const p of s.plats) {
    if (plB < p.y - SPIKE_H - 1 || plB > p.y + 3) continue;
    if (plR < p.x || plL > p.x + p.w) continue;

    const spikes = getPlatSpikes(p);
    for (const sx of spikes) {
      if (plR > sx - 4 && plL < sx + 4) {
        takeDamage(s, 1, '🩸 SPIKED!');
        pl.vy = Math.min(pl.vy, -3.5);
        return;
      }
    }
  }
}

function mkS(savedPos){
  const hp=maxHP();
  const sx=savedPos?savedPos.x:W/2,sy=savedPos?savedPos.y:0;
  const shp=savedPos?Math.min(savedPos.hp,hp):hp;

  // PHASE 2: create the initial tower. worldX=0, width=W so it fills the
  // full screen — identical to previous behaviour while providing the structure.
  const initTower = mkTower(0, W, 0, 0);

  const s={
    pl:{x:sx,y:sy,vx:0,vy:0,w:18,h:24,onG:false,coyote:0,
        hp:shp,maxHp:hp,hurtTimer:0,fallVy:0,damageFlash:0,
        airJumpsLeft:maxAirJumps(),sporeExposure:0,
        lastGroundY:sy},                // P3: for outside-fall kill threshold
    // PHASE 1: cam is now a {x, y} object. cam.x is locked to 0 in tower mode.
    cam:{ x: 0, y: sy - H * 0.38 },
    // P3: mode state machine
    worldMode: 'tower',   // 'tower' | 'exiting' | 'outside' | 'entering'
    camExitT: 0,          // tick counter for exit camera lerp
    exitSide: null,       // 'left' | 'right' — which wall the player exited through
    // PHASE 2: tower references
    activeTower: initTower,
    towers: [initTower],
    plats:[],coins:[],mushrooms:[],
    collectedCoins:new Set(),
    collectedHearts:new Set(),
    score:Math.floor(-sy/10),session_coins:0,
    alive:true,tick:0,
    bats:[],
    hearts:[],
  };
  s.plats.push({x:sx-55,y:sy+12,w:110,h:14,icy:false,torch:false,id:0});
  for(let i=0;i<8;i++) s.bats.push(mkBat(sy+(Math.random()-.5)*H*3, sy));
  gen(s);
  return s;
}

// P5: homeX gives each bat a world-X anchor for idle drift bounds
function mkBat(wy, plY, homeX){
  const minDist=batAgroRadius()+50;
  if(plY!==undefined&&Math.abs(wy-plY)<minDist){
    wy = wy<plY ? plY-minDist : plY+minDist;
  }
  const bx = homeX !== undefined ? homeX
    : WALL + 10 + Math.random()*(W - WALL*2 - 20);
  return{x:bx, homeX:bx, wy, vx:(Math.random()-.5)*1.0,
    flap:Math.random()*Math.PI*2, state:'idle', agroTimer:0, retreatTimer:0,
    tx:0, ty:0, dvx:0, dvy:0, hurtTimer:0};
}

function platId(wy){return Math.round(wy/10);}

function gen(s){
  const margin=H*0.75;
  // PHASE 1: use s.cam.y
  const top=s.cam.y-margin, bot=s.cam.y+H+margin;

  let mn=Infinity,mx=-Infinity;
  for(const p of s.plats){if(p.y<mn)mn=p.y;if(p.y>mx)mx=p.y;}
  if(!s.plats.length){mn=s.pl.y;mx=s.pl.y;}
  let y=mx; while(y<bot){y+=65+Math.random()*85;if(y<bot)addP(s,y);}
  y=mn;     while(y>top){y-=65+Math.random()*85;if(y>top)addP(s,y);}

  const coinMargin=H*0.55;
  const ctop=s.cam.y-coinMargin, cbot=s.cam.y+H+coinMargin;
  const COIN_BAND=80, HEART_BAND=320;
  const cb0=Math.floor(ctop/COIN_BAND), cb1=Math.ceil(cbot/COIN_BAND);
  for(let b=cb0;b<=cb1;b++) tryPlaceCoin(s,b*COIN_BAND,b);
  const hb0=Math.floor(ctop/HEART_BAND), hb1=Math.ceil(cbot/HEART_BAND);
  for(let b=hb0;b<=hb1;b++) tryPlaceHeart(s,b*HEART_BAND,b);

  const idle=s.bats.filter(bt=>bt.state==='idle').length;
  let add=8-idle;
  // P3/P5: place new bats at a world-X that makes sense for the current mode
  while(add-->0){
    const batY = s.cam.y + (Math.random()-.5)*H*2;
    let batHomeX;
    if(s.worldMode==='tower'){
      const tw=s.activeTower;
      batHomeX = tw.worldX + tw.wallThickness + 10
               + Math.random()*(tw.width - tw.wallThickness*2 - 20);
    } else {
      // Outside: scatter around current camera X
      batHomeX = s.cam.x + W*0.1 + Math.random()*W*0.8;
    }
    s.bats.push(mkBat(batY, s.pl.y, batHomeX));
  }
}

function platOverlap(s,wx,wy,r){
  for(const p of s.plats)
    if(wx+r>p.x&&wx-r<p.x+p.w&&wy+r>p.y-2&&wy-r<p.y+p.h+2) return true;
  return false;
}

function tryPlaceCoin(s,wy,band){
  const spawnChance=Math.min(0.9,0.42+upgVal('coinrate')*0.18);
  if(hash2(band,42)>spawnChance) return;
  if(s.collectedCoins.has(band)) return;
  if(s.coins.some(c=>c.id===band)) return;
  // PHASE 2: use tower bounds for x placement
  const t = s.activeTower;
  const wx = t.worldX + t.wallThickness + 14 + hash2(band,40) * (t.width - t.wallThickness*2 - 28);
  let cy=wy+hash2(band,43)*30-15;
  for(let i=0;i<8;i++){if(!platOverlap(s,wx,cy,9))break;cy-=12;}
  s.coins.push({x:wx,y:cy,collected:false,bob:hash2(band,41)*Math.PI*2,id:band});
}

function tryPlaceHeart(s,wy,band){
  const hid='ht'+band;
  if(s.collectedHearts.has(hid)) return;
  if(s.hearts.some(h=>h.id===hid)) return;
  if(hash2(band,50)>heartSpawnRate()) return;
  // PHASE 2: use tower bounds for x placement
  const t = s.activeTower;
  const wx = t.worldX + t.wallThickness + 18 + hash2(band,51) * (t.width - t.wallThickness*2 - 36);
  let cy=wy+hash2(band,53)*40-20;
  for(let i=0;i<8;i++){if(!platOverlap(s,wx,cy,11))break;cy-=14;}
  s.hearts.push({x:wx,y:cy,collected:false,bob:hash2(band,52)*Math.PI*2,id:hid});
}

function tryPlaceMushroom(s, p){
  const absScore = Math.abs(p.y) / 10;
  if(absScore < MUSH_START) return;
  if(s.mushrooms.some(m=>m.platId===p.id)) return;
  const density = Math.min(1, (absScore - MUSH_START) / (MUSH_FULL - MUSH_START));
  if(hash2(p.id*53+7, 99) > density * MUSH_MAX_DENSITY) return;
  const mx = p.x + 10 + hash2(p.id, 88) * (p.w - 20);
  const initDelay = 80 + hash2(p.id, 91) * 220;
  s.mushrooms.push({
    x:mx, y:p.y,
    platId:p.id,
    puffTimer:initDelay,
    cloud:null,
    bob:hash2(p.id,92)*Math.PI*2,
  });
}

function addP(s,wy){
  const id=platId(wy);
  if(s.plats.some(p=>p.id===id)) return;
  // PHASE 2: use tower bounds for platform placement
  const t = s.activeTower;
  const avail = t.width - t.wallThickness * 2;
  const rng1=hash2(id,1),rng2=hash2(id,2),rng3=hash2(id,3),rng4=hash2(id,4);
  const w=52+rng1*84;
  const x = t.worldX + t.wallThickness + 6 + rng2 * (avail - w - 12);
  const icy=rng3<0.18, torch=!icy&&rng4<0.3;
  const p={x,y:wy,w,h:14,icy,torch,id};
  s.plats.push(p);
  tryPlaceMushroom(s, p);
}

function cull(s){
  const margin=H*0.75;
  const t=s.cam.y-margin, b=s.cam.y+H+margin;
  s.plats=s.plats.filter(p=>p.y>t&&p.y<b);
  s.coins=s.coins.filter(c=>!c.collected&&c.y>t&&c.y<b);
  s.hearts=s.hearts.filter(h=>!h.collected&&h.y>t&&h.y<b);
  // P5: in outside mode also cull bats that have drifted far off-screen horizontally
  const xMargin = W * 2;
  s.bats=s.bats.filter(bt=>{
    if(bt.wy<=t-H*1.5||bt.wy>=b+H*1.5) return false;
    if(s.worldMode==='outside'||s.worldMode==='exiting'){
      const bsx=bt.x-s.cam.x;
      if(bsx<-xMargin||bsx>W+xMargin) return false;
    }
    return true;
  });
  s.mushrooms=s.mushrooms.filter(m=>m.y>t&&m.y<b);
}

function addFloat(x,sy,text,color){floats.push({x,y:sy,vy:-1.4,life:55,text,color:color||'#ffdd00'});}

const FALL_THRESH=22;
const FALL_SEVERE=34;

// ── Mushrooms ─────────────────────────────────────────────────────────────────
const CLOUD_RADIUS   = 30;
const CLOUD_DURATION = 160;
const PUFF_MIN       = 200;
const PUFF_RANGE     = 220;

function updateMushrooms(s){
  const pl = s.pl;
  const tolerance = sporeToleranceVal();
  let inCloud = false;

  for(const m of s.mushrooms){
    m.bob += 0.03;
    if(m.cloud){
      m.cloud.timer--;
      if(m.cloud.timer <= 0) m.cloud = null;
    } else {
      m.puffTimer--;
      if(m.puffTimer <= 0){
        m.cloud = {timer:CLOUD_DURATION, maxTimer:CLOUD_DURATION};
        m.puffTimer = PUFF_MIN + Math.random()*PUFF_RANGE;
      }
    }

    if(m.cloud){
      const dx = pl.x - m.x, dy = pl.y - m.y;
      if(Math.sqrt(dx*dx + dy*dy) < CLOUD_RADIUS + 8) inCloud = true;
    }
  }

  if(inCloud){
    pl.sporeExposure++;
    if(pl.sporeExposure >= tolerance){
      takeDamage(s, 1, '☠ SPORES!');
      pl.sporeExposure = 0;
    }
  } else {
    pl.sporeExposure = Math.max(0, pl.sporeExposure - 3);
  }
}

// ── Bats ──────────────────────────────────────────────────────────────────────
const BAT_AGRO_RATE=0.025,BAT_AGRO_PERIOD=360,BAT_DIVE_SPEED=3.5,BAT_IDLE_SPEED=0.8;

function updateBats(s){
  const pl=s.pl;
  const scale=batDifficultyScale(s.score);
  const diveSpeed=BAT_DIVE_SPEED*scale;
  const agroRate=Math.min(0.18, BAT_AGRO_RATE*scale);

  // P5: helper — horizontal bounds depend on mode
  const inTower = s.worldMode==='tower' || s.worldMode==='exiting';
  function batBounceX(bt, range){
    if(inTower){
      const tw=s.activeTower;
      const lb=tw.worldX+tw.wallThickness+8;
      const rb=tw.worldX+tw.width-tw.wallThickness-8;
      if(bt.x<lb||bt.x>rb) bt.vx*=-1;
    } else {
      // P5: soft home boundary — reflect when too far from spawn X
      if(Math.abs(bt.x - bt.homeX) > range) bt.vx*=-1;
    }
  }

  for(const bt of s.bats){
    bt.flap+=0.14;
    if(bt.hurtTimer>0) bt.hurtTimer--;
    if(bt.state==='idle'){
      bt.x+=bt.vx;
      bt.wy+=Math.sin(bt.flap*0.25)*0.3;
      batBounceX(bt, 150);
      bt.vx=Math.max(-BAT_IDLE_SPEED,Math.min(BAT_IDLE_SPEED,bt.vx));
      const bsy=bt.wy-s.cam.y;
      const distToPlayer=Math.sqrt((bt.x-pl.x)**2+(bt.wy-pl.y)**2);
      if(bsy>-50&&bsy<H+50&&!paused&&distToPlayer>batAgroRadius()&&s.tick%BAT_AGRO_PERIOD===0&&Math.random()<agroRate){
        bt.state='agro';bt.agroTimer=90+Math.random()*60;
      }
    } else if(bt.state==='agro'){
      bt.flap+=0.06;bt.x+=bt.vx*1.2;
      bt.wy+=(pl.y-bt.wy)*0.008;
      batBounceX(bt, 200);  // P5: slightly wider range when agro
      if(--bt.agroTimer<=0){
        bt.state='diving';
        const dx=pl.x-bt.x,dy=pl.y-bt.wy,d=Math.sqrt(dx*dx+dy*dy)||1;
        bt.dvx=dx/d*diveSpeed;bt.dvy=dy/d*diveSpeed;
      }
    } else if(bt.state==='diving'){
      bt.x+=bt.dvx;bt.wy+=bt.dvy;
      const dx=pl.x-bt.x,dy=pl.y-bt.wy;
      if(Math.sqrt(dx*dx+dy*dy)<20){
        takeDamage(s,1,'🦇 HIT!');
        bt.state='retreating';bt.retreatTimer=100;bt.dvx*=-0.7;bt.dvy=-3;bt.hurtTimer=45;
      }
      // P5: camera-relative out-of-bounds check (works for both tower and outside)
      const bsx=bt.x-s.cam.x, bsy=bt.wy-s.cam.y;
      if(bsy<-H||bsy>H*2||bsx<-W*0.6||bsx>W*1.6){
        bt.state='retreating';bt.retreatTimer=80;bt.dvx*=-0.5;bt.dvy=-2;
      }
    } else if(bt.state==='retreating'){
      bt.x+=bt.dvx*0.88;bt.wy+=bt.dvy;bt.dvx*=0.9;bt.dvy*=0.88;
      // P5: gently steer retreating bats back toward their home X when outside
      if(!inTower) bt.dvx += (bt.homeX - bt.x) * 0.008;
      if(--bt.retreatTimer<=0){bt.state='idle';bt.vx=(Math.random()-.5)*BAT_IDLE_SPEED*2;}
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(s){
  s.tick++;
  const pl=s.pl,prevY=pl.y,prevX=pl.x;
  const grav=gravVal(),ab=airbrakeVal();

  if(pl.vy>0) pl.fallVy=Math.max(pl.fallVy,pl.vy);
  pl.vy+=grav;
  if(!pl.onG) pl.vx*=ab;
  pl.x+=pl.vx;pl.y+=pl.vy;
  if(pl.hurtTimer>0) pl.hurtTimer--;
  if(pl.damageFlash>0) pl.damageFlash--;

  // P3: wall collision + exit detection — only applies in tower mode.
  // In exiting/outside/entering the walls are no longer an obstacle.
  const bounce = bounceVal();
  if(s.worldMode === 'tower'){
    const tw = s.activeTower;
    const leftInner  = tw.worldX + tw.wallThickness;
    const rightInner = tw.worldX + tw.width - tw.wallThickness;

    // Left wall — check for exit first, then collision
    if(pl.x - pl.w/2 < leftInner){
      if(isInBreak(tw, 'left', pl.y)){
        // Player is crossing the inner face through a break — begin exit
        s.worldMode  = 'exiting';
        s.exitSide   = 'left';
        s.camExitT   = 0;
      } else {
        pl.x  = leftInner + pl.w/2;
        pl.vx = Math.abs(pl.vx) * bounce;
      }
    }
    // Right wall
    if(pl.x + pl.w/2 > rightInner){
      if(isInBreak(tw, 'right', pl.y)){
        s.worldMode  = 'exiting';
        s.exitSide   = 'right';
        s.camExitT   = 0;
      } else {
        pl.x  = rightInner - pl.w/2;
        pl.vx = -Math.abs(pl.vx) * bounce;
      }
    }
  }
  // (entering mode: re-entry wall clamping handled in Phase 4)

  if(pl.onG){
    pl.coyote=upgVal('coyote')|0;
    pl.airJumpsLeft=maxAirJumps();
    pl.lastGroundY=pl.y;    // P3: keep track for outside-fall kill
  }
  else if(pl.coyote>0) pl.coyote--;
  pl.onG=false;

  for(const p of s.plats){
    const plL=pl.x-pl.w/2,plR=pl.x+pl.w/2,plT=pl.y-pl.h/2,plF=pl.y+pl.h/2;
    const prL=prevX-pl.w/2,prR=prevX+pl.w/2,prT=prevY-pl.h/2,prF=prevY+pl.h/2;
    const pR=p.x+p.w,pB=p.y+p.h;
    if(plR<=p.x||plL>=pR||plF<=p.y||plT>=pB) continue;
    const fromTop=prF<=p.y,fromBot=prT>=pB,fromL=prR<=p.x,fromR=prL>=pR;
    const lf=p.icy?0.99:frictionVal();
    if(fromTop){
      if(pl.fallVy>=FALL_THRESH){
        const resist=upgVal('fallres');
        let dmg=pl.fallVy>=FALL_SEVERE?2:1;
        const reducedDmg=Math.max(0,dmg-Math.floor(resist));
        const extraResist=resist-Math.floor(resist);
        const finalDmg=(reducedDmg>0&&Math.random()<extraResist)?reducedDmg-1:reducedDmg;
        if(finalDmg>0) takeDamage(s,finalDmg,'FALL!');
      }
      pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;
    } else if(fromBot){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
    else if(fromL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
    else if(fromR){pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    else{
      const dT=Math.abs(plF-p.y),dB=Math.abs(plT-pB),dL=Math.abs(plR-p.x),dR=Math.abs(plL-pR);
      const m=Math.min(dT,dB,dL,dR);
      if(m===dT){pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;}
      else if(m===dB){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
      else if(m===dL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
      else{pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    }
  }
  if(pl.vy<0) pl.fallVy=0;

  checkSpikeCollision(s);

  const mag=upgVal('coinmag'),val=upgVal('coinval')|0;
  for(const coin of s.coins){
    if(coin.collected) continue;
    coin.bob+=0.05;
    const dx=pl.x-coin.x,dy=pl.y-coin.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<mag*2.5&&dist>mag){coin.x+=dx/dist*3;coin.y+=dy/dist*3;}
    if(dist<mag){
      coin.collected=true;
      s.collectedCoins.add(coin.id);
      s.session_coins+=val;totalCoins+=val;
      addFloat(coin.x-s.cam.x,coin.y-s.cam.y,val>1?'+'+val+' ⚜':'+⚜','#ffcc44');
    }
  }

  for(const heart of s.hearts){
    if(heart.collected) continue;
    heart.bob+=0.04;
    const dx=pl.x-heart.x,dy=pl.y-heart.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<18){
      heart.collected=true;
      s.collectedHearts.add(heart.id);
      if(pl.hp<pl.maxHp){
        pl.hp=Math.min(pl.maxHp,pl.hp+1);
        addFloat(heart.x-s.cam.x,heart.y-s.cam.y,'❤️ +1','#ff88aa');
        updateHeartsUI(pl);
      } else {
        addFloat(heart.x-s.cam.x,heart.y-s.cam.y,'FULL','#ff88aa');
      }
    }
  }

  updateMushrooms(s);
  updateBats(s);

  // P3: mode-aware camera
  // cam.y always tracks player vertically
  s.cam.y += (pl.y - H*.4 - s.cam.y) * .07;

  // cam.x depends on mode:
  //   tower   → hard-locked to tower's worldX (screen stays stable)
  //   exiting → fast lerp toward player-centered, then flip to outside
  //   outside → normal 0.07 lerp, same as Y
  if(s.worldMode === 'tower'){
    s.cam.x = s.activeTower.worldX;
  } else if(s.worldMode === 'exiting'){
    s.camExitT++;
    s.cam.x += (pl.x - W/2 - s.cam.x) * 0.12;  // faster lerp during transition
    if(s.camExitT > 40) s.worldMode = 'outside';
  } else if(s.worldMode === 'outside'){
    s.cam.x += (pl.x - W/2 - s.cam.x) * 0.07;
  }

  s.score=Math.floor(-pl.y/10);
  if(s.score>best) best=s.score;
  if(s.score<lowest) lowest=s.score;
  floats=floats.filter(f=>{f.y+=f.vy;f.life--;return f.life>0;});
  gen(s);cull(s);

  if(++saveTimer>300){saveTimer=0;saveGame(s);}

  const outsideTag = (s.worldMode==='outside'||s.worldMode==='exiting') ? '⚔ OUTSIDE · ' : '';
  document.getElementById('score').textContent=outsideTag+'FLOOR: '+s.score;
  document.getElementById('best').textContent='BEST: '+best+' / '+lowest;
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  updateHeartsUI(pl);

  // P3: fall kill — outside uses distance-from-last-ground; tower uses screen-bottom
  if(s.worldMode==='outside'||s.worldMode==='exiting'){
    // No floor outside — if player falls 3000 units below where they last stood, die
    if(pl.y > pl.lastGroundY + 3000){ pl.hp=0; killPlayer(s); }
  } else {
    if(pl.y - s.cam.y > H+220){ pl.hp=0; killPlayer(s); }
  }
}

function takeDamage(s,dmg,label){
  const pl=s.pl;
  if(pl.hurtTimer>0) return;
  pl.hp=Math.max(0,pl.hp-dmg);pl.hurtTimer=90;pl.damageFlash=20;
  addFloat(pl.x-s.cam.x,pl.y-s.cam.y-20,label||'-'+dmg+'❤️','#ff4444');
  updateHeartsUI(pl);
  if(pl.hp<=0) killPlayer(s);
}
function killPlayer(s){s.alive=false;saveGame(null);showGO(s);}
function updateHeartsUI(pl){
  const mhp=pl.maxHp||maxHP();
  let h='';for(let i=0;i<mhp;i++) h+=i<pl.hp?'❤️':'🖤';
  document.getElementById('hearts').textContent=h;
}

// ── Input ─────────────────────────────────────────────────────────────────────
function xy(e){const r=C.getBoundingClientRect(),t=e.touches?(e.touches[0]||e.changedTouches[0]):e;return{x:(t.clientX-r.left)/SC,y:(t.clientY-r.top)/SC};}
C.addEventListener('touchstart',e=>{e.preventDefault();if(!paused)dn(xy(e));},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(!paused)mv(xy(e));},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(!paused)up();},{passive:false});
C.addEventListener('mousedown',e=>{if(!paused)dn(xy(e));});
window.addEventListener('mousemove',e=>{if(!paused)mv(xy(e));});
window.addEventListener('mouseup',()=>{if(!paused)up();});

function canLaunch(){const pl=S.pl;return pl.onG||pl.coyote>0||pl.airJumpsLeft>0;}
function dn(p){if(!S.alive)return;drag={sx:p.x,sy:p.y,cx:p.x,cy:p.y};document.getElementById('hint').style.display='none';}
function mv(p){if(drag)drag={...drag,cx:p.x,cy:p.y};}
function up(){
  if(!drag||!S.alive){drag=null;return;}
  const dx=drag.cx-drag.sx,dy=drag.cy-drag.sy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<8){drag=null;return;}
  if(!canLaunch()){drag=null;return;}
  const d=Math.min(dist,130),a=Math.atan2(dy,dx),pw=d/130;
  S.pl.vx=-Math.cos(a)*pw*upgVal('power');
  S.pl.vy=-Math.sin(a)*pw*upgVal('power');
  if(!S.pl.onG&&S.pl.coyote<=0) S.pl.airJumpsLeft=Math.max(0,S.pl.airJumpsLeft-1);
  S.pl.onG=false;drag=null;
}

// ── Trajectory simulation ─────────────────────────────────────────────────────
const BOUNCE_COLORS=[[255,200,80],[80,200,255],[180,80,255],[80,255,120],[255,140,40]];

function simTrajectory(sx,sy,vx0,vy0,totalSteps){
  const grav=gravVal(),ab=airbrakeVal(),bc=bounceVal(),pf=frictionVal();
  const hw=9,hh=12;
  let tx=sx,ty=sy,tvx=vx0,tvy=vy0;
  const segs=[{dots:[],bounced:false,bi:0}];

  for(let i=0;i<totalSteps;i++){
    const ptx=tx,pty=ty;
    tvy+=grav;tvx*=ab;tx+=tvx;ty+=tvy;
    let hit=false;
    // P3: only bounce off tower walls when actually inside a tower
    if(S.worldMode==='tower'){
      const tw = S.activeTower;
      const tLeft  = tw.worldX + tw.wallThickness;
      const tRight = tw.worldX + tw.width - tw.wallThickness;
      if(tx-hw<=tLeft){tx=tLeft+hw;tvx=Math.abs(tvx)*bc;hit=true;}
      else if(tx+hw>=tRight){tx=tRight-hw;tvx=-Math.abs(tvx)*bc;hit=true;}
    }
    if(!hit){
      for(const p of S.plats){
        const pR=p.x+p.w,pB=p.y+p.h;
        if(tx+hw<=p.x||tx-hw>=pR||ty+hh<=p.y||ty-hh>=pB) continue;
        const fromTop=(pty+hh)<=p.y,fromBot=(pty-hh)>=pB;
        const fromLeft=(ptx+hw)<=p.x,fromRight=(ptx-hw)>=pR;
        if(fromTop){
          ty=p.y-hh;tvx*=pf;
          if(Math.abs(tvx)<0.8&&Math.abs(tvy)<1.5){
            segs[segs.length-1].dots.push({x:tx,y:ty});
            if(segs[segs.length-1].dots.length===0) segs.pop();
            return segs;
          }
          tvy=-Math.abs(tvy)*0.5;hit=true;
        }
        else if(fromBot){ty=pB+hh;tvy=Math.abs(tvy)*0.3;hit=true;}
        else if(fromLeft){tx=p.x-hw;tvx=-Math.abs(tvx)*bc;hit=true;}
        else if(fromRight){tx=pR+hw;tvx=Math.abs(tvx)*bc;hit=true;}
        else{ty=p.y-hh;tvy=-Math.abs(tvy)*0.5;tvx*=pf;hit=true;}
        break;
      }
    }
    segs[segs.length-1].dots.push({x:tx,y:ty});
    if(hit){
      segs[segs.length-1].bounced=true;
      segs.push({dots:[],bounced:false,bi:segs.length});
    }
  }
  if(segs[segs.length-1].dots.length===0) segs.pop();
  return segs;
}

// ── Draw ──────────────────────────────────────────────────────────────────────

function drawCastleWall(){
  const bH=16,bW=32;
  // PHASE 1: S.cam.y
  const topWorldRow=Math.floor(S.cam.y/bH);
  for(let row=topWorldRow-1;row<=topWorldRow+Math.ceil(H/bH)+1;row++){
    const off=(row%2===0)?0:bW/2;
    // PHASE 1: S.cam.y
    const wy=Math.round((row*bH)-S.cam.y);
    const shade=row%3===0?'#2a2520':row%3===1?'#252018':'#221e15';
    for(let col=-1;col<=Math.ceil(W/bW)+1;col++){
      const bx=Math.round(col*bW+off);
      if(bx+bW<0||bx>W||wy+bH<0||wy>H) continue;
      ctx.fillStyle=shade;
      ctx.fillRect(bx,wy,bW-2,bH-2);
      ctx.fillStyle='#141210';
      ctx.fillRect(bx,wy+bH-2,bW,2);
      ctx.fillRect(bx+bW-2,wy,2,bH);
      if(hash2(row,col)<0.12){
        ctx.fillStyle='#0e0c0a';
        ctx.fillRect(bx+8,wy+4,1,6);
      }
    }
  }
}

function drawTorch(x,y){
  const fl=Math.sin(S.tick*0.3)*2+Math.sin(S.tick*0.7)*1.5;
  ctx.fillStyle='#555';ctx.fillRect((x-3)|0,(y-2)|0,6,8);
  ctx.fillStyle='#888';ctx.fillRect((x-2)|0,(y-1)|0,4,6);
  ctx.fillStyle='#886633';ctx.fillRect((x-1)|0,(y+4)|0,2,10);
  const grd=ctx.createRadialGradient(x,y,0,x,y,22+fl);
  grd.addColorStop(0,'rgba(255,160,0,0.25)');grd.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,22+fl,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,60,0,0.9)';ctx.beginPath();ctx.ellipse(x,y-2+fl*0.3,4,7+fl*0.4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,180,0,0.9)';ctx.beginPath();ctx.ellipse(x,y-1+fl*0.2,2.5,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,180,0.8)';ctx.beginPath();ctx.ellipse(x,y+fl*0.1,1,3,0,0,Math.PI*2);ctx.fill();
}

// PHASE 2: replaces drawWalls(). Draws the tower walls with gaps at breaks.
function drawTowerWalls(){
  const tw  = S.activeTower;
  const camY = S.cam.y;
  const camX = S.cam.x;

  ['left','right'].forEach(side => {
    // Screen X of this wall's left edge
    const sx = side === 'left'
      ? (tw.worldX - camX)|0
      : (tw.worldX + tw.width - tw.wallThickness - camX)|0;

    const sideBreaks = tw.breaks
      .filter(b => b.side === side)
      .sort((a, b) => a.yTop - b.yTop);

    // Visible world-Y range (with a small overdraw margin)
    const visTop = camY - 12;
    const visBot = camY + H + 12;

    // Build solid wall segments between breaks
    const solidSegs = [];
    let cur = visTop;
    for (const brk of sideBreaks) {
      if (cur < brk.yTop) solidSegs.push({ wy1: cur, wy2: Math.min(brk.yTop, visBot) });
      cur = Math.max(cur, brk.yBottom);
    }
    if (cur < visBot) solidSegs.push({ wy1: cur, wy2: visBot });

    // Draw each solid segment
    for (const seg of solidSegs) {
      const sy1 = (seg.wy1 - camY)|0;
      const sy2 = (seg.wy2 - camY)|0;

      // Align brick rows to world-Y so pattern doesn't shift with camera
      const rowStart = Math.floor(sy1 / 12) * 12;
      for (let y = rowStart; y < sy2; y += 12) {
        const clipTop = Math.max(y, sy1);
        const clipH   = Math.min(y + 12, sy2) - clipTop;
        if (clipH <= 0) continue;
        ctx.fillStyle = y % 24 < 12 ? '#3a3530' : '#332f2a';
        ctx.fillRect(sx, clipTop, tw.wallThickness, clipH);
      }

      // Inner edge highlight
      ctx.fillStyle = '#555';
      if (side === 'left') {
        ctx.fillRect(sx + tw.wallThickness - 2, sy1, 2, sy2 - sy1);
      } else {
        ctx.fillRect(sx, sy1, 2, sy2 - sy1);
      }
    }

    // Draw decorative edges and light bleed at each break opening
    for (const brk of sideBreaks) {
      const bsy1 = (brk.yTop    - camY)|0;
      const bsy2 = (brk.yBottom - camY)|0;
      if (bsy2 < -30 || bsy1 > H + 30) continue;

      // Shadow cap at top of opening
      if (bsy1 > -15 && bsy1 < H + 15) {
        ctx.fillStyle = '#111008';
        ctx.fillRect(sx, bsy1 - 4, tw.wallThickness, 5);
        ctx.fillStyle = '#666';
        ctx.fillRect(sx + 2, bsy1 - 2, tw.wallThickness - 4, 2);
      }
      // Shadow cap at bottom of opening
      if (bsy2 > -15 && bsy2 < H + 15) {
        ctx.fillStyle = '#111008';
        ctx.fillRect(sx, bsy2, tw.wallThickness, 5);
        ctx.fillStyle = '#666';
        ctx.fillRect(sx + 2, bsy2 + 2, tw.wallThickness - 4, 2);
      }

      // Ambient light bleed through the gap (outside is brighter)
      const clipY1 = Math.max(0, bsy1);
      const clipY2 = Math.min(H, bsy2);
      if (clipY2 > clipY1) {
        // Gradient from inner face outward
        const innerX = side === 'left' ? sx + tw.wallThickness : sx;
        const outerX = side === 'left' ? sx : sx + tw.wallThickness;
        const grd = ctx.createLinearGradient(innerX, 0, outerX, 0);
        grd.addColorStop(0, 'rgba(60,130,220,0.13)');
        grd.addColorStop(1, 'rgba(60,130,220,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(sx, clipY1, tw.wallThickness, clipY2 - clipY1);
      }
    }
  });
}

function drawPlatform(p){
  const sy=(p.y-S.cam.y)|0;
  const px=(p.x-S.cam.x)|0;  // P3: world→screen X
  if(p.icy){

    for(let i=6;i<p.w-4;i+=14) ctx.fillRect(px+i,sy+1,4,2);
    ctx.fillStyle='rgba(180,230,255,0.12)';ctx.fillRect(px,sy,p.w|0,p.h);

function drawSpikesOnPlat(p) {
  const spikes = getPlatSpikes(p);
  if (!spikes.length) return;

  const sy = (p.y - S.cam.y)|0;

  const absScore  = Math.abs(p.y) / 10;
  const density   = Math.min(1, (absScore - SPIKE_START) / (SPIKE_FULL - SPIKE_START));
  const glowAlpha = 0.08 + density * 0.14;

  for (const wx of spikes) {
    const x = (wx - S.cam.x)|0;  // P3: world→screen X
    ctx.fillStyle = `rgba(255,40,0,${glowAlpha})`;
    ctx.fillRect(x - 5, (sy - 10)|0, 10, 10);
    ctx.fillStyle = '#1a1218';
    ctx.fillRect(x,     sy - 10, 2, 2);
    ctx.fillRect(x - 1, sy -  8, 4, 2);
    ctx.fillRect(x - 2, sy -  6, 6, 2);
    ctx.fillRect(x - 3, sy -  4, 8, 2);
    ctx.fillRect(x - 3, sy -  2, 8, 2);
    ctx.fillStyle = '#7a7e88';
    ctx.fillRect(x,     sy - 9, 2, 2);
    ctx.fillRect(x - 1, sy - 7, 4, 2);
    ctx.fillRect(x - 2, sy - 5, 6, 2);
    ctx.fillRect(x - 3, sy - 3, 8, 2);
    ctx.fillRect(x - 3, sy - 1, 8, 2);
    ctx.fillStyle = '#9aa0aa';
    ctx.fillRect(x,     sy - 9, 1, 2);
    ctx.fillRect(x - 1, sy - 7, 2, 2);
    ctx.fillRect(x - 2, sy - 5, 3, 2);
    ctx.fillStyle = '#d0d8e0';
    ctx.fillRect(x, sy - 10, 1, 1);
    ctx.fillStyle = '#505560';
    ctx.fillRect(x + 1, sy - 7, 2, 2);
    ctx.fillRect(x + 2, sy - 5, 2, 2);
    ctx.fillRect(x + 3, sy - 3, 2, 4);
    const bloodR = (120 + density * 100)|0;

    ctx.fillStyle = `rgba(${bloodR},0,0,${bloodA})`;
    ctx.fillRect(x - 1, sy - 6, 1, 4);
    ctx.fillRect(x + 1, sy - 4, 1, 3);
  }
}

function drawMushrooms(){
  for(const m of S.mushrooms){
    const sy = (m.y - S.cam.y)|0;
    if(sy < -60 || sy > H+20) continue;
    const mx = (m.x - S.cam.x)|0;  // P3: world→screen X

    if(m.cloud){
      const t = m.cloud.timer / m.cloud.maxTimer;
      const pulse = 0.7 + 0.3*Math.sin(S.tick*0.18);
      const outerR = CLOUD_RADIUS + 6*Math.sin(S.tick*0.09);
      const g1 = ctx.createRadialGradient(mx, sy-8, 0, mx, sy-8, outerR);
      g1.addColorStop(0, `rgba(140,200,60,${0.38*t*pulse})`);
      g1.addColorStop(0.5,`rgba(100,170,30,${0.22*t*pulse})`);
      g1.addColorStop(1,  `rgba(60,120,10,0)`);
      ctx.fillStyle = g1;
      ctx.beginPath(); ctx.arc(mx, sy-8, outerR, 0, Math.PI*2); ctx.fill();
      const g2 = ctx.createRadialGradient(mx+8, sy-14, 0, mx+8, sy-14, outerR*0.65);
      g2.addColorStop(0, `rgba(160,210,80,${0.22*t*pulse})`);
      g2.addColorStop(1,  `rgba(80,150,20,0)`);
      ctx.fillStyle = g2;
      ctx.beginPath(); ctx.arc(mx+8, sy-14, outerR*0.65, 0, Math.PI*2); ctx.fill();
      for(let i=0;i<5;i++){
        const angle = (S.tick*0.04 + i*1.26);
        const r = (12 + i*4) * t;
        const px2 = mx + Math.cos(angle)*r;
        const py2 = (sy-8) + Math.sin(angle)*r*0.6 - (1-t)*8;
        ctx.fillStyle=`rgba(180,230,80,${0.5*t})`;
        ctx.fillRect(px2|0, py2|0, 2, 2);
      }
    }

    if(!m.cloud && m.puffTimer < 90){
      const warn = 1 - m.puffTimer/90;
      const wPulse = 0.5 + 0.5*Math.sin(S.tick*0.25);
      ctx.fillStyle = `rgba(120,200,40,${warn*0.18*wPulse})`;
      ctx.beginPath(); ctx.arc(mx, sy-4, 20, 0, Math.PI*2); ctx.fill();
    }

    ctx.fillStyle = '#c8b89a';
    ctx.fillRect(mx-3, sy-7, 6, 7);
    ctx.fillStyle = '#ede0c8';
    ctx.fillRect(mx-2, sy-6, 2, 5);
    ctx.fillStyle = '#a89070';
    ctx.fillRect(mx+1, sy-7, 2, 7);
    ctx.fillStyle = '#1a1a10';
    ctx.fillRect(mx-7, sy-14, 14, 8);
    const capR = (!m.cloud && m.puffTimer < 90)
      ? (120 + Math.floor(80*(1-m.puffTimer/90)))|0 : 180;
    ctx.fillStyle = `rgb(${capR},48,20)`;
    ctx.fillRect(mx-6, sy-15, 12, 8);
    ctx.fillRect(mx-4, sy-17, 8,  2);
    ctx.fillRect(mx-2, sy-18, 4,  1);
    ctx.fillStyle = `rgb(${Math.min(255,capR+60)},90,50)`;
    ctx.fillRect(mx-5, sy-15, 4, 3);
    ctx.fillRect(mx-3, sy-16, 2, 1);
    ctx.fillStyle = '#f0f0e8';
    ctx.fillRect(mx-4, sy-14, 3, 3);
    ctx.fillRect(mx+2, sy-13, 2, 2);
    ctx.fillRect(mx-1, sy-16, 2, 2);
    ctx.fillStyle = '#c8c8b8';
    ctx.fillRect(mx-3, sy-12, 1, 1);
    ctx.fillRect(mx+3, sy-12, 1, 1);
  }
}

function drawGold(coin){
  if(coin.collected) return;
  const sy=(coin.y-S.cam.y+Math.sin(coin.bob)*3)|0;
  const cx=(coin.x-S.cam.x)|0;  // P3: world→screen X

  ctx.fillStyle='#ffcc00';ctx.fillRect((cx-5)|0,(sy-6)|0,10,12);
  ctx.fillStyle='#ffe066';ctx.fillRect((cx-4)|0,(sy-5)|0,8,10);

function drawHeart(heart){
  if(heart.collected) return;

function drawKnight(){
  const pl=S.pl;
  const flash=pl.damageFlash>0&&Math.floor(pl.damageFlash/4)%2===0;
  if(flash) ctx.globalAlpha=0.35;

  const x=(pl.x-S.cam.x-pl.w/2)|0,y=(pl.y-pl.h/2-S.cam.y)|0,w=pl.w,h=pl.h;
  const moving=Math.abs(pl.vx)>0.5,legOff=pl.onG&&moving?Math.sin(S.tick*0.3)*3:0;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x+w/2,y+h+3,w/2-2,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555566';ctx.fillRect(x+2,y+h-8,6,8+legOff);ctx.fillRect(x+w-8,y+h-8,6,8-legOff);
  ctx.fillStyle='#8888aa';ctx.fillRect(x+3,y+h-7,4,2);ctx.fillRect(x+w-7,y+h-7,4,2);
  ctx.fillStyle='#446688';ctx.fillRect(x+1,y+8,w-2,h-14);
  ctx.fillStyle='#6699bb';ctx.fillRect(x+2,y+8,w-4,h-16);
  ctx.fillStyle='#4477aa';ctx.fillRect(x+4,y+10,w-8,4);
  ctx.fillStyle='#88aacc';ctx.fillRect(x+5,y+11,w-10,2);
  ctx.fillStyle='#8a6a30';ctx.fillRect(x+2,y+h-10,w-4,3);
  ctx.fillStyle='#ffcc44';ctx.fillRect(x+w/2-2,y+h-10,4,3);
  ctx.fillStyle='#557799';ctx.fillRect(x-2,y+8,6,6);ctx.fillRect(x+w-4,y+8,6,6);
  ctx.fillStyle='#88aacc';ctx.fillRect(x-1,y+9,4,2);ctx.fillRect(x+w-3,y+9,4,2);
  ctx.fillStyle='#445566';ctx.fillRect(x+2,y,w-4,10);
  ctx.fillStyle='#6688aa';ctx.fillRect(x+3,y+1,w-6,8);
  ctx.fillStyle='#111';ctx.fillRect(x+4,y+4,w-8,2);
  ctx.fillStyle='rgba(255,100,0,0.4)';ctx.fillRect(x+5,y+4,w-10,1);
  ctx.fillStyle='#cc2222';
  for(let i=0;i<5;i++){const pw2=Math.sin(S.tick*0.15+i)*1.5;ctx.fillRect(x+w/2-1,y-4-i+pw2,2,3);}
  ctx.fillStyle='#ff4444';ctx.fillRect(x+w/2-1,y-2,2,4);
  ctx.fillStyle='#8b0000';ctx.fillRect(x-5,y+10,7,12);
  ctx.fillStyle='#cc2222';ctx.fillRect(x-4,y+11,5,10);
  ctx.fillStyle='#ffcc00';ctx.fillRect(x-2,y+14,1,4);ctx.fillRect(x-4,y+16,5,1);
  ctx.save();ctx.translate(x+w+2,y+12);ctx.rotate(pl.onG?0.2:-0.6);
  ctx.fillStyle='#aabbcc';ctx.fillRect(-1,-14,2,14);
  ctx.fillStyle='#888';ctx.fillRect(-1,0,2,4);
  ctx.fillStyle='#cc9900';ctx.fillRect(-4,-1,8,2);
  ctx.fillStyle='#eee';ctx.fillRect(0,-14,1,10);
  ctx.restore();
  if(flash) ctx.globalAlpha=1;
  const aj=pl.airJumpsLeft;
  if(aj>0&&!pl.onG){
    for(let i=0;i<aj;i++){
      ctx.fillStyle='rgba(100,200,255,0.8)';ctx.beginPath();ctx.arc(x+w/2-4+i*8,y-10,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(200,240,255,0.9)';ctx.beginPath();ctx.arc(x+w/2-4+i*8,y-10,1.5,0,Math.PI*2);ctx.fill();

function drawBat(bt){
  const sy=(bt.wy-S.cam.y)|0;
  const bsx=(bt.x-S.cam.x)|0;  // P3: world→screen X
  if(sy<-30||sy>H+30) return;
  if(bsx<-30||bsx>W+30) return;  // P3: skip off-screen horizontal
  const agro=bt.state==='agro'||bt.state==='diving';
  const flash=bt.hurtTimer>0&&Math.floor(bt.hurtTimer/3)%2===0;
  const wing=Math.sin(bt.flap)*(agro?10:6);
  if(flash) ctx.globalAlpha=0.4;
  if(agro&&bt.state==='agro'){ctx.fillStyle='rgba(255,140,0,0.12)';ctx.beginPath();ctx.arc(bsx,sy,10,0,Math.PI*2);ctx.fill();}
  if(agro&&bt.state==='diving'){ctx.fillStyle='rgba(255,100,0,0.18)';ctx.beginPath();ctx.arc(bsx,sy,12,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=agro?'#3d1010':'#2a2040';
  ctx.fillRect((bsx-3)|0,(sy-2)|0,6,5);
  ctx.fillRect((bsx-12)|0,(sy-2+wing)|0,9,4);
  ctx.fillRect((bsx+3)|0,(sy-2+wing)|0,9,4);
  ctx.fillRect((bsx-14)|0,(sy+1+wing)|0,3,2);
  ctx.fillRect((bsx+11)|0,(sy+1+wing)|0,3,2);
  ctx.fillStyle=agro?'#5a1818':'#3d3060';
  ctx.fillRect((bsx-11)|0,(sy-1+wing)|0,7,2);
  ctx.fillRect((bsx+4)|0,(sy-1+wing)|0,7,2);
  ctx.fillStyle=bt.state==='diving'?'#ff6600':agro?'#cc6600':'#441111';
  ctx.fillRect((bsx-2)|0,(sy-1)|0,1,1);ctx.fillRect((bsx+1)|0,(sy-1)|0,1,1);
  if(flash) ctx.globalAlpha=1;
}

function drawSling(){
  if(!drag) return;
  const pl=S.pl;
  const ps={x:pl.x,y:pl.y};
  const camY=S.cam.y;
  const camX=S.cam.x;  // P3
  const dx=drag.sx-drag.cx,dy=drag.sy-drag.cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<4) return;
  const canFire=canLaunch();
  const pw=Math.min(dist,130)/130;
  const vx0=Math.cos(Math.atan2(dy,dx))*pw*upgVal('power');
  const vy0=Math.sin(Math.atan2(dy,dx))*pw*upgVal('power');

  ctx.save();ctx.globalAlpha=canFire?0.3:0.15;
  ctx.strokeStyle='#aa9955';ctx.lineWidth=1;ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(drag.sx,drag.sy);ctx.lineTo(drag.cx,drag.cy);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  const totalSteps=Math.floor(upgVal('preview')*3/Math.max(pw,0.15));
  const segs=simTrajectory(ps.x,ps.y,vx0,vy0,totalSteps);

  const maxSegs=upgLevels['preview']+1;
  const drawSegs=segs.slice(0,maxSegs);

  ctx.globalAlpha=canFire?1:0.3;
  drawSegs.forEach((seg,si)=>{
    const col=BOUNCE_COLORS[0];
    const n=seg.dots.length;
    seg.dots.forEach((d,di)=>{
      const t=di/Math.max(n-1,1);
      const fade=1-t*t;
      const r=Math.max(0.8,3*(1-t*0.5));
      const segAlpha=Math.pow(0.82,si);
      const alpha=fade*segAlpha;
      if(alpha<0.02) return;
      ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
      ctx.beginPath();ctx.arc(d.x-camX,d.y-camY,r,0,Math.PI*2);ctx.fill();
    });
    if(seg.bounced&&si<drawSegs.length-1&&seg.dots.length>0){
      const last=seg.dots[seg.dots.length-1];
      const lsx=last.x-camX, lsy=last.y-camY;
      ctx.strokeStyle=`rgba(${col[0]},${col[1]},${col[2]},0.9)`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(lsx-4,lsy-4);ctx.lineTo(lsx+4,lsy+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(lsx+4,lsy-4);ctx.lineTo(lsx-4,lsy+4);ctx.stroke();
    }
  });
  ctx.globalAlpha=1;

  const bars=Math.ceil(pw*5);
  for(let i=0;i<5;i++){ctx.fillStyle=i<bars?(pw>.7?'#ff6633':'#ffcc44'):'rgba(255,255,255,.1)';ctx.fillRect(W-WALL-16,H-32-i*8,10,6);}
  ctx.fillStyle='#886633';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText('FORCE',W-WALL-2,H-10);ctx.textAlign='left';
  if(!canFire){ctx.fillStyle='rgba(255,80,80,0.8)';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('NO JUMPS LEFT',W/2,H-12);ctx.textAlign='left';}
  const aj=pl.airJumpsLeft;
  if(!pl.onG&&pl.coyote<=0&&maxAirJumps()>0){ctx.fillStyle='rgba(100,200,255,0.6)';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('AIR: '+aj+'/'+maxAirJumps(),W/2,H-24);ctx.textAlign='left';}
}

function drawFloats(){
  fctx.clearRect(0,0,W,H);fctx.textAlign='center';
  for(const f of floats){fctx.globalAlpha=f.life/55;fctx.fillStyle=f.color;fctx.font='bold 13px monospace';fctx.fillText(f.text,f.x,f.y);}
  fctx.globalAlpha=1;fctx.textAlign='left';
}

function drawSky(){
  const t=Math.max(0,Math.min(1,S.score/500));
  ctx.fillStyle=`rgb(${8+t*4|0},${8+t*3|0},${22+t*10|0})`;ctx.fillRect(0,0,W,H);
  // PHASE 1: S.cam.y
  const moonY=(((-2000-S.cam.y)%(H*8)+H*8)%(H*8))-H;
  if(moonY>-60&&moonY<H+60){
    ctx.fillStyle='rgba(255,240,180,0.12)';ctx.beginPath();ctx.arc(W/2,moonY,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(W/2,moonY,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#eeeac0';ctx.beginPath();ctx.arc(W/2+8,moonY-4,18,0,Math.PI*2);ctx.fill();
  }
  for(let i=0;i<120;i++){
    const sx=hashY(i*17.3)*W,wy=hashY(i*31.7)*H*10-H*5;
    // PHASE 1: S.cam.y
    const sy=((wy-S.cam.y)%(H*8)+H*8)%(H*8)-H;
    if(sy<0||sy>H) continue;
    const twink=0.4+0.6*Math.abs(Math.sin(S.tick*0.02+i));
    ctx.fillStyle=`rgba(255,245,200,${twink*0.9})`;
    const sr=hashY(i*7.1)<0.2?1.5:1;
    ctx.fillRect(sx|0,sy|0,sr,sr);
  }
}

function frame(){
  if(S.alive&&!paused) update(S);
  drawSky();
  // P3: castle-wall brick background only makes sense inside a tower
  if(S.worldMode==='tower'||S.worldMode==='exiting') drawCastleWall();
  for(const bt of S.bats) drawBat(bt);
  for(const p of S.plats){
    drawPlatform(p);
    drawSpikesOnPlat(p);
  }
  for(const c of S.coins) drawGold(c);
  for(const h of S.hearts) drawHeart(h);
  drawMushrooms();
  drawKnight();
  // PHASE 2: drawTowerWalls() replaces drawWalls() — handles breaks
  drawTowerWalls();
  drawSling();
  if(paused){ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,W,H);}
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.04)';for(let i=0;i<H;i+=2)ctx.fillRect(0,i,W,1);
  if(S.pl.onG&&!drag&&!paused&&S.tick%60<38){
    // PHASE 1: S.cam.y
    const py=S.pl.y-S.cam.y+S.pl.h/2+22;
    ctx.fillStyle='rgba(255,220,120,.7)';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText('DRAG ANYWHERE TO LAUNCH!',W/2,py);ctx.textAlign='left';
  }
  drawFloats();
  requestAnimationFrame(frame);
}

// ── Shop / Pause ──────────────────────────────────────────────────────────────
function togglePause(){
  if(!S.alive) return;
  paused=!paused;
  const btn=document.getElementById('pausebtn');
  if(paused){
    btn.textContent='▶';saveGame(S);
    document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
    renderShop('pause');
    document.getElementById('pausemenu').style.display='block';
  } else {
    btn.textContent='⏸';
    document.getElementById('pausemenu').style.display='none';
    drag=null;
  }
}
function dieAndShowGO(){
  paused=false;document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').textContent='⏸';
  S.alive=false;saveGame(null);showGO(S);
}
function showGO(s){
  document.getElementById('pausebtn').style.display='none';
  document.getElementById('go-title').textContent=s.pl.hp<=0?'💀 FALLEN 💀':'⚔ SLAIN ⚔';
  document.getElementById('go-stats').textContent='FLOOR: '+s.score+'   ⚜ '+s.session_coins+'   BEST: '+best+' / '+lowest;
  renderShop('go');document.getElementById('go').style.display='block';
}
function renderShop(which){
  const el=document.getElementById(which==='pause'?'upg-list-pause':'upg-list-go');
  el.innerHTML='';
  UPGRADES.forEach(u=>{
    const cost=upgCost(u.id),lvl=upgLevels[u.id];
    const capped=u.maxLvl!=null&&lvl>=u.maxLvl;
    const can=!capped&&totalCoins>=cost;
    const div=document.createElement('div');div.className='upg';
    const btnLabel=capped?'MAX':can?'⚜ '+cost:'🔒 '+cost;
    const rankLabel=capped?`RANK ${lvl} <span style="color:#ffaa44">(MAX)</span>`:`RANK ${lvl}${u.maxLvl!=null?' / '+u.maxLvl:''}`;
    div.innerHTML=`<div class="upg-info"><div class="upg-name">${u.icon} ${u.name}</div><div class="upg-desc">${u.desc}</div><div class="upg-lvl">${rankLabel}</div></div><button class="upg-btn${can?'':' cant'}" onclick="buyUpg('${u.id}','${which}')">${btnLabel}</button>`;
    el.appendChild(div);
  });
}
function buyUpg(id,which){
  const u=UPGRADES.find(x=>x.id===id);
  if(u.maxLvl!=null&&upgLevels[id]>=u.maxLvl) return;
  const cost=upgCost(id);if(totalCoins<cost)return;
  totalCoins-=cost;upgLevels[id]++;
  if(id==='maxhp'&&S&&S.alive){S.pl.maxHp=maxHP();S.pl.hp=Math.min(S.pl.hp+1,S.pl.maxHp);updateHeartsUI(S.pl);}
  if(id==='airjumps'&&S&&S.alive) S.pl.airJumpsLeft=Math.min(S.pl.airJumpsLeft+1,maxAirJumps());
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  if(which==='pause') document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
  renderShop(which);saveGame(S&&S.alive?S:null);
}

function restart(){
  floats=[];drag=null;paused=false;saveTimer=0;
  S=mkS(null);
  document.getElementById('go').style.display='none';
  document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').style.display='flex';
  document.getElementById('pausebtn').textContent='⏸';
  document.getElementById('hint').style.display='block';
  updateHeartsUI(S.pl);
}

(function boot(){
  const save=loadSave();
  if(save){
    if(save.upgLevels){upgLevels=save.upgLevels;UPGRADES.forEach(u=>{if(upgLevels[u.id]==null)upgLevels[u.id]=0;});}
    if(save.totalCoins!=null) totalCoins=save.totalCoins;
    if(save.best!=null) best=save.best;
    if(save.lowest!=null) lowest=save.lowest;
  }
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  document.getElementById('best').textContent='BEST: '+best+' / '+lowest;
  S=mkS(save&&save.pos?save.pos:null);
  updateHeartsUI(S.pl);
  frame();
})();
</script>
