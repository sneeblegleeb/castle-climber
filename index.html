<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CASTLE CLIMBER</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a1a; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; font-family:monospace; }
canvas { display:block; image-rendering:pixelated; touch-action:none; }
#ui { position:absolute; top:10px; left:50%; transform:translateX(-50%); color:#fff; text-align:center; pointer-events:none; letter-spacing:2px; }
#score { font-size:20px; color:#ffdd00; text-shadow:2px 2px #000; }
#best { font-size:12px; color:#aaffaa; }
#coindisp { font-size:13px; color:#ffcc00; margin-top:2px; }
#hearts { font-size:18px; margin-top:3px; letter-spacing:3px; }
#pausebtn {
  position:absolute; top:10px; right:10px;
  background:rgba(0,0,0,0.6); border:2px solid #888;
  color:#fff; font-family:monospace; font-size:16px;
  width:36px; height:36px; cursor:pointer;
  display:flex; align-items:center; justify-content:center; z-index:10;
}
#pausebtn:hover { border-color:#ffdd00; }
.panel {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(10,8,5,0.96); border:4px solid #aa8833;
  padding:24px 28px; text-align:center; color:#f0dfa0;
  min-width:260px; max-width:320px; max-height:88vh; overflow-y:auto;
  display:none; z-index:20;
  box-shadow: 0 0 30px rgba(180,120,0,0.3);
}
.panel h2 { font-size:22px; color:#ff6644; margin-bottom:6px; letter-spacing:3px; }
.panel .stats { font-size:11px; margin:4px 0 12px; color:#aa9966; }
.shop-title { color:#ffdd00; font-size:13px; letter-spacing:2px; margin-bottom:8px; text-align:center; }
.upg { display:flex; align-items:center; justify-content:space-between; margin:5px 0; gap:8px; border-bottom:1px solid #333; padding-bottom:5px; }
.upg-info { flex:1; text-align:left; }
.upg-name { font-size:11px; color:#f0dfa0; letter-spacing:1px; }
.upg-desc { font-size:9px; color:#886644; margin-top:1px; }
.upg-lvl { font-size:9px; color:#88cc88; margin-top:1px; }
.upg-btn { background:#2a1f0a; border:2px solid #886633; color:#ffdd00; font-family:monospace; font-size:10px; padding:4px 8px; cursor:pointer; white-space:nowrap; min-width:64px; text-align:center; }
.upg-btn:hover { background:#443311; border-color:#ffdd00; }
.upg-btn.cant { border-color:#333; color:#555; cursor:default; }
.panel-btns { display:flex; gap:8px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
.panel-btns button { padding:8px 14px; background:#aa8833; border:2px solid #ffdd00; color:#000; font-size:11px; font-family:monospace; cursor:pointer; letter-spacing:1px; font-weight:bold; }
.panel-btns button.danger { background:#882222; border-color:#ff6644; color:#fff; }
.panel-btns button.wipe { background:#440000; border-color:#cc0000; color:#ff8888; font-size:10px; }
#hint { position:absolute; bottom:28px; left:50%; transform:translateX(-50%); color:#887755; font-size:11px; text-align:center; width:280px; line-height:1.7; pointer-events:none; }
#floatcanvas { position:absolute; top:0; left:0; pointer-events:none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="floatcanvas"></canvas>
<div id="ui">
  <div id="score">FLOOR: 0</div>
  <div id="best">BEST: 0</div>
  <div id="coindisp">⚜ 0</div>
  <div id="hearts">❤️❤️❤️</div>
</div>
<button id="pausebtn" onclick="togglePause()">⏸</button>

<div class="panel" id="go">
  <h2 id="go-title">⚔ SLAIN ⚔</h2>
  <div class="stats" id="go-stats"></div>
  <div><p class="shop-title">⚜ ROYAL UPGRADES ⚜</p><div id="upg-list-go"></div></div>
  <div class="panel-btns">
    <button onclick="restart()">⚔ CHARGE AGAIN</button>
    <button class="wipe" onclick="confirmWipe()">🗑 WIPE SAVE</button>
  </div>
</div>

<div class="panel" id="pausemenu">
  <h2>⚜ REST ⚜</h2>
  <div class="stats" id="pause-coins"></div>
  <div><p class="shop-title">⚜ ROYAL UPGRADES ⚜</p><div id="upg-list-pause"></div></div>
  <div class="panel-btns">
    <button onclick="togglePause()">▶ ONWARD</button>
    <button class="danger" onclick="dieAndShowGO()">✖ RETREAT</button>
  </div>
</div>

<div id="hint">DRAG ANYWHERE TO AIM · RELEASE TO LAUNCH</div>

<script>
const C=document.getElementById('c'),ctx=C.getContext('2d');
const FC=document.getElementById('floatcanvas'),fctx=FC.getContext('2d');
const BW=360,BH=640;
const SC=Math.min(innerWidth/BW,innerHeight/BH);
[C,FC].forEach(cv=>{cv.width=BW;cv.height=BH;cv.style.width=BW*SC+'px';cv.style.height=BH*SC+'px';});
const W=BW,H=BH,WALL=16;
const SAVE_KEY='castle_climber_save_v2';

// ── Upgrades ─────────────────────────────────────────────────────────────────
const UPGRADES=[
  {id:'power',    name:'TREBUCHET ARM',    desc:'Mightier launch force',                 icon:'⚔', base:15,  inc:0.9,   baseCost:60,  costMult:1.55},
  {id:'preview',  name:'WIZARD SIGHT',     desc:'Longer trajectory preview arc',         icon:'🔮',base:4,   inc:3,     baseCost:40,  costMult:1.4},
  {id:'rebounds', name:'SEER STONE',       desc:'Preview bounce off walls & platforms',  icon:'🪬',base:0,   inc:1,     baseCost:70,  costMult:1.6},
  {id:'friction', name:'IRON SABATONS',    desc:'Better grip upon the stonework',        icon:'🛡', base:0.82,inc:-0.04, baseCost:50,  costMult:1.5},
  {id:'gravity',  name:'FEATHERFALL RUNE', desc:'Enchantment lightens thy burden',       icon:'✨',base:0.42,inc:-0.02, baseCost:80,  costMult:1.6},
  {id:'bounce',   name:'RUNED GAUNTLETS',  desc:'Rebound harder off castle walls',       icon:'💎',base:0.6, inc:0.08,  baseCost:40,  costMult:1.4},
  {id:'coinmag',  name:'GILDED AURA',      desc:'Gold is drawn to thee from afar',       icon:'⚜', base:14,  inc:6,     baseCost:30,  costMult:1.35},
  {id:'coinrate', name:'FORTUNE BLESSING', desc:'More gold glimmers in the castle',      icon:'🪙',base:0.18,inc:0.05,  baseCost:50,  costMult:1.45},
  {id:'coyote',   name:"SQUIRE'S GRACE",   desc:'Extra moments to leap from ledges',     icon:'🐾',base:0,   inc:4,     baseCost:60,  costMult:1.5},
  {id:'airbrake', name:'CAPE OF CONTROL',  desc:'Thy cloak steadies thine arc',          icon:'🧣',base:1.0, inc:-0.03, baseCost:40,  costMult:1.4},
  {id:'coinval',  name:'ROYAL TITHE',      desc:"Each coin bears the king's bounty",     icon:'👑',base:1,   inc:1,     baseCost:100, costMult:1.7},
  {id:'maxhp',    name:'VITALITY OATH',    desc:'Gain an extra heart of health',         icon:'❤️',base:3,   inc:1,     baseCost:80,  costMult:1.8},
  {id:'fallres',  name:'IRONFLESH WARD',   desc:'Reduces fall damage taken',             icon:'🪨',base:0,   inc:0.15,  baseCost:55,  costMult:1.5},
  {id:'airjumps', name:'WINGED BOOTS',     desc:'Extra mid-air launches per flight',     icon:'🦅',base:0,   inc:1,     baseCost:120, costMult:1.9},
];

let upgLevels={};
UPGRADES.forEach(u=>upgLevels[u.id]=0);
let totalCoins=0,best=0;

function upgVal(id){const u=UPGRADES.find(x=>x.id===id);return u.base+upgLevels[id]*u.inc;}
function upgCost(id){const u=UPGRADES.find(x=>x.id===id);return Math.ceil(u.baseCost*Math.pow(u.costMult,upgLevels[id]));}
function maxHP(){return upgVal('maxhp')|0;}
function maxAirJumps(){return upgVal('airjumps')|0;}
function maxRebounds(){return upgVal('rebounds')|0;}

// ── Persistence ───────────────────────────────────────────────────────────────
function saveGame(s){
  try{
    localStorage.setItem(SAVE_KEY,JSON.stringify({
      upgLevels,totalCoins,best,
      pos:s?{x:s.pl.x,y:s.pl.y,hp:s.pl.hp}:null
    }));
  }catch(e){}
}
function loadSave(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function wipeSave(){
  localStorage.removeItem(SAVE_KEY);
  upgLevels={};UPGRADES.forEach(u=>upgLevels[u.id]=0);
  totalCoins=0;best=0;
}
function confirmWipe(){if(confirm('Wipe all progress? This cannot be undone.')){wipeSave();restart();}}

// ── State ─────────────────────────────────────────────────────────────────────
let S,drag=null,floats=[],paused=false,saveTimer=0;

// Deterministic hash for a world-Y band — used for consistent brick shading
// and to decide whether a platform row gets a crack, without re-rolling on cull/regen.
function hashY(y){let h=Math.sin(y*127.1+311.7)*43758.5453;return h-Math.floor(h);}
// Hash that takes two inputs (for per-column, per-row decisions)
function hash2(a,b){let h=Math.sin(a*127.1+b*311.7+92.3)*43758.5453;return h-Math.floor(h);}

function mkS(savedPos){
  const hp=maxHP();
  const sx=savedPos?savedPos.x:W/2,sy=savedPos?savedPos.y:0;
  const shp=savedPos?Math.min(savedPos.hp,hp):hp;
  const s={
    pl:{x:sx,y:sy,vx:0,vy:0,w:18,h:24,onG:false,coyote:0,
        hp:shp,maxHp:hp,hurtTimer:0,fallVy:0,damageFlash:0,
        airJumpsLeft:maxAirJumps()},
    cam:sy-H*.38,
    plats:[],coins:[],
    // Track which platform world-Y bands have already been assigned coins
    // so re-generation after culling doesn't re-roll them.
    coinSeeds:{},
    score:Math.floor(-sy/10),session_coins:0,
    alive:true,tick:0,
    bats:[],
  };
  s.plats.push({x:sx-55,y:sy+55,w:110,h:14,icy:false,torch:false,id:0});
  s.coinSeeds[0]=0; // starting platform: no coin
  for(let i=0;i<8;i++) s.bats.push(mkBat(sy+(Math.random()-.5)*H*3));
  gen(s);
  return s;
}

function mkBat(wy){
  return{x:WALL+10+Math.random()*(W-WALL*2-20),wy,vx:(Math.random()-.5)*1.0,
    flap:Math.random()*Math.PI*2,state:'idle',agroTimer:0,retreatTimer:0,
    tx:0,ty:0,dvx:0,dvy:0,hurtTimer:0};
}

// Each platform gets a stable integer ID derived from its world-Y position.
// This ID is used to seed coin placement so that re-generating a culled platform
// does NOT re-roll a new coin — it reuses the same deterministic result.
function platId(wy){
  // Round to nearest 10 to absorb float drift, then hash to int
  return Math.round(wy/10);
}

function gen(s){
  // Use SYMMETRIC cull margins so up and down are treated identically.
  // Generation range: 1H above cam to 1.5H below cam.
  const top=s.cam-H;
  const bot=s.cam+H*1.5;

  let mn=Infinity,mx=-Infinity;
  for(const p of s.plats){if(p.y<mn)mn=p.y;if(p.y>mx)mx=p.y;}
  if(!s.plats.length){mn=s.pl.y;mx=s.pl.y;}

  // Generate downward
  let y=mx;
  while(y<bot+H*0.5){
    y+=65+Math.random()*85;
    addP(s,y);
  }
  // Generate upward
  y=mn;
  while(y>top-H*0.5){
    y-=65+Math.random()*85;
    addP(s,y);
  }
  while(s.bats.length<8) s.bats.push(mkBat(s.cam+(Math.random()-.5)*H*2));
}

function addP(s,wy){
  // Don't add duplicate platforms at same world band
  const id=platId(wy);
  if(s.plats.some(p=>p.id===id)) return;

  const avail=W-WALL*2;
  // Use deterministic layout per id so re-generated platforms look the same
  const rng1=hash2(id,1), rng2=hash2(id,2), rng3=hash2(id,3), rng4=hash2(id,4);
  const w=52+rng1*84;
  const x=WALL+6+rng2*(avail-w-12);
  const icy=rng3<0.18;
  const torch=!icy&&rng4<0.3;
  s.plats.push({x,y:wy,w,h:14,icy,torch,id});

  // Coin placement: only roll if we haven't seen this platform id before
  if(!(id in s.coinSeeds)){
    const rate=Math.min(upgVal('coinrate'),0.75);
    const cr=hash2(id,5);
    const cr2=hash2(id,6);
    const count=cr<rate?(cr2<0.15?2:1):0;
    s.coinSeeds[id]=count;
    for(let i=0;i<count;i++){
      const cx=hash2(id,7+i);
      const cy=hash2(id,9+i);
      s.coins.push({x:x+10+cx*(w-20),y:wy-20-cy*28,r:6,collected:false,bob:hash2(id,11+i)*Math.PI*2,id:id*10+i});
    }
  } else {
    // Re-spawn coins for this platform only if not collected
    const count=s.coinSeeds[id];
    for(let i=0;i<count;i++){
      const cid=id*10+i;
      if(!s.coins.some(c=>c.id===cid)){
        // Check if it was ever collected — we track via coinSeeds negative flag
        if(s.coinSeeds[id]>=0){
          // Not collected; re-add (was culled off screen)
          const cx=hash2(id,7+i);
          const cy=hash2(id,9+i);
          s.coins.push({x:x+10+cx*(w-20),y:wy-20-cy*28,r:6,collected:false,bob:hash2(id,11+i)*Math.PI*2,id:cid});
        }
      }
    }
  }
}

function cull(s){
  // SYMMETRIC margins: equal distance above and below camera
  const margin=H*0.75;
  const t=s.cam-margin;
  const b=s.cam+H+margin;
  s.plats=s.plats.filter(p=>p.y>t&&p.y<b);
  s.coins=s.coins.filter(c=>!c.collected&&c.y>t&&c.y<b);
  s.bats=s.bats.filter(bt=>bt.state!=='idle'||(bt.wy>t-H&&bt.wy<b+H));
}

function addFloat(x,sy,text,color){floats.push({x,y:sy,vy:-1.4,life:55,text,color:color||'#ffdd00'});}

// Fall damage thresholds — bumped up as requested
const FALL_THRESH=16;   // was 10
const FALL_SEVERE=25;   // was 16

// ── Bats ──────────────────────────────────────────────────────────────────────
const BAT_AGRO_RATE=0.04,BAT_AGRO_PERIOD=240,BAT_DIVE_SPEED=5,BAT_IDLE_SPEED=0.8;

function updateBats(s){
  const pl=s.pl;
  for(const bt of s.bats){
    bt.flap+=0.14;
    if(bt.hurtTimer>0) bt.hurtTimer--;
    if(bt.state==='idle'){
      bt.x+=bt.vx;
      bt.wy+=Math.sin(bt.flap*0.25)*0.3;
      if(bt.x<WALL+8||bt.x>W-WALL-8) bt.vx*=-1;
      bt.vx=Math.max(-BAT_IDLE_SPEED,Math.min(BAT_IDLE_SPEED,bt.vx));
      const bsy=bt.wy-s.cam;
      if(bsy>-50&&bsy<H+50&&!paused&&s.tick%BAT_AGRO_PERIOD===0&&Math.random()<BAT_AGRO_RATE){
        bt.state='agro';bt.agroTimer=90+Math.random()*60;
      }
    } else if(bt.state==='agro'){
      bt.flap+=0.06;bt.x+=bt.vx*1.2;
      bt.wy+=(pl.y-bt.wy)*0.008;
      if(bt.x<WALL+8||bt.x>W-WALL-8) bt.vx*=-1;
      if(--bt.agroTimer<=0){
        bt.state='diving';
        const dx=pl.x-bt.x,dy=pl.y-bt.wy,d=Math.sqrt(dx*dx+dy*dy)||1;
        bt.dvx=dx/d*BAT_DIVE_SPEED;bt.dvy=dy/d*BAT_DIVE_SPEED;
      }
    } else if(bt.state==='diving'){
      bt.x+=bt.dvx;bt.wy+=bt.dvy;
      const dx=pl.x-bt.x,dy=pl.y-bt.wy;
      if(Math.sqrt(dx*dx+dy*dy)<20){
        takeDamage(s,1,'🦇 HIT!');
        bt.state='retreating';bt.retreatTimer=100;bt.dvx*=-0.7;bt.dvy=-3;bt.hurtTimer=20;
      }
      const bsy=bt.wy-s.cam;
      if(bsy<-H||bsy>H*2||bt.x<WALL||bt.x>W-WALL){
        bt.state='retreating';bt.retreatTimer=80;bt.dvx*=-0.5;bt.dvy=-2;
      }
    } else if(bt.state==='retreating'){
      bt.x+=bt.dvx*0.88;bt.wy+=bt.dvy;bt.dvx*=0.9;bt.dvy*=0.88;
      if(--bt.retreatTimer<=0){bt.state='idle';bt.vx=(Math.random()-.5)*BAT_IDLE_SPEED*2;}
    }
  }
}

// ── Update ────────────────────────────────────────────────────────────────────
function update(s){
  s.tick++;
  const pl=s.pl,prevY=pl.y,prevX=pl.x;
  const grav=upgVal('gravity'),ab=upgVal('airbrake');

  if(pl.vy>0) pl.fallVy=Math.max(pl.fallVy,pl.vy);
  pl.vy+=grav;
  if(!pl.onG) pl.vx*=ab;
  pl.x+=pl.vx;pl.y+=pl.vy;
  if(pl.hurtTimer>0) pl.hurtTimer--;
  if(pl.damageFlash>0) pl.damageFlash--;

  // Walls — no flash, just physics
  const bounce=upgVal('bounce');
  if(pl.x-pl.w/2<WALL){pl.x=WALL+pl.w/2;pl.vx=Math.abs(pl.vx)*bounce;}
  if(pl.x+pl.w/2>W-WALL){pl.x=W-WALL-pl.w/2;pl.vx=-Math.abs(pl.vx)*bounce;}

  if(pl.onG){pl.coyote=upgVal('coyote')|0;pl.airJumpsLeft=maxAirJumps();}
  else if(pl.coyote>0) pl.coyote--;
  pl.onG=false;

  for(const p of s.plats){
    const plL=pl.x-pl.w/2,plR=pl.x+pl.w/2,plT=pl.y-pl.h/2,plF=pl.y+pl.h/2;
    const prL=prevX-pl.w/2,prR=prevX+pl.w/2,prT=prevY-pl.h/2,prF=prevY+pl.h/2;
    const pR=p.x+p.w,pB=p.y+p.h;
    if(plR<=p.x||plL>=pR||plF<=p.y||plT>=pB) continue;
    const fromTop=prF<=p.y,fromBot=prT>=pB,fromL=prR<=p.x,fromR=prL>=pR;
    const lf=p.icy?0.99:upgVal('friction');
    if(fromTop){
      if(pl.fallVy>=FALL_THRESH){
        const resist=upgVal('fallres');
        let dmg=pl.fallVy>=FALL_SEVERE?2:1;
        dmg=Math.max(0,dmg-Math.floor(resist));
        if(dmg>0&&Math.random()>resist-Math.floor(resist)) takeDamage(s,dmg,'FALL!');
      }
      pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.vx*=lf;pl.onG=true;
    } else if(fromBot){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
    else if(fromL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
    else if(fromR){pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    else{
      const dT=Math.abs(plF-p.y),dB=Math.abs(plT-pB),dL=Math.abs(plR-p.x),dR=Math.abs(plL-pR);
      const m=Math.min(dT,dB,dL,dR);
      if(m===dT){pl.fallVy=0;pl.y=p.y-pl.h/2;pl.vy=0;pl.onG=true;}
      else if(m===dB){pl.fallVy=0;pl.y=pB+pl.h/2;pl.vy=Math.abs(pl.vy)*0.3;}
      else if(m===dL){pl.x=p.x-pl.w/2;pl.vx=-Math.abs(pl.vx)*0.3;}
      else{pl.x=pR+pl.w/2;pl.vx=Math.abs(pl.vx)*0.3;}
    }
  }
  if(pl.vy<0) pl.fallVy=0;

  const mag=upgVal('coinmag'),val=upgVal('coinval')|0;
  for(const coin of s.coins){
    if(coin.collected) continue;
    coin.bob+=0.05;
    const dx=pl.x-coin.x,dy=pl.y-coin.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<mag*2.5&&dist>mag){coin.x+=dx/dist*3;coin.y+=dy/dist*3;}
    if(dist<mag){
      coin.collected=true;
      // Mark collected in seeds so it won't respawn
      const sid=coin.id/10|0;
      s.coinSeeds[sid]=-Math.abs(s.coinSeeds[sid]||0)-1;
      s.session_coins+=val;totalCoins+=val;
      addFloat(coin.x,coin.y-s.cam,val>1?'+'+val+' ⚜':'+⚜','#ffcc44');
    }
  }

  updateBats(s);
  s.cam+=(pl.y-H*.4-s.cam)*.07;
  s.score=Math.floor(-pl.y/10);
  if(s.score>best) best=s.score;
  floats=floats.filter(f=>{f.y+=f.vy;f.life--;return f.life>0;});
  gen(s);cull(s);

  if(++saveTimer>300){saveTimer=0;saveGame(s);}

  document.getElementById('score').textContent='FLOOR: '+s.score;
  document.getElementById('best').textContent='BEST: '+best;
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  updateHeartsUI(pl);
  if(pl.y-s.cam>H+220){pl.hp=0;killPlayer(s);}
}

function takeDamage(s,dmg,label){
  const pl=s.pl;
  if(pl.hurtTimer>0) return;
  pl.hp=Math.max(0,pl.hp-dmg);pl.hurtTimer=60;pl.damageFlash=20;
  addFloat(pl.x,pl.y-s.cam-20,label||'-'+dmg+'❤️','#ff4444');
  updateHeartsUI(pl);
  if(pl.hp<=0) killPlayer(s);
}
function killPlayer(s){s.alive=false;saveGame(null);showGO(s);}
function updateHeartsUI(pl){
  const mhp=pl.maxHp||maxHP();
  let h='';for(let i=0;i<mhp;i++) h+=i<pl.hp?'❤️':'🖤';
  document.getElementById('hearts').textContent=h;
}

// ── Input ─────────────────────────────────────────────────────────────────────
function xy(e){const r=C.getBoundingClientRect(),t=e.touches?(e.touches[0]||e.changedTouches[0]):e;return{x:(t.clientX-r.left)/SC,y:(t.clientY-r.top)/SC};}
C.addEventListener('touchstart',e=>{e.preventDefault();if(!paused)dn(xy(e));},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(!paused)mv(xy(e));},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();if(!paused)up();},{passive:false});
C.addEventListener('mousedown',e=>{if(!paused)dn(xy(e));});
window.addEventListener('mousemove',e=>{if(!paused)mv(xy(e));});
window.addEventListener('mouseup',()=>{if(!paused)up();});

function canLaunch(){const pl=S.pl;return pl.onG||pl.coyote>0||pl.airJumpsLeft>0;}
function dn(p){if(!S.alive)return;drag={sx:p.x,sy:p.y,cx:p.x,cy:p.y};document.getElementById('hint').style.display='none';}
function mv(p){if(drag)drag={...drag,cx:p.x,cy:p.y};}
function up(){
  if(!drag||!S.alive){drag=null;return;}
  const dx=drag.cx-drag.sx,dy=drag.cy-drag.sy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<8){drag=null;return;}
  if(!canLaunch()){drag=null;return;}
  const d=Math.min(dist,130),a=Math.atan2(dy,dx),pw=d/130;
  S.pl.vx=-Math.cos(a)*pw*upgVal('power');
  S.pl.vy=-Math.sin(a)*pw*upgVal('power');
  if(!S.pl.onG&&S.pl.coyote<=0) S.pl.airJumpsLeft=Math.max(0,S.pl.airJumpsLeft-1);
  S.pl.onG=false;drag=null;
}

// ── Trajectory simulation ─────────────────────────────────────────────────────
const BOUNCE_COLORS=[[255,200,80],[80,200,255],[180,80,255],[80,255,120],[255,140,40]];

function simTrajectory(sx,sy,vx0,vy0,maxSteps,maxBounces){
  const grav=upgVal('gravity'),ab=upgVal('airbrake'),bc=upgVal('bounce'),pf=upgVal('friction');
  let tx=sx,ty=sy,tvx=vx0,tvy=vy0,bounces=0;
  const segs=[{dots:[],bi:0}];
  for(let i=0;i<maxSteps&&bounces<=maxBounces;i++){
    tvy+=grav;tvx*=ab;tx+=tvx;ty+=tvy;
    let hit=false;
    if(tx<=WALL+1){tx=WALL+1;tvx=Math.abs(tvx)*bc;bounces++;hit=true;}
    else if(tx>=W-WALL-1){tx=W-WALL-1;tvx=-Math.abs(tvx)*bc;bounces++;hit=true;}
    if(!hit&&tvy>0){
      for(const p of S.plats){
        if(tx+9>p.x&&tx-9<p.x+p.w&&ty>=p.y-2&&ty<=p.y+4){
          ty=p.y-1;tvy=-Math.abs(tvy)*0.5;tvx*=pf;bounces++;hit=true;break;
        }
      }
    }
    segs[segs.length-1].dots.push({x:tx,y:ty});
    if(hit&&bounces<=maxBounces) segs.push({dots:[{x:tx,y:ty}],bi:bounces});
  }
  return segs;
}

// ── Draw ──────────────────────────────────────────────────────────────────────

function drawCastleWall(){
  // FIX: draw each brick using fully integer-aligned coordinates derived from
  // the world-row index, avoiding sub-pixel drift that causes shimmer/overlap.
  const bH=16,bW=32;
  // Which world row sits at the very top of the screen
  const topWorldRow=Math.floor(S.cam/bH);

  for(let row=topWorldRow-1;row<=topWorldRow+Math.ceil(H/bH)+1;row++){
    const off=(row%2===0)?0:bW/2;
    // Screen Y of this row's top edge — integer-snapped
    const wy=Math.round((row*bH)-S.cam);

    // Deterministic shade per row using hash (no random per frame)
    const shade=row%3===0?'#2a2520':row%3===1?'#252018':'#221e15';

    for(let col=-1;col<=Math.ceil(W/bW)+1;col++){
      const bx=Math.round(col*bW+off);
      // Only draw if on screen
      if(bx+bW<0||bx>W||wy+bH<0||wy>H) continue;

      ctx.fillStyle=shade;
      ctx.fillRect(bx,wy,bW-2,bH-2);

      // Mortar (gaps between bricks)
      ctx.fillStyle='#141210';
      ctx.fillRect(bx,wy+bH-2,bW,2);   // horizontal mortar
      ctx.fillRect(bx+bW-2,wy,2,bH);   // vertical mortar

      // Deterministic crack
      if(hash2(row,col)<0.12){
        ctx.fillStyle='#0e0c0a';
        ctx.fillRect(bx+8,wy+4,1,6);
      }
    }
  }
}

function drawTorch(x,y){
  const fl=Math.sin(S.tick*0.3)*2+Math.sin(S.tick*0.7)*1.5;
  ctx.fillStyle='#555';ctx.fillRect((x-3)|0,(y-2)|0,6,8);
  ctx.fillStyle='#888';ctx.fillRect((x-2)|0,(y-1)|0,4,6);
  ctx.fillStyle='#886633';ctx.fillRect((x-1)|0,(y+4)|0,2,10);
  const grd=ctx.createRadialGradient(x,y,0,x,y,22+fl);
  grd.addColorStop(0,'rgba(255,160,0,0.25)');grd.addColorStop(1,'rgba(255,80,0,0)');
  ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,22+fl,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,60,0,0.9)';ctx.beginPath();ctx.ellipse(x,y-2+fl*0.3,4,7+fl*0.4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,180,0,0.9)';ctx.beginPath();ctx.ellipse(x,y-1+fl*0.2,2.5,5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,180,0.8)';ctx.beginPath();ctx.ellipse(x,y+fl*0.1,1,3,0,0,Math.PI*2);ctx.fill();
}

function drawWalls(){
  // No flash — static stone walls only
  for(let y=0;y<H;y+=12){
    ctx.fillStyle=y%24<12?'#3a3530':'#332f2a';
    ctx.fillRect(0,y,WALL,12);
  }
  ctx.fillStyle='#555';ctx.fillRect(WALL-2,0,2,H);
  for(let y=0;y<H;y+=12){
    ctx.fillStyle=y%24<12?'#3a3530':'#332f2a';
    ctx.fillRect(W-WALL,y,WALL,12);
  }
  ctx.fillStyle='#555';ctx.fillRect(W-WALL,0,2,H);
}

function drawPlatform(p){
  const sy=(p.y-S.cam)|0;
  if(p.icy){
    ctx.fillStyle='#445566';ctx.fillRect(p.x|0,sy,p.w|0,p.h);
    ctx.fillStyle='#7aaccc';ctx.fillRect(p.x|0,sy,p.w|0,4);
    ctx.fillStyle='#aaddee';ctx.fillRect(p.x|0,sy,p.w|0,2);
    ctx.fillStyle='#cceeff';
    for(let i=6;i<p.w-4;i+=14) ctx.fillRect((p.x+i)|0,sy+1,4,2);
    ctx.fillStyle='rgba(180,230,255,0.12)';ctx.fillRect(p.x|0,sy,p.w|0,p.h);
    ctx.fillStyle='#334455';ctx.fillRect((p.x+2)|0,(sy+p.h)|0,p.w|0,4);
  } else {
    ctx.fillStyle='#44403a';ctx.fillRect(p.x|0,sy,p.w|0,p.h);
    ctx.fillStyle='#6a6258';ctx.fillRect(p.x|0,sy,p.w|0,4);
    ctx.fillStyle='#7a7268';ctx.fillRect(p.x|0,sy,p.w|0,2);
    ctx.fillStyle='#50483e';
    for(let i=4;i<p.w-4;i+=18) ctx.fillRect((p.x+i)|0,sy-5,10,6);
    ctx.fillStyle='#33302a';
    ctx.fillRect(p.x|0,sy+6,p.w|0,2);
    for(let i=20;i<p.w;i+=20) ctx.fillRect((p.x+i)|0,sy,2,p.h);
    ctx.fillStyle='rgba(0,0,0,0.25)';ctx.fillRect((p.x+2)|0,(sy+p.h)|0,p.w|0,4);
    if(p.torch) drawTorch(p.x+p.w/2,sy-2);
  }
}

function drawGold(coin){
  if(coin.collected) return;
  const sy=(coin.y-S.cam+Math.sin(coin.bob)*3)|0;
  const g=ctx.createRadialGradient(coin.x,sy,0,coin.x,sy,12);
  g.addColorStop(0,'rgba(255,220,80,0.3)');g.addColorStop(1,'rgba(255,180,0,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(coin.x,sy,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc9900';ctx.fillRect((coin.x-6)|0,(sy-6)|0,12,12);
  ctx.fillStyle='#ffcc00';ctx.fillRect((coin.x-5)|0,(sy-6)|0,10,12);
  ctx.fillStyle='#ffe066';ctx.fillRect((coin.x-4)|0,(sy-5)|0,8,10);
  ctx.fillStyle='#fff8aa';ctx.fillRect((coin.x-3)|0,(sy-4)|0,3,3);
  ctx.fillStyle='#aa7700';
  ctx.fillRect((coin.x-1)|0,(sy-3)|0,2,6);
  ctx.fillRect((coin.x-3)|0,(sy-1)|0,6,2);
  ctx.fillRect((coin.x-1)|0,(sy-5)|0,2,2);
}

function drawKnight(){
  const pl=S.pl;
  const flash=pl.damageFlash>0&&Math.floor(pl.damageFlash/4)%2===0;
  if(flash) ctx.globalAlpha=0.35;
  const x=(pl.x-pl.w/2)|0,y=(pl.y-pl.h/2-S.cam)|0,w=pl.w,h=pl.h;
  const moving=Math.abs(pl.vx)>0.5,legOff=pl.onG&&moving?Math.sin(S.tick*0.3)*3:0;
  ctx.fillStyle='rgba(0,0,0,0.25)';ctx.beginPath();ctx.ellipse(x+w/2,y+h+3,w/2-2,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#555566';ctx.fillRect(x+2,y+h-8,6,8+legOff);ctx.fillRect(x+w-8,y+h-8,6,8-legOff);
  ctx.fillStyle='#8888aa';ctx.fillRect(x+3,y+h-7,4,2);ctx.fillRect(x+w-7,y+h-7,4,2);
  ctx.fillStyle='#446688';ctx.fillRect(x+1,y+8,w-2,h-14);
  ctx.fillStyle='#6699bb';ctx.fillRect(x+2,y+8,w-4,h-16);
  ctx.fillStyle='#4477aa';ctx.fillRect(x+4,y+10,w-8,4);
  ctx.fillStyle='#88aacc';ctx.fillRect(x+5,y+11,w-10,2);
  ctx.fillStyle='#8a6a30';ctx.fillRect(x+2,y+h-10,w-4,3);
  ctx.fillStyle='#ffcc44';ctx.fillRect(x+w/2-2,y+h-10,4,3);
  ctx.fillStyle='#557799';ctx.fillRect(x-2,y+8,6,6);ctx.fillRect(x+w-4,y+8,6,6);
  ctx.fillStyle='#88aacc';ctx.fillRect(x-1,y+9,4,2);ctx.fillRect(x+w-3,y+9,4,2);
  ctx.fillStyle='#445566';ctx.fillRect(x+2,y,w-4,10);
  ctx.fillStyle='#6688aa';ctx.fillRect(x+3,y+1,w-6,8);
  ctx.fillStyle='#111';ctx.fillRect(x+4,y+4,w-8,2);
  ctx.fillStyle='rgba(255,100,0,0.4)';ctx.fillRect(x+5,y+4,w-10,1);
  ctx.fillStyle='#cc2222';
  for(let i=0;i<5;i++){const pw2=Math.sin(S.tick*0.15+i)*1.5;ctx.fillRect(x+w/2-1,y-4-i+pw2,2,3);}
  ctx.fillStyle='#ff4444';ctx.fillRect(x+w/2-1,y-2,2,4);
  ctx.fillStyle='#8b0000';ctx.fillRect(x-5,y+10,7,12);
  ctx.fillStyle='#cc2222';ctx.fillRect(x-4,y+11,5,10);
  ctx.fillStyle='#ffcc00';ctx.fillRect(x-2,y+14,1,4);ctx.fillRect(x-4,y+16,5,1);
  ctx.save();ctx.translate(x+w+2,y+12);ctx.rotate(pl.onG?0.2:-0.6);
  ctx.fillStyle='#aabbcc';ctx.fillRect(-1,-14,2,14);
  ctx.fillStyle='#888';ctx.fillRect(-1,0,2,4);
  ctx.fillStyle='#cc9900';ctx.fillRect(-4,-1,8,2);
  ctx.fillStyle='#eee';ctx.fillRect(0,-14,1,10);
  ctx.restore();
  if(flash) ctx.globalAlpha=1;
  const aj=pl.airJumpsLeft;
  if(aj>0&&!pl.onG){
    for(let i=0;i<aj;i++){
      ctx.fillStyle='rgba(100,200,255,0.8)';ctx.beginPath();ctx.arc(x+w/2-4+i*8,y-10,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(200,240,255,0.9)';ctx.beginPath();ctx.arc(x+w/2-4+i*8,y-10,1.5,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawBat(bt){
  const sy=(bt.wy-S.cam)|0;
  if(sy<-30||sy>H+30) return;
  const agro=bt.state==='agro'||bt.state==='diving';
  const flash=bt.hurtTimer>0&&Math.floor(bt.hurtTimer/3)%2===0;
  const wing=Math.sin(bt.flap)*(agro?10:6);
  if(flash) ctx.globalAlpha=0.4;
  if(agro&&bt.state==='agro'){ctx.fillStyle='rgba(255,140,0,0.12)';ctx.beginPath();ctx.arc(bt.x,sy,10,0,Math.PI*2);ctx.fill();}
  if(agro&&bt.state==='diving'){ctx.fillStyle='rgba(255,100,0,0.18)';ctx.beginPath();ctx.arc(bt.x,sy,12,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle=agro?'#2a1414':'#221a2a';
  ctx.fillRect((bt.x-3)|0,(sy-2)|0,6,5);
  ctx.fillRect((bt.x-12)|0,(sy-2+wing)|0,9,4);
  ctx.fillRect((bt.x+3)|0,(sy-2+wing)|0,9,4);
  ctx.fillRect((bt.x-14)|0,(sy+1+wing)|0,3,2);
  ctx.fillRect((bt.x+11)|0,(sy+1+wing)|0,3,2);
  ctx.fillStyle=bt.state==='diving'?'#ff6600':agro?'#cc6600':'#441111';
  ctx.fillRect((bt.x-2)|0,(sy-1)|0,1,1);ctx.fillRect((bt.x+1)|0,(sy-1)|0,1,1);
  if(flash) ctx.globalAlpha=1;
}

function drawSling(){
  if(!drag) return;
  const pl=S.pl,ps={x:pl.x,y:pl.y-S.cam};
  const dx=drag.sx-drag.cx,dy=drag.sy-drag.cy,dist=Math.sqrt(dx*dx+dy*dy);
  if(dist<4) return;
  const canFire=canLaunch();
  const pw=Math.min(dist,130)/130;
  const vx0=Math.cos(Math.atan2(dy,dx))*pw*upgVal('power');
  const vy0=Math.sin(Math.atan2(dy,dx))*pw*upgVal('power');

  // Subtle drag line
  ctx.save();ctx.globalAlpha=canFire?0.3:0.15;
  ctx.strokeStyle='#aa9955';ctx.lineWidth=1;ctx.setLineDash([2,5]);
  ctx.beginPath();ctx.moveTo(drag.sx,drag.sy);ctx.lineTo(drag.cx,drag.cy);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  // Arc preview
  // base steps from preview upgrade: smaller base = shorter initial arc
  const baseSteps=Math.floor(upgVal('preview')*4);
  const numBounces=maxRebounds();
  const segs=simTrajectory(ps.x,ps.y,vx0,vy0,baseSteps*(numBounces+1),numBounces);

  ctx.globalAlpha=canFire?1:0.3;
  segs.forEach((seg,si)=>{
    const col=BOUNCE_COLORS[Math.min(si,BOUNCE_COLORS.length-1)];
    const n=seg.dots.length;
    seg.dots.forEach((d,di)=>{
      const t=di/Math.max(n-1,1);
      const r=Math.max(0.8,3*(1-t*0.6));
      const alpha=(1-t*0.55)*(si===0?1:0.75);
      ctx.fillStyle=`rgba(${col[0]},${col[1]},${col[2]},${alpha})`;
      ctx.beginPath();ctx.arc(d.x,d.y,r,0,Math.PI*2);ctx.fill();
    });
    if(si<segs.length-1&&seg.dots.length>0){
      const last=seg.dots[seg.dots.length-1];
      const nc=BOUNCE_COLORS[Math.min(si+1,BOUNCE_COLORS.length-1)];
      ctx.strokeStyle=`rgba(${nc[0]},${nc[1]},${nc[2]},0.9)`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(last.x-4,last.y-4);ctx.lineTo(last.x+4,last.y+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(last.x+4,last.y-4);ctx.lineTo(last.x-4,last.y+4);ctx.stroke();
    }
  });
  ctx.globalAlpha=1;

  const bars=Math.ceil(pw*5);
  for(let i=0;i<5;i++){ctx.fillStyle=i<bars?(pw>.7?'#ff6633':'#ffcc44'):'rgba(255,255,255,.1)';ctx.fillRect(W-WALL-16,H-32-i*8,10,6);}
  ctx.fillStyle='#886633';ctx.font='8px monospace';ctx.textAlign='right';ctx.fillText('FORCE',W-WALL-2,H-10);ctx.textAlign='left';
  if(!canFire){ctx.fillStyle='rgba(255,80,80,0.8)';ctx.font='bold 9px monospace';ctx.textAlign='center';ctx.fillText('NO JUMPS LEFT',W/2,H-12);ctx.textAlign='left';}
  const aj=pl.airJumpsLeft;
  if(!pl.onG&&pl.coyote<=0&&maxAirJumps()>0){ctx.fillStyle='rgba(100,200,255,0.6)';ctx.font='9px monospace';ctx.textAlign='center';ctx.fillText('AIR: '+aj+'/'+maxAirJumps(),W/2,H-24);ctx.textAlign='left';}
}

function drawFloats(){
  fctx.clearRect(0,0,W,H);fctx.textAlign='center';
  for(const f of floats){fctx.globalAlpha=f.life/55;fctx.fillStyle=f.color;fctx.font='bold 13px monospace';fctx.fillText(f.text,f.x,f.y);}
  fctx.globalAlpha=1;fctx.textAlign='left';
}

function drawSky(){
  const t=Math.max(0,Math.min(1,S.score/500));
  ctx.fillStyle=`rgb(${8+t*4|0},${8+t*3|0},${22+t*10|0})`;ctx.fillRect(0,0,W,H);
  const moonY=(((-2000-S.cam)%(H*8)+H*8)%(H*8))-H;
  if(moonY>-60&&moonY<H+60){
    ctx.fillStyle='rgba(255,240,180,0.12)';ctx.beginPath();ctx.arc(W/2,moonY,50,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fffde0';ctx.beginPath();ctx.arc(W/2,moonY,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#eeeac0';ctx.beginPath();ctx.arc(W/2+8,moonY-4,18,0,Math.PI*2);ctx.fill();
  }
  for(let i=0;i<120;i++){
    const sx=hashY(i*17.3)*W,wy=hashY(i*31.7)*H*10-H*5;
    const sy=((wy-S.cam)%(H*8)+H*8)%(H*8)-H;
    if(sy<0||sy>H) continue;
    const twink=0.4+0.6*Math.abs(Math.sin(S.tick*0.02+i));
    ctx.fillStyle=`rgba(255,245,200,${twink*0.9})`;
    const sr=hashY(i*7.1)<0.2?1.5:1;
    ctx.fillRect(sx|0,sy|0,sr,sr);
  }
}

function frame(){
  if(S.alive&&!paused) update(S);
  drawSky();
  drawCastleWall();
  for(const bt of S.bats) drawBat(bt);
  for(const p of S.plats) drawPlatform(p);
  for(const c of S.coins) drawGold(c);
  drawKnight();
  drawWalls();
  drawSling();
  if(paused){ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,W,H);}
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,0.45)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(0,0,0,0.04)';for(let i=0;i<H;i+=2)ctx.fillRect(0,i,W,1);
  if(S.pl.onG&&!drag&&!paused&&S.tick%60<38){
    const py=S.pl.y-S.cam+S.pl.h/2+22;
    ctx.fillStyle='rgba(255,220,120,.7)';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText('DRAG ANYWHERE TO LAUNCH!',W/2,py);ctx.textAlign='left';
  }
  drawFloats();
  requestAnimationFrame(frame);
}

// ── Shop / Pause ──────────────────────────────────────────────────────────────
function togglePause(){
  if(!S.alive) return;
  paused=!paused;
  const btn=document.getElementById('pausebtn');
  if(paused){
    btn.textContent='▶';saveGame(S);
    document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
    renderShop('pause');
    document.getElementById('pausemenu').style.display='block';
  } else {
    btn.textContent='⏸';
    document.getElementById('pausemenu').style.display='none';
    drag=null;
  }
}
function dieAndShowGO(){
  paused=false;document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').textContent='⏸';
  S.alive=false;saveGame(null);showGO(S);
}
function showGO(s){
  document.getElementById('pausebtn').style.display='none';
  document.getElementById('go-title').textContent=s.pl.hp<=0?'💀 FALLEN 💀':'⚔ SLAIN ⚔';
  document.getElementById('go-stats').textContent='FLOOR: '+s.score+'   ⚜ '+s.session_coins+'   BEST: '+best;
  renderShop('go');document.getElementById('go').style.display='block';
}
function renderShop(which){
  const el=document.getElementById(which==='pause'?'upg-list-pause':'upg-list-go');
  el.innerHTML='';
  UPGRADES.forEach(u=>{
    const cost=upgCost(u.id),lvl=upgLevels[u.id],can=totalCoins>=cost;
    const div=document.createElement('div');div.className='upg';
    div.innerHTML=`<div class="upg-info"><div class="upg-name">${u.icon} ${u.name}</div><div class="upg-desc">${u.desc}</div><div class="upg-lvl">RANK ${lvl}</div></div><button class="upg-btn${can?'':' cant'}" onclick="buyUpg('${u.id}','${which}')">${can?'⚜ '+cost:'🔒 '+cost}</button>`;
    el.appendChild(div);
  });
}
function buyUpg(id,which){
  const cost=upgCost(id);if(totalCoins<cost)return;
  totalCoins-=cost;upgLevels[id]++;
  if(id==='maxhp'&&S&&S.alive){S.pl.maxHp=maxHP();S.pl.hp=Math.min(S.pl.hp+1,S.pl.maxHp);updateHeartsUI(S.pl);}
  if(id==='airjumps'&&S&&S.alive) S.pl.airJumpsLeft=Math.min(S.pl.airJumpsLeft+1,maxAirJumps());
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  if(which==='pause') document.getElementById('pause-coins').textContent='⚜ '+totalCoins+' gold available';
  renderShop(which);saveGame(S&&S.alive?S:null);
}

function restart(){
  floats=[];drag=null;paused=false;saveTimer=0;
  S=mkS(null);
  document.getElementById('go').style.display='none';
  document.getElementById('pausemenu').style.display='none';
  document.getElementById('pausebtn').style.display='flex';
  document.getElementById('pausebtn').textContent='⏸';
  document.getElementById('hint').style.display='block';
  updateHeartsUI(S.pl);
}

(function boot(){
  const save=loadSave();
  if(save){
    if(save.upgLevels){upgLevels=save.upgLevels;UPGRADES.forEach(u=>{if(upgLevels[u.id]==null)upgLevels[u.id]=0;});}
    if(save.totalCoins!=null) totalCoins=save.totalCoins;
    if(save.best!=null) best=save.best;
  }
  document.getElementById('coindisp').textContent='⚜ '+totalCoins;
  document.getElementById('best').textContent='BEST: '+best;
  S=mkS(save&&save.pos?save.pos:null);
  updateHeartsUI(S.pl);
  frame();
})();
</script>
</body>
</html>
